<!DOCTYPE html>
<html lang="it">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Ricette Weber BBQ</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#f5f0e8; --surface:#fff; --text:#1c1510; --text2:#6b5a4e;
  --accent:#c73e1d; --accent2:#e8652a; --border:#e5ddd0;
  --radius:12px; --gap:16px;
  --font:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;
}
body{font-family:var(--font);background:var(--bg);color:var(--text);line-height:1.5}
header{background:linear-gradient(135deg,#1a0f0a,#2d1810);color:#fff;padding:40px 20px 32px;text-align:center}
header h1{font-size:clamp(1.5rem,4vw,2.2rem);font-weight:800}
header p{color:#b8957a;margin-top:4px;font-size:.9rem}
.controls{position:sticky;top:0;z-index:50;background:rgba(245,240,232,.95);backdrop-filter:blur(10px);padding:10px 16px;border-bottom:1px solid var(--border)}
.search-wrap{margin-bottom:10px}
.search-wrap input{width:100%;padding:10px 14px;border:1px solid var(--border);border-radius:10px;font-size:.9rem;background:var(--surface);outline:none}
.search-wrap input:focus{border-color:var(--accent2)}
.cat-filters{display:flex;flex-wrap:wrap;gap:6px}
.cat-btn{padding:6px 14px;border:1px solid var(--border);border-radius:100px;font-size:.8rem;font-weight:500;cursor:pointer;background:var(--surface);color:var(--text2);transition:all .15s;white-space:nowrap}
.cat-btn:hover{border-color:var(--accent2);color:var(--accent)}
.cat-btn.active{background:var(--accent);color:#fff;border-color:var(--accent)}
.cat-btn .ct{opacity:.4;font-size:.7rem;margin-left:3px}
.grid{padding:16px;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:var(--gap);max-width:1400px;margin:0 auto}
.card{background:var(--surface);border-radius:var(--radius);overflow:hidden;cursor:pointer;box-shadow:0 1px 4px rgba(0,0,0,.05);transition:transform .2s,box-shadow .2s;display:flex;flex-direction:column}
.card:hover{transform:translateY(-3px);box-shadow:0 4px 16px rgba(0,0,0,.08)}
.card-img{height:180px;background-size:cover;background-position:center;position:relative}
.card-img .ctag{position:absolute;top:10px;left:10px;background:rgba(26,15,10,.7);color:#fff;padding:3px 10px;border-radius:100px;font-size:.72rem;font-weight:600;backdrop-filter:blur(4px)}
.card-body{padding:12px 14px 14px;flex:1;display:flex;flex-direction:column}
.card-body h3{font-size:.93rem;font-weight:600;line-height:1.35;margin-bottom:8px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.card-meta{display:flex;flex-wrap:wrap;gap:6px;margin-top:auto;font-size:.76rem;color:var(--text2)}
.card-meta .diff{color:var(--accent);font-weight:500}
.empty-state{grid-column:1/-1;text-align:center;padding:60px 20px;color:var(--text2)}
.modal-overlay{display:none;position:fixed;inset:0;z-index:100;background:rgba(26,15,10,.55);backdrop-filter:blur(6px);overflow-y:auto;padding:20px}
.modal-overlay.open{display:block}
.modal{background:var(--surface);border-radius:16px;max-width:760px;margin:20px auto;overflow:hidden}
.modal-hero{height:260px;background-size:cover;background-position:center;position:relative}
.modal-hero .close{position:absolute;top:14px;right:14px;width:38px;height:38px;border-radius:50%;background:rgba(0,0,0,.5);color:#fff;border:none;font-size:1.2rem;cursor:pointer;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px)}
.modal-hero .cat-badge{position:absolute;bottom:14px;left:14px;background:rgba(26,15,10,.75);color:#fff;padding:4px 14px;border-radius:100px;font-size:.8rem;font-weight:600;backdrop-filter:blur(8px)}
.modal-body{padding:24px}
.modal-body h2{font-size:1.35rem;font-weight:700;line-height:1.25}
.modal-info{display:grid;grid-template-columns:repeat(auto-fit,minmax(100px,1fr));gap:1px;margin:14px 0 20px;background:var(--border);border-radius:10px;overflow:hidden}
.modal-info .ii{background:var(--bg);padding:10px 8px;text-align:center}
.modal-info .il{font-size:.68rem;color:var(--text2);text-transform:uppercase;letter-spacing:.4px;font-weight:600}
.modal-info .iv{font-size:.88rem;font-weight:600;margin-top:2px}
.modal-body h3{font-size:1rem;font-weight:700;margin:18px 0 10px;padding-bottom:6px;border-bottom:1px solid var(--border)}
.ing-group{margin-bottom:12px}
.ing-group h4{font-size:.82rem;font-weight:600;color:var(--accent);margin-bottom:3px}
.ing-group ul{list-style:none;padding:0;columns:2;column-gap:16px}
@media(max-width:600px){.ing-group ul{columns:1}}
.ing-group li{padding:2px 0 2px 14px;position:relative;font-size:.87rem;line-height:1.4;break-inside:avoid}
.ing-group li::before{content:'\25B8';position:absolute;left:0;color:var(--accent2)}
.inst-list{list-style:none;counter-reset:step}
.inst-list li{counter-increment:step;padding:10px 0 10px 36px;position:relative;font-size:.88rem;line-height:1.5;border-bottom:1px solid var(--bg)}
.inst-list li::before{content:counter(step);position:absolute;left:0;top:10px;width:24px;height:24px;background:var(--accent);color:#fff;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.7rem;font-weight:700}
footer{text-align:center;padding:24px;color:var(--text2);font-size:.78rem;border-top:1px solid var(--border);margin-top:10px}
footer a{color:var(--accent2);text-decoration:none}
@media(max-width:600px){
  .grid{grid-template-columns:1fr;padding:12px}
  .controls{padding:8px 12px}
  .cat-filters{overflow-x:auto;flex-wrap:nowrap;padding-bottom:4px}
  .modal-hero{height:180px}
  .modal-body{padding:16px}
}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}
</style>
</head>

<script>
var R = [{"n":"Super colazione al barbecue da Jamie Oliver","c":"Jamie Oliver","s":"4","d":"Facile","g":"180–220°C","m":"Indiretto/Diretto","i":"https://content-images.weber.com/content/BBQ_Day7_0298_Breakfast.png","ig":[{"g":"Bacon croccante e salsicce alla griglia","i":["4 salsicce","1 cipolla rossa piccola","2 rametti di salvia","8 fette di pancetta tesa affumicata spessa"]},{"g":"Peperoni ripieni con uova cremose","i":["2 peperoni","100 g di pomodorini ciliegino a grappolo","4 uova","sale marino e pepe nero","olio d’oliva"]},{"g":"Pane tostato con pomodori","i":["200 g di pomodorini ciliegino maturi sulla zona","2 fette spesse di pane a lievitazione naturale","1 spicchio d’aglio"]},{"g":"Fagioli al pomodoro","i":["2 lattine da 400 g di fagioli al pomodoro","di salsa Worcestershire","di salsa Tabasco"]}],"ins":["Preparate il barbecue con una zona di calore diretto e una di calore indiretto). Posizionate 4 salsicce. Sbucciate e tagliate in quarti 1 cipolla rossa piccola, separate i petali e infilateli tra una salsiccia e l’altra insieme alle foglie di 2 rametti di salvia. Infilzate con attenzione due spiedi lunghi di metallo attraversando tutte le salsicce, così potrete girarle e cuocerle tutte insieme. Prendete 8 fette di pancetta tesa affumicata spessa e infilate un’estremità di ciascuna su un altro spiedo lungo, lasciandole penzolare. Cuocete tutto sulla zona di calore diretto per 2 minuti, finché diventa ben colorito, poi spostate gli spiedi con le salsicce sulla zona di calore indiretto e proseguite la cottura per 20 minuti, girando a metà tempo. Appoggiate la pancetta sopra le salsicce.","Per la versione vegetariana: Eliminate semplicemente la pancetta e sostituite le salsicce con quelle vegetariane, spruzzandole con un po’ di olio d’oliva mentre cuociono.","Preparate il barbecue per una cottura a zone. Dividete a metà e private dei semi 2 peperoni, lasciando il picciolo attaccato per maneggiarli meglio. Grigliateli con il lato tagliato verso il basso sulla zona a cottura diretta, con il coperchio chiuso e le prese d’aria aperte, per 15 minuti, o finché iniziano ad ammorbidirsi. Negli ultimi 5 minuti aggiungete anche 100 g di pomodorini ciliegino a grappolo. Girate i peperoni e conditeli con un pizzico di sale marino e pepe nero. Rompete 4 uova e mettetene una in ogni metà di peperone, poi distribuite i pomodorini e spruzzate con un po’ di olio d’oliva. Cuocete sulla zona diretta, sempre con il coperchio chiuso e le prese d’aria aperte, per 10–15 minuti, finché i peperoni sono morbidi e le uova cotte come piacciono a voi, spostando con attenzione sulla zona tra diretta e indiretta se si coloriscono troppo velocemente.","Preparate il barbecue per una cottura a zone. Mettete 200 g di pomodorini ciliegino maturi sulla zona tra diretta e indiretta e cuoceteli con il coperchio chiuso e le prese d’aria aperte per 5 minuti, o finché risulteranno morbidi e leggermente abbrustoliti. Tostate 2 fette spesse di pane a lievitazione naturale sulla zona indiretta, finché risulteranno dorate su entrambi i lati, poi toglietele dalla griglia. Tagliate a metà 1 spicchio d’aglio e strofinatene la parte tagliata sulle fatte di pane ancora caldo, quindi condite con un filo di olio extravergine d’oliva. Con l’aiuto di una pinza o di una forchetta, schiacciate e strofinate i pomodorini su entrambi i lati del pane, eliminando i piccioli. Rimettete il pane sulla griglia nella zona a cottura diretta e cuocete finché diventerà bello rustico e ben segnato su entrambi i lati, spostandolo sulla zona indiretta se si abbrustolisce troppo in fretta. Tagliate a fette e servite.","Preparate il barbecue per una cottura a zone. Aprite semplicemente 2 lattine da 400 g di fagioli al pomodoro e mettetele sulla zona a cottura indiretta della griglia. Lasciatele sobbollire mentre cucinate il resto della colazione, mescolando con attenzione ogni tanto, finché risulteranno ben calde. Togliete con cura le lattine calde dal barbecue e condite alla perfezione con qualche goccia di salsa Worcestershire e di Tabasco.","Preparate il barbecue per una cottura a zone e mettete a scaldare una piastra in ghisa sulla zona a cottura indiretta. Pulite 4 funghi portobello, poi grigliateli sulla zona diretta con il lato concavo verso il basso, coperchio chiuso e prese d’aria aperte, per 10 minuti, o finché risulteranno morbidi. Affettate molto finemente e poi tritate grossolanamente 100 g di halloumi. Grattugiateci sopra finemente la scorza di ½ limone, aggiungete le foglie di 2 rametti di basilico spezzettate a mano, irrorate con 1 cucchiaino di olio d’oliva, pepate e mescolate il tutto con le mani. Girate i funghi, conditeli, trasferiteli nella padella calda e distribuite il composto di halloumi su ciascun fungo. Spostate con attenzione la pastra sulla zona calda e cuocete con il coperchio chiuso e le prese d’aria aperte per 10–15 minuti, finché il formaggio risulterà morbido e irresistibile.","Come preparare il barbecue: Ammucchiate tutte le braci su un solo lato del barbecue, lasciando l’altro lato libero. Così avrete una zona di calore diretto e una di calore indiretto, con una zona intermedia. Questa disposizione è ideale per le ricette in cui serve rosolare bene sulla brace, per poi proseguire la cottura più lentamente lontano dal calore diretto, permettendo alla carne di cuocere in modo uniforme."],"u":"https://www.weber.com/IT/it/ricette/jamie-oliver/super-colazione-al-barbecue-da-jamie-oliver/weber-2499816.html"},{"n":"Grigliata mista tra terra e mare da Jamie Oliver","c":"Jamie Oliver","s":"8","d":"Medium","g":"180–250°C / TEMPERATURA AL CUORE (DOPO IL RIPOSO): 75°C","m":"Direttio / Indiretto","i":"https://content-images.weber.com/content/BBQ_Day8_1588_Surf_Turf.png","ig":[{"g":"Ingredienti","i":["2 cipollotti","2 spicchi d’aglio","1 limone","1 cucchiaino di capperi piccoli in salamoia","1 scatoletta da 50 g di filetti di acciuga","½ mazzetto di erbe aromatiche tenere miste (15 g)","250 g di burro morbido non salato","1 finocchio","320 g di fagiolini","1 pane a lievitazione naturale o una baguette","8 cosce di pollo da allevamento all’aperto, con pelle e osso","olio d’oliva","225 g di chorizo","16 gamberoni crudi con il guscio, da fonti sostenibili","1,2 kg di cozze e vongole miste, da fonti sostenibili","320 g di pomodorini ciliegino maturi","120 ml di vino bianco"]}],"ins":["Per preparare il burro aromatizzato, mondate e tritate grossolanamente i cipollotti, sbucciate l’aglio e grattugiate finemente la scorza di limone. Frullate il tutto in un mixer con i capperi, le acciughe e la maggior parte delle erbe aromatiche, mettendone da parte qualcuna per guarnire (in alternativa potete tritare tutto a coltello sul tagliere). Unite il burro morbido e frullate o mescolate fino a ottenere un composto omogeneo.","Accendete il barbecue a zone: impostate i bruciatori di sinistra a temperatura medio-alta per creare la zona di calore diretto, quelli centrali a temperatura media e quelli di destra al minimo per ottenere una zona di calore indiretto.","Mondate il finocchio e tagliatelo a spicchi sottili, pulite i fagiolini e affettate la baguette in sbieco. Massaggiate il pollo con 2 cucchiai di olio d’oliva e conditelo con sale marino e pepe nero. Tagliate il chorizo a fette spesse circa 1 cm. Sgusciate i gamberi lasciando testa e coda, poi incidete delicatamente il dorso con un coltellino ed eliminate il filo intestinale. Controllate cozze e vongole: battete quelle aperte e scartate quelle che non si chiudono.","Disponete il pollo con la pelle rivolta verso il basso sulla zona di calore diretto, schiacciatelo sulla piastra con una pressa e aggiungete anche il chorizo. Cuocete per 10 minuti, o finché il grasso si sarà sciolto e la pelle risulterà ben croccante. Girate il pollo e trasferitelo nella zona media per altri 10 minuti, girandolo spesso, finché sarà ben cotto (la temperatura interna dovrebbe essere di 75°C), poi spostatelo nella zona indiretta insieme al chorizo.","Cuocete il finocchio nel grasso rilasciato per 5 minuti, quindi aggiungete i fagiolini e proseguite la cottura per altri 2 minuti, girando finché non saranno dorati. Trasferite i fagiolini su un tagliere e spostate il finocchio nella zona intermedia. Cuocete i pomodori nei succhi del pollo per 2 minuti, finché la pelle non sarà scoppiettante. Intanto tostate il pane, girandolo spesso e spostandolo nella zona indiretta una volta dorato.","Versate cozze, vongole e gamberi nella zona a cottura diretta. Aggiungete 3 cucchiai di burro aromatizzato e mescolate. Coprite con la cupola e cuocete per 5 minuti, o finché cozze e vongole si apriranno (eliminate quelle rimaste chiuse) e i gamberi saranno cotti. Aggiungete altri 2 cucchiai di burro aromatizzato, rimettete i fagiolini sulla zona a cottura diretta e mescolate tutto insieme a frutti di mare, chorizo e verdure.","Trasferite tutto sui piatti da portata. Sfumate la piastra con il vino e 1 cucchiaio di burro aromatizzato, quindi versate il fondo di cottura su tutto il resto.","Guarnite con le erbe tenute da parte e servite con spicchi di limone da spremere sopra. Il burro aromatizzato avanzato si conserva fino a 2 settimane in frigorifero o fino a 3 mesi in freezer."],"u":"https://www.weber.com/IT/it/ricette/jamie-oliver/grigliata-mista-tra-terra-e-mare-da-jamie-oliver/weber-2499762.html"},{"n":"Agnello alle erbe con fagioli cremosi da Jamie Oliver","c":"Jamie Oliver","s":"10","d":"Media","g":"Zona di cottura indiretta 170–200°C","m":"Diretto / Indiretto (50/50 setup)","i":"https://content-images.weber.com/content/BBQ_Day8_2736_Lamb_Beans.png","ig":[{"g":"Ingredienti","i":["4 porri","1 mazzetto di erbe aromatiche miste (circa 30 g), come menta, dragoncello, basilico e prezzemolo","2 spicchi d’aglio","olio extravergine di oliva","50 g di pistacchi sgusciati non salati","2 limoni","100 g di pangrattato","2,2 kg di agnello disossato e aperto a libro, da allevamento responsabile","olio d’oliva","2 cucchiai di senape di Digione","1 mazzetto di salvia (circa 20 g)","200 g di pomodorini maturi","2 vasetti da 570 g di fagioli cannellini","aceto di vino rosso"]}],"ins":["Mettete a bagno una manciata di chips di legno, seguendo le indicazioni sulla confezione. Preparate il barbecue per una cottura 50/50. Disponete i porri direttamente sulla brace e fateli abbrustolire per 10–15 minuti, girandoli a metà cottura, quindi trasferiteli su un tagliere.","Nel frattempo, mettete le foglie più tenere delle erbe in un mortaio con un pizzico di sale marino e pestatele fino a ottenere una pasta grossolana. Sbucciate l’aglio e unite anche quello, continuando a pestare. Aggiungete i pistacchi, spezzettandoli grossolanamente, poi incorporate 2 cucchiai di olio extravergine di oliva, il succo di 1 limone e infine il pangrattato, amalgamando bene il tutto.","Aprite il coscio di agnello a libro e massaggiatelo su tutta la superficie con sale, pepe nero e 1 cucchiaio di olio d’oliva. Rosolatelo sulla zona di calore diretto per circa 5 minuti, girandolo spesso con le pinze, finché diventa ben dorato. Trasferitelo quindi su un tagliere, con la pelle rivolta verso il basso. Spalmate la superficie con la senape e ricopritela con la panatura alle erbe.","Eliminate e scartate gli strati esterni bruciacchiati dei porri, quindi tagliateli a pezzi di circa 2 cm e disponeteli in una teglia da 20 × 25 cm. Strofinate metà delle foglie di salvia con un po’ di olio e aggiungetele alla teglia insieme ai pomodori e a una bella spruzzata d’acqua. Rimuovete con attenzione la griglia del barbecue e sistemate la teglia nella zona di calore indiretto. Rimettete la griglia e adagiate l’agnello sopra, con la crosta rivolta verso l’alto, in modo che cuocia sospeso sopra la teglia. Tagliate a metà il limone rimasto e infilatelo sotto il lato dell’agnello più vicino alle braci. Scolate le chips di legno e mettetele sulla zona di calore diretto insieme ai rametti di salvia rimanenti. Chiudete il coperchio e cuocete per 30 minuti, con la valvola superiore aperta a metà e posizionata sopra la carne.","Sollevate con cautela l’agnello e la griglia, quindi versate i fagioli nella teglia, compreso il loro liquido. Proseguite la cottura per altri 10–15 minuti, sempre con il coperchio chiuso e la valvola aperta a metà, finché la temperatura interna dell’agnello raggiungerà 55°C. Togliete l’agnello, copritelo e lasciatelo riposare per 30 minuti (la temperatura salirà fino a circa 60°C), lasciando invece i fagioli sul barbecue per altri 15 minuti.","Unite ai fagioli 1 cucchiaio di aceto di vino rosso, regolate di sale e pepe, quindi affettate l’agnello e aggiungetelo alla teglia. Servite con pane rustico e insalata verde."],"u":"https://www.weber.com/IT/it/ricette/jamie-oliver/agnello-alle-erbe-con-fagioli-cremosi-da-jamie-oliver/weber-2494776.html"},{"n":"Spiedini di pollo speziati con salsa al burro da Jamie Oliver","c":"Jamie Oliver","s":"8-12","d":"Media","g":"Zona di cottura diretta 200–250°C","m":"Diretto / Indiretto","i":"https://content-images.weber.com/content/BBQ_Day9_0344_Chicken_Skewers-1.png","ig":[{"g":"Ingredienti","i":["1 pezzo di zenzero fresco di circa 6 cm","2 spicchi d’aglio","2 limoni","2 cucchiaini di peperoncino in polvere","2 cucchiaini di cumino macinato","1 cucchiaino di coriandolo macinato","1 cucchiaino di curcuma","100 g di yogurt naturale","2 peperoncini freschi e mezzo di colori misti","4 petti di pollo allevati a terra, senza pelle, da 150 g ciascuno","800 g di cosce di pollo allevate a terra, senza pelle e disossate","1 ananas maturo","1 cipolla rossa piccola","2 cipolle","1,5 kg di pomodori maturi","olio d’oliva","80 g di anacardi non salati","½ cucchiaino di fieno greco macinato","50 g di burro non salato","1 manciata di foglie di curry","300 ml di panna fresca","500 g di farina autolievitante","1 lattina da 400 ml di latte di cocco","1 limone","1 mazzetto di coriandolo fresco (circa 30 g)","10 g di burro morbido non salato"]}],"ins":["Sbucciate lo zenzero e l’aglio e grattugiateli finemente in una ciotola capiente insieme alla scorza di 1 limone; spremetene il succo e aggiungete 1 cucchiaino di peperoncino in polvere e 1 di cumino, il coriandolo macinato, la curcuma, lo yogurt e un pizzico di sale marino e pepe nero. Grattugiate finemente anche ½ peperoncino rosso fresco e mescolate bene. Tagliate i petti di pollo a pezzi di circa 5 cm e uniteli alla ciotola insieme alle cosce. Mescolate per ricoprire bene la carne, tenendo separati petti e cosce. Potete cuocere subito oppure lasciare marinare fino a 1 ora.","Accendete i bruciatori al massimo e preriscaldate il barbecue con il coperchio chiuso per 15 minuti. Spegnete poi i bruciatori di sinistra per creare una zona di calore indiretto.","Sbucciate l’ananas, dividetelo a metà per il lungo ed eliminate il torsolo, quindi tagliatelo a pezzi di circa 4 cm. Mescolatelo con i petti di pollo marinati e infilzateli alternandoli su spiedi di metallo grandi. Sbucciate la cipolla rossa, tagliatela in quarti e separate i petali, quindi infilzateli sugli spiedini insieme alle cosce di pollo.","Per la salsa al burro, tagliate le cipolle rimaste a fette spesse e mettetele sulla zona di calore diretto. Bucherellate e aggiungete i 2 peperoncini rimasti e i pomodori. Grigliate il tutto per circa 10 minuti, girando spesso, finché diventano ben arrostiti, poi trasferite su un tagliere.","Posizionate una casseruola di ghisa sulla zona diretta con 1 cucchiaio di olio d’oliva, aggiungete gli anacardi, il cucchiaino rimanente di peperoncino in polvere e di cumino, il fieno greco e il burro. Unite le foglie di curry. Eliminate le bucce bruciacchiate dei pomodori, private i peperoncini dei semi, quindi aggiungeteli alla casseruola insieme alle fette di cipolla, schiacciando i pomodori con un cucchiaio. Regolate di sale e pepe, poi spostate con attenzione la casseruola sulla zona di calore indiretto e lasciate sobbollire per 15 minuti, finché la salsa si addenserà. Versate la panna, mescolate bene e togliete dal barbecue.","Mettete gli spiedini con le cosce di pollo sulla zona a calore diretto, con il coperchio chiuso, per 5 minuti. Aggiungete poi gli spiedini con i petti e cuocete per 10–15 minuti, girandoli a metà cottura, finché il pollo diventa ben cotto. Spruzzate con un po’ d’olio se necessario e spostate sulla zona indiretta se prendono troppo colore.","Per preparare la piadina, versate la farina in una ciotola grande con un pizzico di sale marino e il latte di cocco. Grattugiate la scorza di limone, spremetene il succo e mescolate finché l’impasto si compatta. Tritate finemente il coriandolo fresco e incorporatelo, aggiungendo un po’ di farina se serve. Impastate su un piano leggermente infarinato fino a ottenere un composto morbido, quindi oliate leggermente, coprite e lasciate riposare per 15 minuti.","Con le mani unte, tirate e stendete l’impasto fino ad ottenere uno spessore di circa 1 cm. Abbassate il bruciatore di destra e cuocete il pane sulla griglia per 4–5 minuti, girandolo a metà, finché diventa ben cotto, gonfio e dorato. Spennellate con il burro morbido e spostate sulla zona indiretta se necessario.","Togliete gli spiedini dal barbecue e irrorateli con il succo dell’ultimo limone. Servite subito. Ottimi con coriandolo fresco, un’insalata croccante di verdure al limone e chutney di mango."],"u":"https://www.weber.com/IT/it/ricette/jamie-oliver/spiedini-di-pollo-speziati-con-salsa-al-burro-da-jamie-oliver/weber-2494799.html"},{"n":"Bistecca e verdure alla griglia da Jamie Oliver","c":"Jamie Oliver","s":"2","d":"Media","g":"Zona a cottura diretta 250–300°C / TEMPERATURA AL CUORE (DOPO IL RIPOSO): 52–58°C (da media al sangue a media)","m":"Diretto / Indiretto (50/50 setup)","i":"https://content-images.weber.com/content/BBQ_Day6_0394_Steak.png","ig":[{"g":"Ingredienti","i":["1 bistecca di controfiletto di manzo da circa 350 g, spessore 2,5 cm, da allevamento responsabile","1 mazzetto di erbe aromatiche miste (circa 20 g), come timo, maggiorana e rosmarino","1 pezzo di zenzero fresco di circa 5 cm","1 spicchio d’aglio","1 peperoncino rosso fresco e mezzo","1 cucchiaio di salsa di soia a ridotto contenuto di sale","1 cucchiaio di miele","1 lime","160 g di broccoletti","160 g di asparagi","1 mazzetto di cipollotti","100 g di ravanelli","160 g di taccole","2 rametti di menta"]}],"ins":["Togliete la bistecca dal frigorifero e lasciatela riposare a temperatura ambiente. Preparate il barbecue per una cottura 50/50. Realizzate un pennello aromatico legando le erbe al manico di un cucchiaio di legno con dello spago. Sbucciate e grattugiate finemente zenzero e aglio in una ciotola capiente, quindi grattugiate anche il peperoncino. Unite la soia, il miele e il succo di lime, mescolate e tenete da parte.","Eliminate il grasso dalla bistecca, scartando il nervetto, poi tagliate il grasso a striscioline sottili e mettetele in una piccola padella di ghisa. Posizionatela sulla zona a cottura indiretta del barbecue e lasciate sciogliere il grasso finché diventa croccante. Nel frattempo salate bene la bistecca con sale marino. Mettetela sulla zona a cottura diretta e giratela spesso con le pinze, in modo che prenda colore su tutti i lati. Spennellatela man mano con il grasso fuso usando il pennello alle erbe. Calcolate circa 2 minuti per una cottura al sangue (oppure 47°C al cuore), 3 minuti per media al sangue (52°C) e 4 minuti per media (58°C). Trasferite la bistecca su un piatto e lasciatela riposare: se usate il termometro, la temperatura salirà di 2–3 gradi durante il riposo.","Pulite broccoli, asparagi e cipollotti e metteteli sulla zona a cottura diretta insieme ai ravanelli. Cuocete per circa 5 minuti, finché diventano teneri e ben segnati dalla griglia, girandoli spesso con le pinze. Una volta pronti, trasferiteli nella ciotola con il condimento. Eliminate le estremità del baccello, metteteli in un colino di metallo e appoggiatelo sulla zona tra cottura diretta e indiretta del barbecue per 2 minuti, mescolando ogni tanto. Uniteli poi alle verdure, aggiungendo anche il grasso croccante. Mescolate bene e trasferite il tutto su un piatto da portata.","Affettate la bistecca e sistematela sopra la verdura, irrorando con i succhi di cottura. Completate con qualche foglia di menta e servite."],"u":"https://www.weber.com/IT/it/ricette/jamie-oliver/bistecca-e-verdure-alla-griglia-da-jamie-oliver/weber-2494535.html"},{"n":"Costolette di agnello alla griglia da Jamie Oliver","c":"Jamie Oliver","s":"4","d":"Facile","g":"circa 250–300°C","m":"Diretto","i":"https://content-images.weber.com/content/BBQ_Day9_0808_Lamb_Chops.png","ig":[{"g":"Ingredienti","i":["200 g di feta","1 limone e mezzo","olio extravergine di oliva","12 costolette di agnello da allevamento responsabile, pulite “alla francese”, a temperatura ambiente","olio d’oliva","facoltativo: 2 rametti di origano","30 g di pistacchi sgusciati non salati","½ cucchiaio di paprika affumicata"]}],"ins":["Portate la griglia alla massima temperatura (circa 315°C). Grattugiate finemente la scorza di 1 limone e tenetela da parte. Nel frattempo, frullate la feta con il succo di 1 limone e 1 cucchiaio di olio extravergine di oliva fino a ottenere una crema liscia e omogenea. Regolate di sale e pepe e conservate in frigorifero fino al momento dell’uso.","Battete leggermente le costolette di agnello fino a portarle a poco meno di 2 cm di spessore. Conditele con sale marino e pepe nero, quindi massaggiatele con 1 cucchiaino di olio d’oliva.","Disponete le costolette sulla griglia ben calda e cuocetele per circa 10 minuti con il coperchio chiuso, girandole spesso, finché risultano dorate, croccanti e ben segnate dalla griglia. Intingete i rametti di origano nell’olio e passateli sulla carne come un pennello aromatico.","Nel frattempo, pestate finemente i pistacchi al mortaio, quindi mescolateli con la paprika affumicata, la scorza di limone tenuta da parte e aggiustate di sale e pepe.","Impiattate le costolette, irroratele con il succo di limone rimasto e servitele accompagnandole prima con la feta montata e poi con il mix croccante di pistacchi. Sono perfette così, oppure con patate fritte e una semplice insalata verde."],"u":"https://www.weber.com/IT/it/ricette/jamie-oliver/costolette-di-agnello-alla-griglia-da-jamie-oliver/weber-2494374.html"},{"n":"Arrosto di costine di maiale al sidro con mele arrosto","c":"Maiale","s":"4-6","d":"Medio","g":"170–180 °C / TEMPERATURA INTERNA: DOPO IL RIPOSO 63–65 °C","m":"Indiretto","i":"https://content-images.weber.com/content/DSC8585.jpg","ig":[{"g":"Carne di maiale","i":["3–4 kg di arrosto di costine di maiale con osso","2 cucchiai di olio d&#039;oliva","Sale","Pepe nero"]},{"g":"Salamoia al sidro","i":["1,5 L di sidro di mele","1 L di acqua","80 g di sale grosso","60 g di zucchero di canna","2 foglie di alloro","1 cucchiaio di pepe in grani","2 rametti di rosmarino","2 rametti di timo"]}],"ins":["Unire tutti gli ingredienti della salamoia e mescolare fino a quando non si saranno sciolti.","Immergere la carne di maiale nella salamoia e conservare in frigorifero per 8-12 ore.","Togliere la carne dalla salamoia e asciugarla tamponandola.","Ungere leggermente la carne di maiale e condirla con sale e pepe.","Togliere la carne dal frigorifero 1 ora prima della cottura.","Preparare le mele e le cipolle.","Preparare il barbecue Weber per la cottura a calore indiretto, 170–180 °C.","Preriscaldare la griglia per 15 minuti con il coperchio chiuso.","Posizionare l'arrosto di costine di maiale sul calore indiretto, con il lato dell'osso rivolto verso il basso.","Inserire la sonda Weber Connect al centro dell'arrosto.","Cuocere con il coperchio chiuso fino a quando la temperatura interna raggiunge i 60 °C.","Mettere le mele e le cipolle in una teglia e disporle accanto al maiale.","Continuare la cottura fino a quando il maiale raggiunge la temperatura desiderata.","Lasciare riposare la carne di maiale coperta senza stringere","Affettare tra le ossa","Servire con mele e cipolle arrosto","Versare il sugo di cottura sul maiale"],"u":"https://www.weber.com/IT/it/ricette/maiale/arrosto-di-costine-di-maiale-al-sidro-con-mele-arrosto/weber-2501319.html"},{"n":"Bistecca alla fiorentina","c":"Manzo","s":"2-3","d":"Medio","g":"300–350 °C / TEMPERATURA INTERNA: DOPO IL RIPOSO 48–52 °C (Al sangue – Tradizionale)","m":"Diretto","i":"https://content-images.weber.com/content/DSC8696-2.jpg","ig":[{"g":"Ingredienti","i":["1 bistecca T-bone da 1,2–1,5 kg, spessa 5–6 cm","1 cucchiaio di olio extravergine di oliva (per la finitura)","Sale marino grosso","Pepe"]}],"ins":["Togliere la bistecca dal frigorifero 2 ore prima della cottura.","Asciugare completamente la bistecca con carta da cucina.","Non condire prima di grigliare.","Preparare il carbone per ottenere un calore molto elevato.","Portare la bistecca a temperatura ambiente.","Preparare la griglia per cottura diretta, 300–350 °C. Se si utilizza il carbone, usare un camino pieno di bricchetti Weber accesi.","Preriscaldare la griglia per 15 minuti con il coperchio aperto.","Pulire e ungere leggermente le griglie.","Posizionare la bistecca direttamente sulla parte più calda della griglia.","Cuocere per 5 minuti senza muoverla.","Girare e cuocere per altri 5 minuti.","Lasciare riposare la bistecca in posizione verticale sull'osso per 2-3 minuti per completare la cottura.","Affettare spessamente controfibra.","Condire con olio d'oliva.","Condire generosamente con sale grosso e pepe nero.","Servire immediatamente, senza salse."],"u":"https://www.weber.com/IT/it/ricette/manzo/bistecca-alla-fiorentina/weber-2500476.html"},{"n":"Gnocchi alla griglia con ragù di maiale e parmigiano","c":"Maiale","s":"4","d":"Medio","g":"220–240 °C","m":"Indiretto (ragù) / Diretto (gnocchi)","i":"https://content-images.weber.com/content/DSC9056.jpg","ig":[{"g":"Ragù di maiale","i":["800 g di spalla di maiale, tritata finemente o macinata","2 cucchiai di olio d&#039;oliva","1 cipolla piccola, tagliata a dadini","1 carota, tagliata a dadini","1 gambo di sedano, tagliato a dadini","2 spicchi d&#039;aglio, schiacciati","2 cucchiai di concentrato di pomodoro","200 ml di vino rosso secco","400 g di pomodori in scatola","1 cucchiaino di rosmarino fresco, tritato finemente","Sale e pepe nero"]},{"g":"Gnocchi","i":["800 g di gnocchi freschi di patate","2 cucchiai di olio d&#039;oliva"]}],"ins":["Scaldare l'olio d'oliva in una padella e far appassire la cipolla, la carota e il sedano.","Aggiungere l'aglio e il rosmarino, cuocere brevemente.","Aggiungere la carne di maiale e rosolarla uniformemente.","Aggiungere il concentrato di pomodoro e cuocere per 1 minuto.","Sfumare con il vino rosso e far ridurre della metà.","Aggiungere i pomodori, condire e cuocere a fuoco lento per 45–60 min.","Cuocere gli gnocchi in acqua salata finché non galleggiano, quindi scolarli.","Preparare la piastra Weber per cottura diretta, 220–240 °C.","Preriscaldare il barbecue con il coperchio chiuso per 15 minuti.","Posizionare la piastra Weber sul calore diretto e lasciarla preriscaldare completamente.","Condire gli gnocchi cotti con olio d'oliva.","Cuocere gli gnocchi sulla piastra fino a quando non saranno dorati e leggermente croccanti.","Girare delicatamente per dorare tutti i lati.","Se necessario, scaldare il ragù in una padella a parte a calore indiretto.","Versare il ragù di maiale caldo sugli gnocchi grigliati","Completare con Parmigiano Reggiano","Condire con un filo d'olio extravergine d'oliva","Servire immediatamente"],"u":"https://www.weber.com/IT/it/ricette/maiale/gnocchi-alla-griglia-con-rag%C3%B9-di-maiale-e-parmigiano/weber-2500434.html"},{"n":"Alette di pollo affumicate all'acero","c":"Pollame","s":"4-8","d":"Facile","g":"170–200 °C / TEMPERATURA INTERNA: DOPO IL RIPOSO 75 °C","m":"Indiretto / Diretto","i":"https://content-images.weber.com/content/DSC8649.jpg","ig":[{"g":"Glassa/rub all'acero affumicato","i":["80 g di sciroppo d&#039;acero puro","30 g di burro fuso","20 g di salsa di soia","10 g di aceto di sidro di mele","5 g di paprika affumicata","3 g di aglio in polvere","2 g di pepe nero","1–2 g di peperoncino in fiocchi (facoltativo)"]}],"ins":["Asciugare bene le ali.","Condire le ali con olio, sale e pepe.","Mescolare tutti gli ingredienti della glassa.","Passare leggermente le ali nella glassa.","Conservare la glassa rimanente per la finitura.","Preparare la salsa e metterla in frigo.","Preriscaldare la griglia o il forno.","Preparare la griglia per cottura indiretta a 170–200 °C.","Preriscaldare la griglia per 15 min.","Disporre le ali sul calore indiretto.","Chiudere il coperchio e cuocere per 35–40 min.","Girare le ali una volta durante la cottura.","Spennellare le ali con la glassa rimanente.","Terminare la cottura a fuoco diretto per ottenere una pelle croccante."],"u":"https://www.weber.com/IT/it/ricette/pollame/alette-di-pollo-affumicate-allacero/weber-2500360.html"},{"n":"Panino con schiacciata, maiale, mozzarella e rucola","c":"Pane & Pizza","s":"4-6","d":"Facile","g":"200–220 °C","m":"Indiretto","i":"https://content-images.weber.com/content/DSC8870.jpg","ig":[{"g":"Ingredienti","i":["1 impasto per schiacciata, lievitato e pronto","600 g di carne di maiale cotta, tagliata a fettine sottili","200 g di mozzarella fresca, affettata","1 manciata di rucola","80 g di pomodori secchi, affettati","4 cucchiai di olio extravergine d&#039;oliva","sale e pepe","500 g di farina Tipo 00","325 g di acqua (65% di idratazione)","10 g di sale marino fino","3 g di lievito fresco (o 1 g di lievito secco istantaneo)","30 g di olio extravergine di oliva","Olio d&#039;oliva extra","sale grosso per la finitura"]}],"ins":["Togliere l'impasto dal frigorifero 1 ora prima di infornare.","Ungere abbondantemente una teglia.","Stendere delicatamente l'impasto sulla teglia.","Formare delle fossette con la punta delle dita.","Condire con un filo d'olio d'oliva e salare leggermente.","Affettare la mozzarella, il maiale e i pomodori secchi.","Preparare la griglia per una cottura a calore indiretto a 200–220 °C. Se si utilizza una griglia a carbone, utilizzare ½ accenditore a camino con bricchetti Weber accesi.","Preriscaldare la griglia per 15 minuti con il coperchio chiuso.","Posizionare la teglia sul lato indiretto e chiudere il coperchio.","Cuocere la schiacciata per 18–22 min fino a doratura.","Togliere il pane e lasciarlo riposare per 10 minuti prima di affettarlo.","Riscaldare delicatamente le fette di maiale a calore indiretto.","Affettare il pane e farcirlo con carne di maiale, mozzarella, rucola e pomodori secchi.","Sciogliere il lievito nell'acqua. Aggiungere la farina e mescolare fino a ottenere un composto omogeneo. Aggiungere il sale e l'olio d'oliva, impastare fino a ottenere un composto omogeneo (8–10 min).","Coprire e lasciare lievitare per 2–3 ore a temperatura ambiente.","Trasferire su una teglia ben unta d'olio, stendere delicatamente. Lasciare riposare per 45–60 min.","Formare delle fossette profonde con le dita. Completare con olio d'oliva e sale grosso.","Cuocere in forno o al barbecue a 220–240 °C fino a doratura."],"u":"https://www.weber.com/IT/it/ricette/pane-pizza/panino-con-schiacciata-maiale-mozzarella-e-rucola/weber-2500261.html"},{"n":"Tacos messicani tradizionali con gamberetti e salsa roja","c":"Pesce & Frutti di Mare","s":"4","d":"Facile","g":"220–250 °C  / TEMPERATURA INTERNA: DOPO LA COTTURA Gamberetti appena opachi (circa 60–62 °C)","m":"Diretto","i":"https://content-images.weber.com/content/DSC8544.jpg","ig":[{"g":"Gamberetti","i":["1 kg di gamberetti crudi, sgusciati e puliti","2 cucchiai di olio","1 cucchiaino di sale","½ cucchiaino di pepe nero","1 cucchiaino di peperoncino in polvere o di guajillo in polvere","Succo di 1 lime","1 spicchio d&#039;aglio tritato finemente"]},{"g":"Salsa Roja","i":["3 pomodori Roma","2 peperoncini guajillo secchi, privati del picciolo e dei semi","1 spicchio d&#039;aglio","½ cucchiaino di sale","Acqua, quanto basta"]}],"ins":["Tostare leggermente i peperoncini guajillo secchi in una padella asciutta.","Lasciare i peperoncini in ammollo in acqua calda per 5 minuti.","Frullare i pomodori, i peperoncini, l'aglio, il sale e un po' dell'acqua di ammollo fino a ottenere un composto omogeneo.","Cuocere la salsa a fuoco lento con 1 cucchiaino di olio per 3 minuti, poi metterla da parte.","Condire i gamberetti con olio, sale, pepe, peperoncino in polvere, aglio e lime.","Preriscaldare una padella o una piastra a fuoco alto.","Scaldare le tortillas di mais e preparare i condimenti.","Preparare la griglia per cottura diretta, 220–250 °C.","Preriscaldare per 10–15 minuti con il coperchio chiuso.","Posizionare una piastra o una padella in ghisa sul fuoco diretto.","Aggiungere l'olio e cuocere i gamberetti in un unico strato.","Rosolare i gamberetti per 2–3 minuti per lato fino a cottura ultimata.","Togli i gamberetti immediatamente per evitare che si cuociano troppo.","Comporre i tacos con gamberetti, salsa, cipolla, coriandolo e lime."],"u":"https://www.weber.com/IT/it/ricette/pesce-frutti-di-mare/tacos-messicani-tradizionali-con-gamberetti-e-salsa-roja/weber-2500186.html"},{"n":"Branzino affumicato con peperoncino, semi di finocchio e salsa verde alle erbe","c":"Pesce & Frutti di Mare","s":"4","d":"Facile","g":"180 °C","m":"A fuoco lento / Affumicatura","i":"https://content-images.weber.com/content/DSC9149.jpg","ig":[{"g":"Trota","i":["4 filetti interi di spigola, con la pelle","1 cucchiaio di olio d&#039;oliva","1 cucchiaino di semi di finocchio, leggermente schiacciati","½–1 cucchiaino di peperoncino secco in fiocchi","Sale marino fino","Pepe nero"]},{"g":"Salsa verde alle erbe","i":["1 mazzetto abbondante di prezzemolo a foglia piatta, tritato finemente","1 uovo sodo","1 cucchiaino di capperi, tritati finemente","1–2 cucchiai di succo di limone (a piacere)","4–6 cucchiai di olio extravergine d&#039;oliva","Sale marino fino"]},{"g":"Affumicatura","i":["Trucioli di legno di melo"]}],"ins":["Asciugare la trota con carta da cucina.","Schiacciare leggermente i semi di finocchio.","Condire la trota con olio d'oliva, sale, pepe, peperoncino e semi di finocchio.","Tritare finemente il prezzemolo, l'uovo e i capperi per la salsa verde.","Mescolare la salsa verde con olio, succo di limone e sale e mettere da parte.","Lasciare riposare la trota per 10 minuti a temperatura ambiente.","Preriscaldare la griglia elettrica per l'affumicatura.","Preriscaldare la griglia elettrica Weber Lumin a 180 °C (impostazione affumicatura).","Aggiungere i trucioli di legno al vassoio dell'affumicatore e rimettere il coperchio.","Posizionare la trota con la pelle rivolta verso il basso sopra il vassoio.","Chiudere il coperchio e affumicare delicatamente.","Cuocere per 15–20 minuti, a seconda dello spessore.","Evitare di girare il pesce durante la cottura.","Togliere dal fuoco quando la carne è appena opaca e si sfalda."],"u":"https://www.weber.com/IT/it/ricette/pesce-frutti-di-mare/branzino-affumicato-con-peperoncino-semi-di-finocchio-e-salsa-verde-alle-erbe/weber-2500095.html"},{"n":"Tacos con carne asada","c":"Manzo","s":"6","d":"Facile","g":"230–250 °C / TEMPERATURA INTERNA: 54–57 °C (media-al sangue)","m":"Diretto","i":"https://content-images.weber.com/content/DSC8460.jpg","ig":[{"g":"Carne asada","i":["1,2 kg di scamone o di fianco di manzo","3 cucchiai di olio d&#039;oliva","succo di 2 lime","2 spicchi d&#039;aglio grattugiati finemente","1 cucchiaino di cumino macinato","1 cucchiaino di paprika affumicata","sale, pepe"]}],"ins":["Unire l'olio, il succo di lime, l'aglio, il cumino e la paprika.","Ricoprire uniformemente la carne e condire con sale e pepe.","Lasciare marinare per 30–60 minuti a temperatura ambiente.","Tagliare la cipolla a dadini e tritare il coriandolo.","Preparare le tortillas e i contorni.","Preparare il barbecue per la cottura diretta a circa 230–250 °C. Se si utilizza un barbecue a carbonella, accendere 1 accenditore a camino con bricchetti Weber.","Cuocere la carne direttamente sulla griglia a fuoco vivo per 2–3 minuti per lato fino a quando non sarà ben abbrustolita.","Togliere dalla griglia e lasciare riposare per 5 minuti.","Affettare sottilmente controfibra, quindi tagliare a pezzetti.","Scaldare le tortillas direttamente sulla griglia.","Comporre i tacos con carne di manzo, cipolla e coriandolo.","Completare con una spruzzata di lime e un cucchiaio di salsa."],"u":"https://www.weber.com/IT/it/ricette/manzo/tacos-con-carne-asada/weber-2500000.html"},{"n":"Panini alla cannella alla griglia con glassa","c":"Dolci & Bevande","s":"","d":"Medio","g":"190 °C","m":"Indiretto","i":"https://content-images.weber.com/content/cinnamon-buns.jpg","ig":[{"g":"Impasto","i":["300 ml di latte intero, tiepido (38–43 °C)","75 g di zucchero semolato (più 1 cucchiaio / 12 g per il lievito)","7 g di lievito secco a lievitazione rapida","1 cucchiaino di sale fino","3 uova grandi, a temperatura ambiente","750 g di farina 00","115 g di burro non salato, ammorbidito"]},{"g":"Ripieno","i":["200 g di zucchero di canna chiaro","4 cucchiaini di cannella in polvere","115 g di burro non salato, ammorbidito"]}],"ins":["Attivare il lievito: mescolare il latte tiepido, 1 cucchiaio di zucchero e il lievito; lasciare riposare per 5 minuti.","Aggiungere lo zucchero rimanente, il sale e le uova; mescolare per 1 minuto.","Con il gancio per impastare, aggiungere 700 g di farina e mescolare per amalgamare.","Aggiungere il burro e la farina rimanente; impastare fino a ottenere un composto morbido e liscio.","Trasferire in una ciotola unta d'olio, coprire e lasciare lievitare per 1 ora e mezza.","Mescolare lo zucchero di canna e la cannella per il ripieno.","Stendere l'impasto in un rettangolo di 60 × 30 cm.","Spalmare il burro ammorbidito in modo uniforme sull'impasto.","Cospargere uniformemente lo zucchero alla cannella.","Arrotolare strettamente dal lato lungo e sigillare il bordo.","Tagliare in 12 panini e disporli con il lato tagliato rivolto verso l'alto in una padella in ghisa da 25 cm unta.","Coprite con un foglio di alluminio e lasciate lievitare per 60 minuti (oppure mettete in frigo per una notte).","Preparare il barbecue per una cottura indiretta a calore medio, 190 °C.","Cuocere con il coperchio per 25 minuti, girare la padella, cuocere altri 10 minuti; rimuovere la carta stagnola e cuocere senza coperchio fino a doratura, 20–30 minuti.","Sbattere gli ingredienti della glassa fino a ottenere un composto omogeneo.","Spalmare sui panini caldi.","Lasciare riposare per 10 minuti prima di servire."],"u":"https://www.weber.com/IT/it/ricette/dolci-bevande/panini-alla-cannella-alla-griglia-con-glassa/weber-2495280.html"},{"n":"Spiedini di agnello alla tradizionale con salmoriglio","c":"Agnello","s":"4","d":"Facile","g":"300–350 °C / TEMPERATURA INTERNA: DOPO IL RIPOSO 55–58 °C (media, tradizionale per gli spiedini)","m":"Diretto","i":"https://content-images.weber.com/content/traditonal_lamp.jpg","ig":[{"g":"Agnello","i":["1 kg di spalla o coscia di agnello, tagliata a cubetti di 2–3 cm","Sale marino grosso (per condire dopo la cottura)"]}],"ins":["Tagliare l'agnello a cubetti di dimensioni uniformi.","Infilare l'agnello ben stretto su spiedini di metallo o di legno ammollati.","Non condire l'agnello prima della cottura.","Unire gli ingredienti del salmoriglio e mettere da parte.","Lasciare riposare l'agnello a temperatura ambiente per 30 minuti.","Preparare il barbecue Weber per cottura diretta, a 300–350 °C.","Preriscaldare la griglia per 15 minuti.","Pulire e ungere leggermente le griglie.","Posizionare gli spiedini direttamente sulla parte più calda della griglia.","Cuocere alla griglia per 6–8 minuti, girando spesso.","Togliere gli spiedini quando l'agnello è ben dorato all'esterno.","Condire immediatamente con sale marino grosso.","Servire gli spiedini di agnello caldi.","Accompagnare con salmoriglio tiepido.","Servire con pane croccante o focaccia alla griglia."],"u":"https://www.weber.com/IT/it/ricette/agnello/spiedini-di-agnello-alla-tradizionale-con-salmoriglio/weber-2495105.html"},{"n":"Filetti di pesce croccanti con salsa al burro e panna","c":"Pesce & Frutti di Mare","s":"4","d":"Medio","g":"230–250 °C / TEMPERATURA INTERNA: DOPO LA COTTURA Appena opaco, circa 60–62 °C","m":"Direct – Edge-to-Edge","i":"https://content-images.weber.com/content/DSC9398.jpg","ig":[{"g":"Capesante","i":["8 filetti piccoli di orata o spigola","2 cucchiai di olio","Sale marino fino","Pepe nero macinato fresco"]},{"g":"Salsa","i":["2 cucchiai di burro non salato","1 spicchio d&#039;aglio piccolo, grattugiato finemente","100 ml di vino bianco secco","200 ml di panna doppia","1 cucchiaino di senape di Digione","Succo di limone, q.b."]},{"g":"Per completare","i":["Prezzemolo o erba cipollina tritati"]}],"ins":["Condire leggermente le filetti con sale appena prima di grigliarle.","Dosare e preparare tutti gli ingredienti della salsa.","Preriscaldare il barbecue","Preparare la griglia per la cottura a calore diretto, 200–230 °C.","Preriscaldare con il coperchio chiuso per 15 minuti con i bruciatori al massimo.","Pulire bene le griglie e ungere i filetti con l'olio. Disporre i filetti con la pelle rivolta verso il basso senza spostarli.","Rosolare per 8-10 minuti fino a formare una crosta dorata.","Girare solo quando il pesce si stacca da solo dalla griglia. Potrebbero essere necessari altri 2 minuti.","Una volta croccante, dorato e cotto, rimuovere.","Sul fornello laterale, aggiungere il burro in una padella, poi l'aglio e cuocere brevemente.","Sfumare con il vino bianco e far ridurre della metà.","Aggiungere la panna e la senape di Digione, cuocere a fuoco lento per 2-3 minuti.","Completare con succo di limone, sale e pepe.","Versare la salsa sui filetti croccanti, guarnire con le erbe aromatiche e servire immediatamente."],"u":"https://www.weber.com/IT/it/ricette/pesce-frutti-di-mare/filetti-di-pesce-croccanti-con-salsa-al-burro-e-panna/weber-2494999.html"},{"n":"POLLO ARROSTO & SALSA VERDE da Jamie Oliver","c":"Jamie Oliver","s":"6","d":"Media","g":"180-200 °C  I TEMPERATURA AL CUORE DOPO IL RIPOSO 75 °C","m":"Indiretto","i":"https://content-images.weber.com/content/Jamie_chicken.png","ig":[{"g":"Ingredienti","i":["½ cucchiaino di semi di finocchio","1 mazzetto di erbe aromatiche miste, come rosmarino, prezzemolo a foglia piatta, timo, salvia (20 g)","1 limone","1 pollo intero ruspante da 1,8 kg","facoltativo: 200 ml di vino bianco","6 patate novelle grandi (100 g ciascuna)","olio extravergine di oliva","250 g di carotine baby multicolore","1 zucca violina","2 cipolle rosse grandi","3 barbabietole piccole","1 mazzetto di menta (30 g)","1 mazzetto di prezzemolo a foglia piatta (30 g)","2 spicchi d’aglio","4 cucchiai di capperi piccoli","6 cetriolini sott’aceto","5–6 filetti di acciuga","2 cucchiai di senape di Digione","olio extravergine di oliva","aceto di vino rosso","2 manciate di noci non salate"]}],"ins":["Riempi la ciminiera di accensione con i bricchetti. Sistema due cubetti accendifuoco sulla griglia del carbone e posiziona la ciminiera sopra.","Accendi i cubetti e scalda i bricchetti per circa 20 minuti, finché diventano grigi e leggermente coperti di cenere.","Posiziona due cestelli per carbone a forma di D ai lati opposti del barbecue, il più possibile vicini ai bordi, lasciando libero lo spazio centrale. Dividi i bricchetti caldi tra i due cestelli.","Inserisci la griglia di cottura, rimuovi l’anello centrale e chiudi il coperchio per far scaldare il barbecue, assicurandoti che le prese d’aria siano aperte.","Se li usi, metti le chips di legno in ammollo in una ciotola d’acqua. Spela le foglie di 1 rametto delle erbe miste e aggiungile all’acqua.","Nel frattempo pesta i semi di finocchio con mortaio e pestello, poi mescola con una buona presa di sale marino e pepe nero. Grattugia finemente un po’ di scorza di limone, aggiungi le foglie di 1 rametto di erbe miste e pesta il tutto. Incorpora 2 cucchiai di olio d’oliva e massaggia il composto su tutto il pollo.","Riempi il bicchiere centrale del supporto per pollo con la maggior parte delle erbe rimanenti. Taglia il limone in quattro, spremi il succo nel bicchiere, aggiungi 3 spicchi e versa 200 ml di acqua o vino bianco (se usato).","Sistema il pollo in verticale sul supporto, poi inserisci le erbe rimaste e l’ultimo spicchio di limone nella cavità superiore del pollo per trattenere i sapori.","Lava bene le patate, poi, una alla volta, mettile su un tagliere tra i manici di due cucchiai di legno. Incidi la patata a intervalli di poco meno di ½ cm, lasciando che i cucchiai impediscano al coltello di tagliare fino in fondo. Ripeti per tutte le patate.","Massaggia leggermente le patate con 1 cucchiaio di olio d’oliva, sala e pepa, quindi disponile nel cestello del supporto per pollo.","Lava le carote, condiscile con un filo d’olio, sale e pepe e aggiungile al cestello.","Lava la zucca, dividila in quattro per il lungo e rimuovi i semi. Spennella i pezzi con poco olio e condiscili con sale e pepe.","Metti le cipolle (senza sbucciarle) in una piccola teglia, poi lava, spunta e aggiungi le barbabietole. Posiziona la teglia sulla griglia del carbone, tra i due cestelli, e versa un po’ d’acqua per creare umidità.","Rimetti la griglia di cottura, sistema il pollo al centro e posiziona zucca e barbabietole vicino alle braci, ma non direttamente sopra.","Se usi le chips di legno, chiudi il coperchio e attendi che la temperatura raggiunga i 200 °C, con le prese d’aria completamente aperte. Aggiungi quindi le chips scolate sulle braci.","Chiudi il coperchio e cuoci per 1 ora e 30 minuti, finché il pollo è dorato e ben cotto (75 °C al cuore) e le verdure sono tenere e leggermente arrostite, girandole e spennellandole con olio di tanto in tanto.","Nel frattempo prepara la salsa verde: spunta e trita grossolanamente menta e prezzemolo, poi mettili al centro di un grande tagliere. Sbuccia e aggiungi l’aglio, poi capperi, cetriolini, acciughe e noci, continuando a tritare fino a ottenere un composto fine.","Trasferisci in una ciotola capiente e unisci la senape, 6 cucchiai di olio extravergine di oliva e 4 cucchiai di aceto di vino rosso. Assaggia e regola di sapore.","Quando il pollo è cotto, rimuovi il supporto dal barbecue. Togli la buccia dalle cipolle e affetta le barbabietole. Togli con attenzione il pollo dal supporto, porzionalo e servi al centro del tavolo con le patate Hasselback, le verdure e la salsa verde.","Consiglio: Preriscaldare il barbecue oltre i 100 °C lo sterilizzerà."],"u":"https://www.weber.com/IT/it/ricette/jamie-oliver/pollo-arrosto-salsa-verde-da-jamie-oliver/weber-2489869.html"},{"n":"Insalata di mais e pollo fatto da Jamie Oliver","c":"Jamie Oliver","s":"6","d":"Medio","g":": 280-300 °C (Temperatura al cuore (dopo il riposo): 75 °C)","m":"Diretto","i":"https://content-images.weber.com/content/JO_Webber_25142_0942_Chicken_Salad.jpg","ig":[{"g":"Ingredienti","i":["4 pannocchie di mais con le foglie","4 petti di pollo da 150 g ciascuno, allevati all’aperto","1 cucchiaino di paprika affumicata","50 g di popcorn (mais da scoppiare)","1 mazzetto di cipollotti","2 lattughe romane","2 cespi di lattuga romana","1 avocado","1 cetriolo","100 g di yogurt","1 cucchiaio di senape","1 cucchiaio di Tabasco","1 limone","50 g di Cheddar","1 mazzetto di erbette miste, come aneto, dragoncello ed erba cipollina (30 g)"]}],"ins":["Metti in ammollo le pannocchie (foglie incluse) in acqua fredda per almeno 30 minuti – se non trovi pannocchie con le foglie integre, puoi saltare questo passaggio.","Accendi tutti i bruciatori al massimo e lascia il coperchio aperto finché il termometro non segna circa 290 °C.","Scola le pannocchie, poi cuocile per 15 minuti, finché non risultano ben grigliate, girandole regolarmente. Trasferiscile quindi su un tagliere.","Condisci i petti di pollo su tutti i lati con paprika affumicata, sale e pepe nero. Cuocili per 7 minuti, o finché non sono dorati e completamente cotti, girandoli a metà cottura. Trasferiscili su un piatto a riposare.","Distribuisci il mais da scoppiare sul grasso rilasciato dal pollo e copri con la cupola di cottura. Lascia cuocere per 3 minuti, o finché il mais non sarà scoppiato, muovendo di tanto in tanto la cupola sulla piastra. Trasferisci il popcorn in una ciotola grande e condisci con un pizzico di sale.","Prepara il dressing: in una ciotola capiente unisci lo yogurt con la senape e il Tabasco. Spremi il limone, grattugia finemente il Cheddar e trita le erbette, poi mescola tutto fino a ottenere un condimento cremoso e uniforme.","Griglia i cipollotti per 5 minuti. Taglia le lattughe a metà e grigliale dal lato tagliato per 1 minuto. Elimina le parti dure e tagliale grossolanamente, aggiungendole man mano alla ciotola del dressing.","Sbuccia, snocciola e taglia grossolanamente l’avocado, poi fai lo stesso con il cetriolo. Aggiungi entrambi nella ciotola.","Rimuovi le foglie dalle pannocchie grigliate, poi con un coltello affilato taglia via i chicchi direttamente nella ciotola. Mescola bene tutta l’insalata, quindi trasferiscila su un grande piatto da portata o in ciotole individuali. Affetta il pollo grigliato e disponilo sopra, completando con il popcorn."],"u":"https://www.weber.com/IT/it/ricette/jamie-oliver/insalata-di-mais-e-pollo-fatto-da-jamie-oliver/weber-2479574.html"},{"n":"Tacos di manzo fatto da Jamie Oliver","c":"Jamie Oliver","s":"","d":"Medio","g":": 280-300 °C  (Temperatura al cuore (dopo il riposo): 70 °C)","m":"Diretto","i":"https://content-images.weber.com/content/JO_Webber_25142_0958_Beef_Tacos.jpg","ig":[{"g":"Ingredienti","i":["1 cipolla","1 peperoncino rosso fresco","3 peperoncini jalapeños freschi","3 pomodori verdi","1 mazzetto di coriandolo fresco (30 g)","2 lime","Olio extravergine d’oliva","1 avocado","500 g di carne macinata di manzo di qualità (spalla)","1 spicchio e mezzo d’aglio","1 cucchiaino di cumino secco","1 cucchiaino di origano secco","1 cucchiaino di paprika affumicata","1 cucchiaino di semi di coriandolo","8 piccole tortillas di farina","50 g di Cheddar","200 ml di panna acida"]}],"ins":["Accendi tutti i bruciatori al massimo e lascia il coperchio aperto finché il termometro non segna circa 290 °C.","Pela e dividi in quattro la cipolla, incidi leggermente il peperoncino rosso e i jalapeños, poi mettili sulla piastra rovente insieme ai pomodori interi. Scottali su tutti i lati per 8 minuti, quindi trasferisci tutto su un tagliere.","Quando gli ingredienti sono abbastanza freddi da poterli maneggiare, trita finemente il peperoncino rosso e tienilo da parte per la guarnizione. Pulisci i jalapeños e tritali finemente insieme al coriandolo (gambi compresi), tenendo da parte alcune foglie per servire. Trasferisci tutto in una ciotola, spremi sopra la maggior parte del succo di 1 lime e aggiungi 1 cucchiaio di olio extravergine d’oliva. Grattugia finemente mezzo spicchio d’aglio, mescola e regola con sale e pepe.","Taglia a metà l’avocado, rimuovi il nocciolo, sbuccialo e affettalo sottilmente. Condisci con il succo del lime rimasto e ½ cucchiaio di olio extravergine.","Metti la carne macinata in una ciotola grande, grattugia dentro l’aglio rimasto e aggiungi cumino, origano, paprika affumicata, semi di coriandolo e un buon pizzico di sale e pepe. Mescola bene con le mani per amalgamare.","Dividi il composto in 8 palline e sistemale sulla piastra ben calda, distanziandole uniformemente.","Appoggia una tortilla su ciascuna pallina di carne e usa la pressa per schiacciarle contro la piastra. Cuoci per 3 minuti, poi gira il tutto con una spatola. Grattugia sopra il formaggio e lascialo sciogliere mentre la tortilla si abbrustolisce sul fondo. Con la spatola, ripiega la tortilla a metà.","Trasferisci i tacos su un tagliere, aggiungi un cucchiaio di salsa verde, un po’ di panna acida e distribuisci l’avocado a fette. Completa con il peperoncino rosso tritato e le foglie di coriandolo tenute da parte. Servi con spicchi di lime da spremere."],"u":"https://www.weber.com/IT/it/ricette/jamie-oliver/tacos-di-manzo-fatto-da-jamie-oliver/weber-2479314.html"},{"n":"Sgombro affumicato a caldo fatto da Jamie Oliver","c":"Jamie Oliver","s":"2","d":"Medio","g":": 190-230 °C (Temperatura al cuore (dopo il riposo): 55–60 °C)","m":"Diretto","i":"https://content-images.weber.com/content/JO_Webber_25142_0985_Mackeral.jpg","ig":[{"g":"Ingredienti","i":["2 filetti di sgombro da 80 g ciascuno, provenienti da pesca sostenibile","1 limone e mezzo","300 g di patate novelle","300 g di barbabietole","5 cm di rafano fresco","2 cucchiai di yogurt","Olio extravergine d’oliva","160 g di crescione oppure misticanza di stagione","½ mazzetto di erba cipollina (10 g)"]}],"ins":["Metti a bagno una manciata di chips di legno per 30 minuti.","Prepara il barbecue posizionando la scatola per l’affumicatura sul lato sinistro e la griglia sul lato destro. Scola le chips e mettile nel nella scatola per l’affumicatura. Preriscalda il barbecue a fiamma alta per 15 minuti, o finché la scatola non inizia a fumare, quindi abbassa la temperatura a medio-bassa.","Condisci lo sgombro con sale marino su tutti i lati. Taglia 1 limone a metà.","Cuoci le patate novelle e le barbabietole sulla griglia, con il coperchio chiuso, per 25 minuti, girandole regolarmente, finché non saranno croccanti fuori e morbide dentro. Negli ultimi 10 minuti di cottura, cuoci lo sgombro sopra la scatola per l’affumicatura e negli ultimi 3 minuti griglia il limone dal lato tagliato.","Nel frattempo, pela e grattugia finemente il rafano in una ciotola capiente, poi mescolalo con lo yogurt. Spremi il limone grigliato, aggiungi 1 cucchiaio di olio extravergine d’oliva e regola il tutto con sale e pepe.","Dividi il crescione tra i piatti. Apri le patate novelle e distribuiscile sopra, aggiungendo qualche cucchiaio di dressing al rafano.","Quando le barbabietole sono abbastanza fredde da poterle maneggiare, rimuovi la buccia, mettile nel dressing rimasto e schiacciale leggermente con una forchetta. Dividile nei piatti e aggiungi lo sgombro affumicato sopra. Tritare finemente l’erba cipollina, spargila sul piatto e servi con spicchi di limone da spremere al momento."],"u":"https://www.weber.com/IT/it/ricette/jamie-oliver/sgombro-affumicato-a-caldo-fatto-da-jamie-oliver/weber-2479270.html"},{"n":"Bistecca alla griglia con noodles fatto da Jamie Oliver","c":"Jamie Oliver","s":"2","d":"Medio","g":": 290-315 °C (Temperatura al cuore (dopo il riposo): 56 °C)","m":"Diretto","i":"https://content-images.weber.com/content/JO_Webber_25142_0997_Beef_Noodles.jpg","ig":[{"g":"Ingredienti","i":["2 controfiletti di manzo da 150 g ciascuno","1 gambo di lemongrass","2 spicchi d’aglio","1 pezzo di zenzero da 3 cm","1 cucchiaio di salsa chili dolce","1 cucchiaio di salsa di pesce","3 lime","20 g di arachidi non salate","1 cucchiaio di salsa sriracha","1 mazzetto di cipollotti","160 g di taccole","150 g di noodles di riso larghi o udon","1 cucchiaio di salsa di soia a basso contenuto di sale","Olio d’oliva","½ mazzetto di coriandolo fresco (15 g)"]}],"ins":["Tira fuori la bistecca dal frigorifero e lasciala riposare finchè arriva a temperatura ambiente, quindi condiscila bene su tutti i lati con sale marino e pepe nero.","Preriscalda il barbecue alla massima potenza con la piastra installata.","Nel frattempo, prepara il dressing. Elimina gli strati esterni del lemongrass e trita finemente la parte centrale più morbida, trasferendola in una ciotola. Pela l’aglio e lo zenzero, quindi grattugia finemente mezzo spicchio d’aglio (metti da parte il resto) e tutto lo zenzero. Aggiungi la salsa chili dolce e la salsa di pesce, spremi il succo di 2 lime e mescola tutto.","Cuoci la bistecca sulla piastra rovente per 4–6 minuti, con il coperchio abbassato, girandola a metà cottura, finché non è cotta come preferisci. Trasferiscila su un piatto, cospargila con un po’ di dressing e lasciala riposare.","Tosta le arachidi sulla piastra, versando sopra un po’ di sriracha e mescolando finché non sono ben ricoperte, poi trasferiscile su un piatto.","Pela e affetta finemente l’aglio rimasto. Pulisci i cipollotti: taglia finemente la parte verde e mettila in acqua e ghiaccio per farla arricciare; taglia la parte bianca in pezzi da 3 cm. Reidrata i noodles seguendo le istruzioni della confezione.","Salta l’aglio, i cipollotti bianchi e le taccole con la salsa di soia e 1 cucchiaio di olio d’oliva sulla piastra per 5 minuti, finché non saranno ben scottati. Aggiungi i noodles per gli ultimi 2 minuti, poi distribuisci tutto nelle ciotole.","Affetta la bistecca e disponila sopra i noodles, irrorando con il dressing rimasto e con i succhi della carne.","Aggiungi il coriandolo, scola la parte verde dei cipollotti e spargila sul piatto insieme alle arachidi tostate. Servi con spicchi di lime da spremere sopra."],"u":"https://www.weber.com/IT/it/ricette/jamie-oliver/bistecca-alla-griglia-con-noodles-fatto-da-jamie-oliver/weber-2479195.html"},{"n":"Spiedini di alette di pollo fatto da Jamie Oliver","c":"Jamie Oliver","s":"6","d":"Medio","g":": 260°C (Temperatura al cuore (dopo il riposo): 75 °C)","m":"Indiretto e diretto","i":"https://content-images.weber.com/content/JO_Webber_25142_3907_Buffalo_Chicken_Wings.jpg","ig":[{"g":"Ingredienti","i":["6 patate da forno","Olio d’oliva","30 ali di pollo allevati all’aperto","1 cucchiaio di paprika dolce affumicata","1 cucchiaio di aglio in polvere","20 g di burro","4 cucchiai di salsa piccante","4 cucchiai di salsa Worcestershire","4 cucchiai di miele liquido","1 mazzetto di cipollotti","100 g di Cheddar","2 cucchiai di panna acida","1 mazzetto di erba cipollina (20 g)"]}],"ins":["Metti a bagno una manciata di chips di legno in acqua per 30 minuti.","Scola le chips, trasferiscile nella smoker box e posizionala sul lato sinistro del barbecue. Accendi tutti i bruciatori a medio-alto e preriscalda con il coperchio chiuso per 15 minuti, o finché il termometro non indica circa 260 °C e la smoker box inizia a fumare. Poi spegni i bruciatori di sinistra per creare una zona di cottura indiretta.","Strofina le patate con un po’ d’olio d’oliva e cuocile nella parte calda della griglia superiore (griglia di riscaldamento), con il coperchio chiuso, per 1 ora e 30 minuti, finché non saranno morbide dentro e croccanti fuori, girandole ogni tanto.","Asciuga le ali di pollo con carta da cucina. Usa un coltello affilato per rimuovere la punta dell’ala, quindi infilza le ali su 5 spiedini lunghi, passandoli tra le ossa. Condisci con 1 cucchiaio di olio d’oliva.","Mescola la paprika affumicata e l’aglio in polvere con 1 cucchiaino di sale marino e 1 cucchiaio di pepe nero. Rosola gli spiedi di ali nella zona diretta per 2 minuti, poi trasferiscili nella zona indiretta e cuoci per 1 ora, finché non saranno teneri e ben croccanti, girandoli e spolverizzandoli con il mix di spezie di tanto in tanto.","Per la salsa buffalo, sciogli il burro, la salsa piccante, la Worcestershire e il miele in un pentolino sul fornello laterale, mescolando ogni tanto; poi togli dal fuoco e versa in una ciotola metallica grande.","Griglia i cipollotti per 3 minuti sul lato caldo della griglia, girandoli a metà cottura.","Quando le patate sono pronte, tagliale a metà nel senso della lunghezza e preleva la polpa con un cucchiaio in una ciotola — lascia circa ½ cm di patata attaccato alla buccia, così mantengono la forma.","Grattugia grossolanamente la maggior parte del Cheddar nella ciotola delle patate e aggiungi la panna acida. Pulisci e affetta finemente i cipollotti, aggiungili alla ciotola insieme alla maggior parte dell’erba cipollina. Condisci con un pizzico di pepe nero e mescola, schiacciando leggermente le patate.","Riempi la parte esterna delle patate con il composto, grattugia sopra il Cheddar rimasto e rimetti nella zona indiretta del barbecue per 2 minuti, finché il formaggio non sarà fuso.","Rimuovi le ali dagli spiedi e tuffale nella ciotola con la salsa buffalo, mescolando per ricoprirle bene. Trita finemente l’erba cipollina rimasta e spargila sopra. Servi insieme alle patate farcite. Ottime con una fresca insalata verde."],"u":"https://www.weber.com/IT/it/ricette/jamie-oliver/spiedini-di-alette-di-pollo-fatto-da-jamie-oliver/weber-2479168.html"},{"n":"Lombo di maiale fatto da Jamie Oliver","c":"Jamie Oliver","s":"10","d":"Medio","g":": 180-190 °C  (Temperatura al cuore (dopo il riposo): 68–70 °C)","m":"Indiretto/Diretto","i":"https://content-images.weber.com/content/JO_Webber_25142_0912_Pork_Loin.jpg","ig":[{"g":"Ingredienti","i":["2 cucchiaini di semi di finocchio","1 cucchiaino di fiocchi di peperoncino","Aceto di vino rosso","Olio d’oliva","2 kg di lombo di maiale di qualità, disossato e senza cotenna","2 rametti di rosmarino fresco","6 cipolle rosse","6 mele","1 mazzo di salvia fresca (20 g)","100 g di pane raffermo grattugiato","2 cavoli cappucci “Hispi” (o cuori di cavolo)","2 cucchiai di miele liquido","2 cucchiai di senape inglese","2 vasetti da 540 g di fagioli bianchi","150 g di rucola","1 limone"]}],"ins":["Metti a bagno 2 manciate di chips di legno in acqua per 30 minuti.","Accendi tutti i bruciatori a calore diretto medio-alto e la zona di rosolatura (sear zone) al massimo. Scalda con il coperchio chiuso per 15 minuti o finché il termometro non segna circa 260 °C. Poi spegni i bruciatori di sinistra per creare una zona di cottura indiretta e abbassa i bruciatori centrali al minimo.","In un mortaio, pesta i semi di finocchio e i fiocchi di peperoncino con 1 cucchiaino di sale marino e 1 cucchiaino di pepe nero fino a ottenere una polvere, poi aggiungi 1 cucchiaio di aceto di vino rosso e 1 cucchiaio di olio d’oliva.","Incidi il grasso del maiale con tagli incrociati, quindi massaggia la carne con il mix di spezie, assicurandoti che penetri bene in ogni fessura.","Posiziona il maiale sulla sear zone, con la parte della carne rivolta verso il basso, e cuoci per 10 minuti, girandolo regolarmente, finché non è dorato su tutti i lati. Poi spostalo nella zona indiretta con la parte grassa rivolta verso l’alto.","Scola le chips di legno, trasferiscile nella smoker box, posizionala sulla zona diretta e spegni la sear zone.","Infila gli aghi del rosmarino nelle incisioni del maiale, quindi chiudi il coperchio. Il termometro dovrebbe segnare 180–190 °C: regola i bruciatori se necessario.","Pela le cipolle e svuota le mele. Tritura finemente metà delle foglie di salvia e mescolale con il pangrattato, 1 cucchiaio di olio d’oliva, un pizzico di sale e pepe, quindi riempi le mele con il composto.","Cuoci le cipolle e le mele ripiene sulla zona indiretta della griglia superiore (griglia di riscaldamento), sopra al maiale, per 1 ora con il coperchio chiuso. Quando mancano 30 minuti, aggiungi i cavoli interi nella zona centrale per cuocerli finché non saranno morbidi dentro e bruciacchiati fuori, girandoli a metà cottura.","Nel frattempo, mescola miele e senape in una ciotola con 1 cucchiaio di olio d’oliva e 1 cucchiaino di aceto di vino rosso.","Quando la temperatura interna del maiale raggiunge i 65 °C, trasferiscilo su un piatto o una ciotola grande e lascialo riposare per 30 minuti mentre finisci il resto.","Sposta i cavoli cotti su un tagliere, elimina le foglie esterne più bruciate e taglia grossolanamente il cuore morbido. Condisci con la glassa di miele e senape, un pizzico di sale, pepe e 1 cucchiaio di olio d’oliva, poi trasferisci in una ciotola da portata (oppure tienili al caldo in una teglia adatta al barbecue, nella zona indiretta).","Quando 1 cipolla e 1 mela ripiena sono morbide, rimuovi e scarta la buccia esterna della cipolla e trita tutto grossolanamente. Metti in una piccola teglia con 1 cucchiaio di olio. Trasferisci sul fornello laterale a gas a fuoco medio e, quando iniziano a sfrigolare, aggiungi i fagioli bianchi con tutto il loro liquido, insieme a ½ cucchiaio di aceto di vino rosso. Porta a ebollizione, regola di sale e pepe, abbassa la fiamma e lascia sobbollire dolcemente.","Affetta il maiale su un grande tagliere e irroralo con i suoi succhi. Condisci la rucola con il succo di limone. Trasferisci i fagioli nel piatto dove il maiale ha riposato (così assorbiranno i succhi, super saporiti), oppure in una ciotola, e completa con la rucola al limone. Servi insieme alle mele ripiene, alle cipolle morbide e al cavolo al miele e senape."],"u":"https://www.weber.com/IT/it/ricette/jamie-oliver/lombo-di-maiale-fatto-da-jamie-oliver/weber-2479023.html"},{"n":"QUESADILLAS VEGETARIANE","c":"Ricette BBQ","s":"6","d":"Easy","g":"200–220 °C","m":"Direct","i":"https://content-images.weber.com/content/Quesadillas.jpg","ig":[{"g":"Ingredienti","i":["400 g di fagioli neri in scatola","150 g di verdure miste cotte (ad esempio peperoni, cipolle, funghi), tritate","150 g di formaggio grattugiato (ad esempio cheddar, mozzarella o Red Leicester)","6 tortillas di farina","100 ml di salsa o pomodori freschi/in scatola tritati","2 cucchiaini di cumino macinato","2 cucchiaini di paprika affumicata","Sale e pepe nero macinato, a piacere","4 cucchiai di erbe fresche tritate (ad esempio coriandolo, prezzemolo o basilico)","1 cucchiaio di olio per cucinare","Guarnizioni facoltative: panna acida, salsa extra, spicchi di lime o erbe aromatiche tritate"]}],"ins":["In una ciotola capiente unire i fagioli neri, le verdure, il formaggio grattugiato, la salsa di pomodoro, il cumino, la paprika affumicata, le erbe aromatiche, il sale e il pepe. Mescolare bene.","Distribuire sulle tortillas una generosa porzione di ripieno su metà di ogni tortilla.","Ripiegare la metà vuota della tortilla formando un semicerchio. Premere delicatamente per sigillare.","Preriscaldare la piastra Weber a 200–220 °C.","Oliare leggermente la superficie di cottura.",".Disporre le quesadillas direttamente sulla piastra calda.","Cuocere per 3-4 minuti per lato, premendo delicatamente con una spatola fino a quando non saranno dorati e croccanti e il formaggio sarà completamente sciolto.","Togliere dalla piastra e lasciare riposare per un minuto prima di tagliarle.","Tagliarle e servirle calde.","Guarnire con panna acida, salsa e una spolverata di erbe fresche."],"u":"https://www.weber.com/IT/it/ricette/ricette-barbecue/quesadillas-vegetariane/weber-2477881.html"},{"n":"Polenta fritta farcita con prosciutto crudo e Fontina","c":"Maiale","s":"6","d":"Facile-intermedio","g":"180-230°C","m":"","i":"https://content-images.weber.com/content/fried-polenta.jpg","ig":[{"g":"Per la base di polenta","i":["300 g di polenta istantanea","700 ml di brodo vegetale o acqua","20 g di burro","Sale e pepe nero, q.b.","Olio extravergine d’oliva, per friggere"]}],"ins":["Per la polenta: Portare a ebollizione il brodo o l’acqua, poi versare lentamente la polenta mescolando con una frusta. Cuocere a fuoco basso, mescolando regolarmente, finché la polenta risulta densa e liscia (circa 3–5 minuti per la polenta istantanea).","Incorporare il burro, aggiustare di sale e pepe e mescolare fino a ottenere una consistenza lucida.","Lasciare raffreddare: Versare la polenta calda in una teglia leggermente oliata, livellandola a uno spessore di circa 2-3 cm. Lasciare raffreddare completamente, poi trasferire in frigorifero fino a quando sarà ben soda (circa 1 ora). Una volta rassodata, tagliare la polenta a spicchi o rettangoli.","Preparare il barbecue per una cottura a calore diretto, a circa 180–230 °C. Se si utilizza un barbecue a carbone, saranno sufficienti circa ½ ciminiera di bricchetti accesi. Scaldare la pietra pizza su fuoco medio-alto, spennellandola generosamente con olio.","Friggere i pezzi di polenta per 4–5 minuti per lato, finché risultano dorati e croccanti. Guarnire ogni pezzo di polenta con una fetta di Fontina e una fetta di prosciutto crudo.","Coprire con una campana da cottura e lasciare sulla piastra per 1–2 minuti, finché il formaggio si scioglie. Trasferire su un piatto o un vassoio da portata.","Completare con un filo di olio al tartufo, le briciole di castagne tostate, le foglioline di timo e il prezzemolo o l’erba cipollina tritati.","Servire immediatamente mentre la Fontina è ancora fusa e la polenta croccante: un piccolo piatto confortante ispirato alla cucina del Nord Italia, con un equilibrio di sapori salati, cremosi e nocciolati."],"u":"https://www.weber.com/IT/it/ricette/ricette-barbecue/polenta-fritta-farcita-con-prosciutto-crudo-e-fontina/weber-2477784.html"},{"n":"PANINO CON BISTECCA DI MANZO RIBEYE","c":"Manzo","s":"4","d":"Facile","g":"Fuoco alto","m":"Diretto e indiretto","i":"https://content-images.weber.com/content/Ribeye-sandwich.jpg","ig":[{"g":"Ingredienti","i":["2 bistecche ribeye da 300 g","2 cipolle bianche grandi, tagliate ad anelli spessi","2 cucchiai di miele liquido","1 cucchiaino di foglie di timo fresco","2 cucchiai di olio d&#039;oliva","2 spicchi d&#039;aglio schiacciati","4 pagnotte","2 cucchiai di senape americana","Sale marino e pepe nero macinato fresco"]}],"ins":["Togliere le bistecche dal frigorifero 30 minuti prima della cottura per portarle a temperatura ambiente.","Mescolare l'olio d'oliva, l'aglio schiacciato, il sale e il pepe, quindi strofinare il composto sulle bistecche. Mettere da parte.","In una piccola ciotola, unire il miele e il timo fresco. Spennellare questo composto sugli anelli di cipolla e mettere da parte.","Tagliare il pane a metà e cospargere leggermente con olio d'oliva.","Preparare il barbecue per la cottura indiretta a circa 130 °C. Se si utilizza un barbecue a carbonella, accendere ½ accenditore a camino di bricchetti Weber e impostare il calore indiretto.","Preriscaldare la piastra a fuoco alto per 10-15 minuti.","Mettere gli anelli di cipolla sulla piastra e grigliarli per 4-5 minuti per lato fino a quando non saranno dorati e caramellati, spennellandoli di tanto in tanto con altra glassa al miele e timo. Passate al calore indiretto per mantenerli caldi.","Rosolare le bistecche a fuoco alto diretto per 2-3 minuti per lato per una cottura media-al sangue (più a lungo se si preferisce). Lasciare riposare per 5 minuti prima di affettarle spesse controfibra.","Tostare leggermente le fette di pane con il lato tagliato rivolto verso il basso sulla piastra fino a renderle croccanti e dorate.","Spalmare la senape americana sul pane tostato.","Disporre uno strato di cipolle grigliate e la bistecca, quindi premere leggermente sulla griglia per 30 secondi per riscaldare."],"u":"https://www.weber.com/IT/it/ricette/manzo/panino-con-bistecca-di-manzo-ribeye/weber-2477728.html"},{"n":"CAESERONI","c":"Pane & Pizza","s":"4-6","d":"Medio","g":"250–280 °C","m":"Diretto","i":"https://content-images.weber.com/content/Caseroni.jpg","ig":[{"g":"Per la pizza","i":["500 g di pasta per pizza (fatta in casa o già pronta)","2 cucchiai di olio d&#039;oliva","150 g di mozzarella grattugiata","80 g di parmigiano o pecorino grattugiato","100 g di salame affettato","1 cucchiaino di origano essiccato"]},{"g":"Per l'insalata Caesar","i":["1 lattuga romana piccola, tagliata a striscioline","50 g di parmigiano, tagliato a scaglie","2 cucchiai di salsa Caesar","Croutons (facoltativi, per dare croccantezza)"]}],"ins":["Preparare la salsa Caesar mescolando in una ciotola maionese, aglio, senape, acciuga, succo di limone, sale e pepe. Mettere in frigo fino al momento dell'uso.","Condire la lattuga tagliata a striscioline con la salsa e le scaglie di parmigiano. Aggiungere i crostini per dare croccantezza, se lo si desidera. Mettere da parte in frigorifero mentre si cuoce la pizza.","Stendere l'impasto della pizza in 4 dischi medi (circa 20 cm ciascuno) e spennellare leggermente con olio d'oliva.","Preriscaldare il barbecue Weber per la cottura diretta a circa 250-280 °C. Se si utilizza una pietra per pizza, posizionarla sulla griglia e lasciarla preriscaldare per 10-15 minuti. Se si utilizza una piastra Weber, preriscaldarla a fuoco alto e spennellarla con olio d'oliva.","Adagiare le basi della pizza sulla superficie calda e cuocere per 2-3 minuti per lato, fino a quando non saranno leggermente abbrustolite.","Aggiungere mozzarella, parmigiano, salame piccante e origano su ogni base. Chiudere il coperchio e continuare la cottura per 3-4 minuti, fino a quando il formaggio non si sarà sciolto e non formerà delle bollicine e la crosta non sarà dorata.","Togliere le pizze dalla griglia e lasciarle riposare per 1-2 minuti affinché si raffreddino leggermente.","Aggiungere una generosa manciata di insalata Caesar fredda su una metà di ogni pizza.","Piegare la pizza a metà come un panino e premere delicatamente. Tagliare a fette e servire calda: pizza affumicata all'esterno, Caesar fresca e croccante all'interno."],"u":"https://www.weber.com/IT/it/ricette/ricette-barbecue/caeseroni/weber-2477602.html"},{"n":"DOUBLE BACON & CHEESE BURGER CON MAIONESE AL MIELE E PEPERONCINO","c":"Manzo","s":"6","d":"Media","g":"120 °C (indiretta), 260 °C (diretta), Temperatura interna: 75 °C","m":"Diretto/Indiretto","i":"https://content-images.weber.com/content/Bacon-Cheese-Burger.jpg","ig":[{"g":"Per gli hamburger","i":["960 g di carne macinata (20% di grassi)","90 g di burro salato ammorbidito","1½ cucchiaino di sale","2½ cucchiaini di pepe nero macinato","12 fette di formaggio cheddar affumicato","24 fette di pancetta affumicata senza cotenna","6 panini per hamburger (brioche, pretzel o semplici tipo ciambella)"]}],"ins":["In una grande ciotola, unire la carne macinata con sale, pepe e burro ammorbidito. Mescolare delicatamente, evitando di lavorare troppo la carne per mantenerne la consistenza leggera.","Dividere in 12 porzioni uguali e formare degli hamburger con l'apposita pressa.","Preparare la maionese al miele e peperoncino mescolando tutti gli ingredienti in una piccola ciotola fino a ottenere un composto omogeneo. Regolare il miele e il peperoncino a piacere, quindi conservare in frigorifero fino al momento dell'uso.","Preparare il barbecue per la cottura indiretta a circa 120 °C. Sul barbecue a carbone Performer, accendere ½ accenditore a camino di bricchetti Weber e impostare il calore indiretto.","Aggiungere una manciata di trucioli o pezzi di legno per ottenere un legger
