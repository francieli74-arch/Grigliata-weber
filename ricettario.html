o aroma affumicato.","Posizionare gli hamburger e le fette di pancetta sul calore indiretto, chiudere il coperchio e affumicare per circa 30 minuti.","Spostare gli hamburger e la pancetta sul calore diretto per finire la cottura, rosolando fino a quando la pancetta è croccante e gli hamburger sono cotti (temperatura interna 75 °C).","Dopo aver girato gli hamburger, coprite ogni hamburger con una fetta di formaggio. Una volta sciolto, impilate due hamburger per burger, alternando le fette di pancetta.","Tostare leggermente i panini sul fuoco diretto fino a doratura.","Spalmare la maionese al peperoncino e miele su entrambi i lati dei panini, assemblare gli hamburger e completare con un filo di miele, se lo si desidera.","Servire immediatamente: affumicato, succoso, dolce e piccante."],"u":"https://www.weber.com/IT/it/ricette/ricette-barbecue/double-bacon-cheese-burger-con-maionese-al-miele-e-peperoncino/weber-2477483.html"},{"n":"Mini burger di polpette con crema al gorgonzola","c":"Pane & Pizza","s":"","d":"Facile-intermedio","g":"180-230°C","m":"Direct","i":"https://content-images.weber.com/content/meatball_sliders.jpg","ig":[{"g":"Per le polpette","i":["300 g di macinato di manzo","300 g di macinato di maiale","1 cipolla piccola, tritata finemente","1 spicchio d’aglio, schiacciato","40 g di pangrattato fresco","1 uovo, sbattuto","30 g di Parmigiano Reggiano grattugiato","1 cucchiaio di prezzemolo tritato","Sale e pepe nero macinato fresco","Olio extravergine d’oliva, per la cottura"]},{"g":"Per la crema al gorgonzola","i":["150 g di Gorgonzola Dolce","100 ml di panna fresca","Una noce di burro","Un pizzico di pepe nero"]}],"ins":["In una ciotola capiente unire la carne macinata di manzo, il maiale, la cipolla, l'aglio, il pangrattato, l'uovo, il parmigiano, il prezzemolo, il sale e il pepe.","Mescolare bene fino a ottenere un composto omogeneo, quindi formare 12 polpette di dimensioni uguali.","Preparare il barbecue per una cottura a calore diretto, a circa 180–230 °C. Se utilizzi un barbecue a carbone, saranno sufficienti circa ½ ciminiera di bricchetti accesi. Scaldare una piastra su fuoco medio-alto, spennellandola leggermente con olio.","Cuocere le polpette per circa 8–10 minuti, girandole di tanto in tanto, finché risultano ben dorate su tutti i lati e cotte all’interno, tenere al caldo.","Appoggiare un pentolino sulla piastra e fai sciogliere il burro, aggiungere la panna e scaldarla delicatamente poi sbriciolare il gorgonzola direttamente dentro il pentolino.","Mescolare finché il formaggio si scioglie completamente, ottenendo una salsa liscia e vellutata. Completare con un pizzico di pepe nero.","Tagliare a metà i panini, adagiare la parte inferiore sulla piastra e tostarla per 2–3 minuti, finché non sarà leggermente dorata.","Distribuire un po’ di crema al gorgonzola sulla base del pane tostato. Disporre sopra le polpette ancora calde. Aggiungere altra crema al gorgonzola, qualche foglia di rucola e richiudi con la parte superiore dei panini. Spennellare la superficie con burro fuso; se disponibile, puoi coprire con una campana da cottura per farli intiepidire leggermente al vapore. Servire caldi, accompagnando con altra crema al gorgonzola a parte per intingere. La morbidezza del pan brioche, la ricchezza del formaggio, la nota pepata della rucola e il gusto pieno delle polpette rendono questo piatto perfetto da condividere."],"u":"https://www.weber.com/IT/it/ricette/pane-pizza/mini-burger-di-polpette-con-crema-al-gorgonzola/weber-2475664.html"},{"n":"Focaccia alla griglia con mortadella, crema di pistacchio e rucola","c":"Pane & Pizza","s":"6","d":"Facile","g":"180-230°C","m":"diretto","i":"https://content-images.weber.com/content/italien_flatbread.jpg","ig":[{"g":"Per la focaccia","i":["Impasto per pizza – pronto all&#039;uso (acquistato in negozio o fatto in casa), sufficiente per 6 focacce"]},{"g":"Per il ripieno","i":["12–15 fette di Mortadella","6–8 cucchiai di crema di pistacchio (vedi sotto)","2-3 mozzarelle di bufala","2 grandi manciate di rucola fresca","Olio extravergine d’oliva, per spennellare"]}],"ins":["Preparare la crema di pistacchio inserendo i pistacchi in un piccolo mixer e frullandoli fino a ottenere una granella molto fine. Aggiungi la ricotta, l’olio extravergine e il sale, quindi frulla fino a ottenere una crema liscia e omogenea.","Regolare la consistenza aggiungendo altro olio o un po’ di acqua tiepida, se necessario. Metti da parte fino al momento dell’utilizzo.","Dividere l’impasto della pizza crudo in sei porzioni e stendi ciascuna fino a uno spessore di circa 5 mm.","Prepara il barbecue per una cottura a calore diretto, a circa 180–230 °C. Se utilizzi un barbecue a carbone, saranno sufficienti circa ½ ciminiera di bricchetti accesi.","Scalda la pietra pizza su fuoco medio-alto, spennellandola leggermente con olio. Cuoci la pasta per pizza per 2–3 minuti per lato, finché compaiono bolle scure e il pane risulta morbido ma leggermente croccante ai bordi. Tieni in caldo.","Adagia le fette di mortadella sulla piastra calda e scottale leggermente per 30–45 secondi per lato.","Aggiungere uno strato di mortadella, mozzarella e rucola fresca. Copri con le restanti focacce e premere delicatamente. Rimettere ogni focaccia sulla piastra o sulla lastra di ardesia e cuocere per 2-3 minuti per lato fino a quando non saranno ben calde, leggermente dorate e il ripieno inizierà a sciogliersi. Tagliare a metà e servire calde."],"u":"https://www.weber.com/IT/it/ricette/ricette-barbecue/focaccia-alla-griglia-con-mortadella-crema-di-pistacchio-e-rucola/weber-2475575.html"},{"n":"PANINI CON PULLED PORK IN STILE CAROLINA (Weber® Smoque Edition)","c":"Maiale","s":"12-16","d":"","g":"60–135°C","m":"","i":"https://content-images.weber.com/content/pulled-pork.jpg","ig":[{"g":"Per il maiale","i":["1 spalla di maiale con osso (circa 2,5–3,5 kg)","1 cucchiaio di sale"]},{"g":"Per il coleslaw","i":["½ cavolo cappuccio, tritato finemente","60 ml di aceto di mele","50 ml di ketchup","30 g di zucchero di canna chiaro","15 ml di acqua","¼ cucchiaino di sale","¼ cucchiaino di pepe nero","¼ cucchiaino di peperoncino secco in fiocchi"]}],"ins":["Eliminare eventuali pezzi di grasso dalla spalla di maiale. Condire bene con il sale. Se il tempo lo consente, lasciarla riposare scoperta in frigorifero per una notte per favorire la formazione della crosta.","Preparare l'insalata unendo il cavolo, l'aceto, il ketchup, lo zucchero, l'acqua, il sale, il pepe nero e il peperoncino in una ciotola capiente. Mescolare bene e conservare in frigorifero fino al momento di servire.","In un pentolino, unire tutti gli ingredienti della salsa, portare a ebollizione a fuoco medio-alto, quindi togliere dal fuoco. Mettere da parte 250 ml di salsa per il servizio; il resto verrà usato per spennellare la carne durante la cottura.","Impostare il barbecue a carbone Weber Kettle per una cottura a bassa temperatura (110–135 °C). Preriscaldare per 15–20 minuti e pulire le griglie se necessario. Posizionare la spalla di maiale nel bbq con il lato grasso rivolto verso l’alto. Chiudere il coperchio e cuocere per 1 ora prima di iniziare a spennellare.","Dopo la prima ora, iniziare a spennellare la carne con la salsa ogni ora. Continuare fino a quando la crosta diventa di un colore rosso-bruno intenso e lucido, in genere dopo circa 6 ore. A questo punto la carne inizierà a rilasciare umidità e non sarà più necessario spennellare frequentemente.","Avvolgere la spalla in un doppio strato di butcher paper, lasciando un po’ di spazio per l’aria ed evitando di stringere troppo. Rimettere la carne sulla griglia e continuare la cottura per altre 2–4 ore, finché una sonda entra facilmente e la temperatura interna raggiunge 93–94 °C.","Avvolgere la carne in un doppio strato di carta da macellaio, lasciando un po' di spazio per l'aria ma evitando di stringere troppo. Rimettere la carne avvolta sulla griglia e continuare la cottura per altre 2-4 ore, o fino a quando una sonda scivola facilmente e la temperatura interna raggiunge i 93-94 °C.","Togliere il maiale dal barbecue, aprire con attenzione l’involucro e lasciare fuoriuscire il vapore. Quando smette di fumare, richiuderlo in modo morbido e trasferirlo in un contenitore termico per farlo riposare 2–4 ore, finché la temperatura interna scende a 60–65 °C.","Poco prima di servire, riscaldare la salsa messa da parte fino a ebollizione. Sfilacciare o tagliare il maiale in bocconcini, quindi mescolare circa 120 ml di salsa calda con la carne.","Preparare dei panini utilizzando morbidi panini bianchi, una generosa porzione di maiale e un po' di insalata di cavolo fredda. Servire la salsa rimanente a parte.","Suggerimenti e note: Avvolgere il maiale (comunemente chiamato Texas Crutch) aiuta a superare lo \"stallo\", un plateau di temperatura che può durare per ore. Molti pitmaster scelgono di avvolgerlo una volta che la temperatura interna raggiunge i 74 °C (165 °F), ma utilizzate sempre l'aspetto e la consistenza della crosta come guida finale. Se sembra giusto, è il momento di avvolgerlo."],"u":"https://www.weber.com/IT/it/ricette/maiale/panini-con-pulled-pork-in-stile-carolina-weber-smoque-edition/weber-2473465.html"},{"n":"ONGLET ALLA GRIGLIA CON BURRO COMPOSTO CAFÉ DE PARIS","c":"Manzo","s":"6","d":"Intermedio","g":"alta (270–300 °C)","m":"Diretto e indiretto","i":"https://content-images.weber.com/content/onglet-steak.jpg","ig":[{"g":"Ingredienti","i":["3 bistecche di onglet (fesa), circa 280-300 g ciascuna","2 cucchiai di olio d&#039;oliva","Sale marino e pepe nero macinato fresco","200 g di burro non salato, ammorbidito","1 scalogno piccolo, tritato finemente","2 cucchiaini di senape di Digione","1 cucchiaino di capperi tritati finemente","1 cucchiaino di pasta di acciughe (facoltativo)","2 cucchiaini di succo di limone","1 cucchiaino di curry in polvere delicato","1 cucchiaio di prezzemolo a foglia piatta tritato finemente","1 cucchiaino di salsa Worcestershire"]}],"ins":["Per preparare il burro Café de Paris, unire tutti gli ingredienti in una ciotola e mescolare fino a ottenere un composto omogeneo. Formare un rotolo con l'aiuto della carta da forno e riporre in frigorifero fino a quando non si sarà solidificato.","Togliere le bistecche di onglet dal frigorifero 30-45 minuti prima della cottura per portarle a temperatura ambiente.","Condire le bistecche con olio d'oliva, salare e pepare abbondantemente e mettere da parte.","Tagliare il burro composto raffreddato a rondelle pronte per essere servite.","Preparare il barbecue per una cottura a due zone a circa 290 °C. Se si utilizza un barbecue a carbonella, accendere 1 ciminiera di bricchetti Weber e impostare il calore diretto mantenendo una zona safe per la fase di cottura indiretta.","Preriscaldare solo metà griglia del barbecue Genesis o Spirit a fuoco alto (270-300 °C) per la cottura.","Posizionare le bistecche di lombatello sul calore diretto e rosolarle per 2-3 minuti per lato, girandole una volta per ottenere una caramellizzazione profonda.","Spostare le bistecche sul calore indiretto e cuocere fino a raggiungere una temperatura interna di 46-49 °C per una cottura al sangue.","Togliere dalla griglia, lasciare riposare per 5-7 minuti per rilassare le fibre.","Affettare trasversalmente rispetto alla fibra e servire immediatamente.","Durante il riposo, guarnire ogni bistecca con una fetta di burro Café de Paris, lasciandolo sciogliere sulla carne."],"u":"https://www.weber.com/IT/it/ricette/manzo/onglet-alla-griglia-con-burro-composto-caf%C3%A9-de-paris/weber-2473380.html"},{"n":"FONDUTA DI FORMAGGIO CON PANE GRIGLIATO","c":"Ricette BBQ","s":"4-6","d":"Facile","g":"150–180 °C","m":"Indiretto","i":"https://content-images.weber.com/content/Fondue-02.jpg","ig":[{"g":"Per la fonduta","i":["1 spicchio d&#039;aglio","290 ml di vino bianco secco","1 cucchiaino di succo di limone","225 g di formaggio Emmental grattugiato","225 g di formaggio Gruyère grattugiato","1 cucchiaino di amido di mais","1 cucchiaio di Kirsch (facoltativo)"]},{"g":"Per la salsa","i":["1 baguette, tagliata a cubetti"]}],"ins":["Preparare il wok: Tagliare a metà lo spicchio d'aglio. Strofinare i lati tagliati su tutta la superficie interna del wok GBS per insaporirlo leggermente.","Preparare la miscela di amido di mais: In una tazzina, mescolare la farina di mais con il Kirsch fino a ottenere una pasta omogenea. Mettere da parte.","Preparare il calore indiretto: Preparare il barbecue per il calore indiretto a 150-180 °C. Se si utilizza un barbecue a carbonella da 57 cm, accendere ½ Weber® Rapidfire Chimney Starter di bricchetti. Posizionare il GBS Wok nell'anello centrale.","Iniziare la fonduta: Versare il vino bianco e il succo di limone nel wok e scaldare fino a raggiungere un leggero bollore. Aggiungere lentamente i formaggi, una manciata alla volta, mescolando continuamente fino a quando non si saranno sciolti.","Completare la fonduta: Aggiungere la maizena e il Kirsch al formaggio fuso e mescolare delicatamente fino a ottenere una consistenza liscia e densa. Non lasciare bollire il composto, mantieni il fuoco basso e costante. Ci vorranno circa 10 minuti in totale.","Grigliare il pane: Mentre la fonduta cuoce, grigliare brevemente i cubetti di baguette a fuoco diretto fino a quando i bordi saranno leggermente tostati.","Servire: Togliere la fonduta dal barbecue e posizionare il wok su un sottopentola o un tagliere resistente al calore. Servire immediatamente con i cubetti di pane grigliati da intingere."],"u":"https://www.weber.com/IT/it/ricette/ricette-barbecue/fonduta-di-formaggio-con-pane-grigliato/weber-2471871.html"},{"n":"Costolette di maiale con salsa romesco","c":"Maiale","s":"4","d":"Medio","g":"180–290 °C / 63 °C (interna, maiale)","m":"Diretto","i":"https://content-images.weber.com/content/pork_chops.jpg","ig":[{"g":"Per la salamoia","i":["1 litro di acqua","4 cucchiai di sale marino","2 cucchiai di zucchero","4 spicchi d’aglio, schiacciati","1 cucchiaio di semi di cumino","1 cucchiaio di pepe nero macinato"]},{"g":"Per le costolette di maiale","i":["4 costolette di maiale con osso (280-350 g ciascuna, spessore circa 2,5 cm)"]}],"ins":["Arrostire i peperoni rossi sul barbecue a fuoco vivo e diretto fino a quando la pelle non sarà bruciacchiata (ci vorranno circa 15 minuti, girandoli di tanto in tanto).","Mettere i peperoni in una ciotola, coprirli e lasciare che cuociano a vapore per 10-15 minuti.","Togliere la buccia, eliminare i semi e la parte bianca interna e tritare finemente la polpa.","In una ciotola, unire i peperoni tritati, le mandorle, l'aglio, la paprika affumicata, l'aceto, il sale e il pepe nero. Mescolare fino a formare una pasta grossolana.","Versare lentamente l'olio d'oliva mescolando con una frusta per ottenere una salsa omogenea. Assaggiare e aggiustare di condimento se necessario.","Preparare il barbecue per la cottura diretta e inserire la griglia Weber Gourmet BBQ System Sear Grate. Preriscaldare a fuoco alto (240-290 °C) con coperchio chiuso per almeno 10-15 minuti.","Rimuovere le costolette, asciugarle con carta da cucina e spennellarle leggermente su entrambi i lati con olio. Ridurre la temperatura media a 180-230 °C. Grigliare le costolette direttamente sulla griglia Sear Grate, con il coperchio chiuso, per 9-11 minuti, girandole una volta, fino a raggiungere una temperatura interna di 63 °C e lasciando il centro leggermente rosa.","Lasciare riposare brevemente le costolette, quindi servirle calde, guarnite con generose cucchiaiate di salsa romesco."],"u":"https://www.weber.com/IT/it/ricette/maiale/costolette-di-maiale-con-salsa-romesco/weber-2471018.html"},{"n":"CHOW MEIN NOODLES","c":"Ricette BBQ","s":"6","d":"facile","g":"fuoco alto","m":"diretto","i":"https://content-images.weber.com/content/DSC7344.jpg","ig":[{"g":"Ingredienti","i":["400 g di noodles","3 spicchi d&#039;aglio, schiacciati","2 scalogni, affettati","2 carote, affettate sottilmente","2 peperoni rossi, affettati sottilmente","1 broccolo, tagliato in piccole cimette","1 cavolo cappuccio, tagliato a striscioline","4 cipollotti, affettati","200 ml di salsa teriyaki"]}],"ins":["Cuocere i noodles seguendo le istruzioni riportate sulla confezione.","Sbucciare e schiacciare l'aglio, affettare gli scalogni e mettere da parte.","Lavare e preparare le carote, i peperoni rossi e i cipollotti; tagliarli a strisce sottili.","Pulire e tagliare i broccoli in piccole cimette.","Tagliare il cavolo cappuccio e mettere da parte tutte le verdure, pronte per la cottura.","Preparare il barbecue per la cottura diretta a fuoco alto e preriscaldare la piastra per 15 minuti.","Ungere leggermente la superficie della piastra.","Soffriggere l'aglio e lo scalogno fino a doratura.","Aggiungere le carote, i peperoni rossi, i broccoli e i cipollotti. Rosolare per 2-3 minuti, mescolando spesso per una cottura uniforme.","Aggiungere 50 ml di acqua alle verdure e cuocere al vapore sotto la cupola di cottura per 1-2 minuti.","Aggiungere i noodles cotti e la salsa teriyaki. Mescolare per 1-2 minuti fino a ottenere un rivestimento uniforme e lucido."],"u":"https://www.weber.com/IT/it/ricette/ricette-barbecue/chow-mein-noodles/weber-2470606.html"},{"n":"BLOCCO DI CIOCCOLATO","c":"Dolci & Bevande","s":"","d":"Medio","g":"180 °C","m":"Indiretto","i":"https://content-images.weber.com/emea-recipes/Yule-Log-receipe.png","ig":[{"g":"Per l'involtino","i":["5 uova, separate","175 g di zucchero a rotelle","175 g di cioccolato fondente","2 cucchiai d&#039;acqua"]}],"ins":["Preparare il barbecue: Preparare il barbecue Weber per la cottura su calore indirettoa 180 °C: Carbone vegetale: Utilizzare una ciminiera d'accensione Rapidfire Weber e le braci di contorno. Gas: Accendere solo i bruciatori esterni. Pellet/LEGNO PER ROSOLATURA: Impostare la temperatura a 180 °C.","Rivestire un vassoio o un cestello di cottura: Rivestire un grande cestello per verdure Weber (o vassoio di alluminio poco profondo) con carta da forno, lasciando una piccola sporgenza per facilitare il sollevamento del cestello di cottura.","Preparare la pasta per involtini: Sbattere i tuorli d'uovo e lo zucchero fino a renderli spessi e pallidi. In un'altra braciere, sbattere i bianco d'uovo fino a ottenere dei picchi rigidi. Sciogliere delicatamente il cioccolato e l'acqua in una padella su calore basso, mescolando fino a ottenere una consistenza liscia. Mescolare il cioccolato fuso nel composto di tuorli. Ripiegare delicatamente gli albumi in tre fasi, mantenendoli leggeri e ariosi.","Cuocere al forno la spugna: Versare l'impasto nel vassoio o nel cestello di cottura. Mettere su calore indiretto e cuocere al forno per 20-25 minutio fino a quando non si sono appena fissati e ammorbiditi. Rimuovere dal barbecue e coprire immediatamente con un asciugamano da cucina umido per raffreddare e trattenere l'umidità.","Preparare il ripieno: Sbattere la panna fino a ottenere dei picchi morbidi. Ripiegare le ciliegie e l'Amaretto, se necessario.","Assemblare il tronco di Natale: Stendere la spugna su un foglio di carta per pulizia pulito. Rimuovere la carta da cuocere al forno. Distribuire uniformemente la crema di ciliegie, lasciando un contorno di 2 cm su tutti i lati. Arrotolare delicatamente dal bordo lungo, utilizzando la carta per mantenerla tesa.","Trasferire su un piatto da portata.","Spolverare con zucchero a velo per un effetto nevoso.","Decorare con ciliegie extra, rametti di acetoo cioccolato grattugiato.","Mettere in frigorifero fino al momento di servire o gustare leggermente caldo con la panna."],"u":"https://www.weber.com/IT/it/ricette/dolci-bevande/blocco-di-cioccolato/weber-2466976.html"},{"n":"Prosciutto appiccicoso alla rosolatura","c":"Maiale","s":"4-6","d":"Media-alta","g":"130 °C (indiretto) / 260 °C (rosolatura)","m":"METODO DI COTTURA: Calore indiretto con cottura a calore elevato","i":"https://content-images.weber.com/content/Ham3.jpg","ig":[{"g":"Preparazione del prosciutto","i":["3 kg di cosciotto di gambero non affumicato (con o senza osso)","2 l di acqua fredda (per l&#039;ammollo notturno)","20 chiodi interi (per borchie decorative)"]}],"ins":["Mettere il prosciutto in una grande ciotola o in un braciere e immergerlo in acqua fredda per tutta la notte per ridurre il contenuto di sale.","Per preparare la glassa, unire il succo d'ananas, lo zucchero di canna, la salsa di soia, ketchup alla banana, aglio in polvere, paprica, cannella, e aceto in una pentola.","Portare a ebollizione e cuocere per circa 15 minuti fino a quando il composto non si addensa in una glassa allo sciroppo.","Lasciare raffreddare la glassa a temperatura ambiente prima dell'uso.","Rimuovere la buccia di gambero, lasciando un sottile strato di grasso, e incidere leggermente a rombi.","Preparare il barbecue per la cottura a calore indiretto, 120-150°C. Se si utilizza un barbecue a carbone, utilizzare 1/3 di ciminiera d'accensione con bricchetti Weber accesi.","Rimuovere il prosciutto dal bagno, asciugarlo con carta da cucina e metterlo su una griglia per barbecue DELUX sopra una leccarda.","Cuocere delicatamente su calore indiretto per circa 3 ore o fino a quando la temperatura interna non raggiunge i 68°C.","Aumentare la temperatura del barbecue a 260°C e spostare il prosciutto sul calore diretto.","Pennellare generosamente con la glassa preparata, rosolando per 2 minuti per contorno fino a quando non è caramellata.","Rimettere il prosciutto sul calore indiretto, continuare a glassare e cuocere per altri 15-20 minuti fino a quando non diventa appiccicoso, lucido e dorato."],"u":"https://www.weber.com/IT/it/ricette/maiale/prosciutto-appiccicoso-alla-rosolatura/weber-2466638.html"},{"n":"Pandoro alla griglia con Nutella e crema al mascarpone","c":"Dolci & Bevande","s":"","d":"","g":"","m":"","i":"https://content-images.weber.com/emea-recipes/Pandoro-Cake.jpg","ig":[{"g":"Ingredienti","i":["1 pandoro intero (750 g-1 kg), tagliato a fette orizzontali spesse","Burro (per grigliare)","350 g di Nutella o crema spalmabile al cioccolato e nocciole, a temperatura ambiente o leggermente riscaldata","250 g di mascarpone","200 ml di panna","3 cucchiai di zucchero a velo (o a piacere)","1 cucchiaino di estratto di vaniglia","Facoltativo: 1 cucchiaio di rum scuro, Amaretto o Marsala","Facoltativo: ¼–½ tazza di caffè forte o espresso (per spennellare)","Guarnizione: cacao in polvere."]}],"ins":["Iniziare tagliando il pandoro orizzontalmente in circa 5 fette spesse. Metterle da parte in ordine in modo da poterle impilare nuovamente in seguito.","In una ciotola, montate la panna a neve morbida. In un'altra ciotola, mescolate il mascarpone con lo zucchero, la vaniglia e il liquore, se lo utilizzate. Incorporate delicatamente la panna montata al composto di mascarpone fino a ottenere un composto liscio e spumoso. Conservate in frigorifero mentre grigliate.","Preparare il caffè e lasciarlo raffreddare leggermente.","Preriscaldare la piastra o la Weber Slate a fuoco medio: è necessario ottenere un leggero sfrigolio, senza bruciare.","Imburrare entrambi i lati di ogni fetta di pandoro e disporli sulla superficie calda. Grigliare per 2-3 minuti per lato fino a quando non saranno dorati e leggermente croccanti, quindi toglierli e metterli da parte.","Spennellate leggermente ogni fetta grigliata con il caffè. Quindi, spalmate la Nutella sulla fetta inferiore e aggiungete una cucchiaiata di crema al mascarpone. Aggiungete la fetta successiva, ruotandola leggermente per distribuire la crema.","Ripetere l'operazione con la Nutella e la crema tra ogni strato fino a completare la pila.","Spolverare la superficie con cacao in polvere.","Buon appetito."],"u":"https://www.weber.com/IT/it/ricette/dolci-bevande/pandoro-alla-griglia-con-nutella-e-crema-al-mascarpone/weber-2463348.html"},{"n":"CALDARROSTE NEL CESTELLO PER GIRARROSTO","c":"Ricette BBQ","s":"4–6","d":"","g":"","m":"","i":"https://content-images.weber.com/content/maroni_chestnuts.png","ig":[{"g":"Ingredienti","i":["500 g di castagne fresche","Sale marino q.b.","Opzionale: un filo di burro per finire"]}],"ins":["Scegli castagne sode, senza difetti e di dimensioni simili. Se trovi quelle con la buccia, con un coltello affilato, pratica una “X” sul lato arrotondato di ciascuna castagna (attraversando guscio e pellicina interna). In questo caso, immergile in acqua fredda per 1 ora per facilitare la sbucciatura. Scola e asciuga bene prima della cottura.","Monta il cestello per girarrosto Weber sullo spiedo rotante, accendi il BBQ per calore indiretto e disponi le castagne incise nel cestello in uno strato singolo.","Avvia la rotazione e arrostisci per 15–20 minuti, ruotando continuamente, fino a quando i gusci sono bruciacchiati, crepati e la polpa interna morbida.","Trasferiscile subito le caldarroste calde in un panno da tè piegato e avvolgi per 5–10 minuti: questo faciliterà l'eventuale sbucciatura (sbucciale mentre sono ancora calde).","Per una versione salata, cospargile con un pizzico di sale marino e, se vuoi, aggiungi un filo di burro. Servile in una ciotola o direttamente dal cestello."],"u":"https://www.weber.com/IT/it/ricette/ricette-barbecue/caldarroste-nel-cestello-per-girarrosto/weber-2459820.html"},{"n":"COSTINE DEL TESORO DEL MORTO","c":"Maiale","s":"","d":"Medio","g":"110–140 °C","m":"","i":"https://content-images.weber.com/content/Baby-Back-Ribs.jpg","ig":[{"g":"Ribs","i":["2 costine di maiale (circa 1,8-2 kg in totale)","2 cucchiai di senape gialla (come legante)","50-100 g di rub per barbecue"]},{"g":"Salsa (glassa facoltativa)","i":["120 ml di succo di mela","120 g di ketchup","3 cucchiai di aceto di sidro","1 cucchiaino di salsa Worcestershire","1 cucchiaino di melassa nera (o melassa)","2 cucchiaini di peperoncino in polvere","1 cucchiaino di aglio in polvere","½ cucchiaino di pepe nero"]},{"g":"Affumicatura","i":["Tronchetti di legno di melo o hickory o trucioli di legno ammollati"]},{"g":"Decorazione","i":["1 peperone rosso (intero, per il &quot;cuore&quot;)"]}],"ins":["Preparare le costine: Rimuovere la membrana dal lato dell'osso. Spalmare un sottile strato di senape su ogni costata, quindi ricoprire generosamente con il condimento barbecue. Lasciare riposare a temperatura ambiente per 30 minuti.","Preparare la salsa (facoltativo): Aggiungere tutti gli ingredienti della salsa in un pentolino. Cuocere a fuoco lento per 10-15 minuti. Mettere da parte.","Preparare per la cottura a calore indiretto: Barbecue a carbonella: accatastare la carbonella accesa su un lato con una leccarda sull'altro. Barbecue a gas: utilizzare un bruciatore con una scatola affumicatrice contenente trucioli di legno imbevuti. Mantenere una temperatura di cottura di 110-140 °C (bassa e lenta).","Cuocere le costine (metodo da 3 ore): Disporre le costine con l'osso rivolto verso il basso sul lato indiretto della griglia. Chiudere il coperchio e cuocere per circa 2 ore. Se necessario, aggiungere altri pezzi o trucioli di legno dopo la prima ora.","Avvolgere nella carta da macellaio: Dopo 2 ore, avvolgere strettamente ogni costata in carta da macellaio non cerata, aggiungendo un goccio (1-2 cucchiai) di succo di mela all'interno di ogni pacchetto. Rimettere sul barbecue e cuocere per un'altra ora/ora e mezza.","Finitura e glassatura: Scartare con cura le costine. Rimetterle con il lato dell'osso rivolto verso il basso sulla griglia. Spennellare con la salsa barbecue preparata e cuocere senza coperchio per altri 15-20 minuti fino a quando la glassa diventa appiccicosa e lucida.","Riposo: Togliere le costine dalla griglia, coprirle con carta da macellaio senza sigillarle e lasciarle riposare per 10-15 minuti.","Arrostire il \"cuore\" del peperone: Mentre le costine riposano, mettete il peperone rosso intero direttamente sulla griglia a fuoco alto. Carbonizzare e bruciare la buccia per 5-10 minuti, girandolo spesso. Lasciare raffreddare leggermente, quindi strappare parte della buccia annerita, lasciando alcune zone bruciate per ottenere un aspetto spettrale. (Facoltativo) Tagliare la parte superiore e svuotare l'interno per riempirlo con salsa, verdure arrosto o insalata di cavolo rosso.","Su un tagliere di legno o un vassoio da portata, disponi le due griglie a forma di \"V\" larga per ricreare una gabbia toracica aperta.","Posizionare il peperone arrosto al centro, in modo che assomigli a un cuore.","Servire con salsa barbecue extra per intingere."],"u":"https://www.weber.com/IT/it/ricette/ricette-barbecue/costine-del-tesoro-del-morto/weber-2457671.html"},{"n":"TORTA DI ZUCCA SPEZIATA CON GLASSA A RAGNATELA","c":"Dolci & Bevande","s":"10","d":"Media","g":"180°C","m":"Calore indiretto","i":"https://content-images.weber.com/content/pumkin.png","ig":[{"g":"Torta","i":["400 g di purea di zucca (in scatola o fatta in casa)","100 g di burro non salato, fuso","170 g di farina 00","170 g di zucchero di canna scuro","4 uova","1 cucchiaino di lievito in polvere","1 cucchiaino di bicarbonato di sodio","2 cucchiaini di spezie per vin brulé o cannella in polvere","4 cucchiai di rum speziato (opzionale)","Una manciata di semi di zucca","Burro e farina (per imburrare e infarinare la teglia)"]}],"ins":["In una ciotola capiente, mescolare la farina, il lievito, il bicarbonato, lo zucchero di canna e le spezie.","Aggiungere le uova, il burro fuso e il rum (se utilizzato). Mescolare fino a ottenere un composto omogeneo.","Incorporare delicatamente la purea di zucca fino a completo assorbimento.","Imburrare e infarinare la teglia o gli stampini monoporzione.","Versare l’impasto nello stampo e livellare la superficie con una spatola.","Cospargere la superficie con i semi di zucca.","Preparazione: Preparare il barbecue per la cottura indiretta a 180 °C. Per barbecue a carbone: accendere ½ ciminiera Weber® Rapidfire di bricchette e disporle per una cottura indiretta uniforme.","Cottura: Posizionare la teglia o gli stampini sul calore indiretto. Chiudere il coperchio e cuocere per 20–25 minuti, o finché uno stecchino non esce pulito.","Raffreddamento: Rimuovere dal barbecue e lasciare raffreddare leggermente. Se si usano stampini, sformare le tortine prima della decorazione.","Preparare la glassa: Mescolare lo zucchero a velo con poca acqua o succo di limone fino a ottenere una glassa bianca densa.","Creare la ragnatela: - Versare la glassa in una sac à poche (oppure in un sacchetto di plastica con un piccolo taglio in un angolo). -Disegnare tre o quattro cerchi concentrici sulla superficie della torta raffreddata. - Con uno stuzzicadenti o uno spiedino, tracciare linee dritte dal centro verso l’esterno (come i raggi di una ruota) per creare l’effetto ragnatela.","Effetto opzionale: Colorare una parte della glassa con colorante nero in gel oppure usare cioccolato fondente fuso per dare contrasto alla ragnatela o aggiungere la sagoma di un ragnetto."],"u":"https://www.weber.com/IT/it/ricette/ricette-barbecue/torta-di-zucca-speziata-con-glassa-a-ragnatela/weber-2454777.html"},{"n":"VIN BRULÉ AFFUMICATO","c":"Ricette BBQ","s":"4-6","d":"Easy","g":"220–260 °C","m":"Direct","i":"https://content-images.weber.com/content/Mulled-wine_cropped.jpg","ig":[{"g":"Ingredienti","i":["700 ml di vino rosso corposo (es. Primitivo italiano)","5 cucchiai di zucchero di canna morbido","½ arancia grande (da infilzare con i chiodi di garofano)","1 arancia grande (da affettare e per guarnire)","3 stecche di cannella","4 cucchiaini di cannella in polvere","10 chiodi di garofano","4 anici stellati","50 ml di Cointreau (o altro liquore all’arancia)"]}],"ins":["Preparare l’arancia speziata: Taglia a metà un’arancia. Appoggiala con il lato tagliato verso il basso e infila i chiodi di garofano nella buccia.","Versa nel Dutch Oven Weber GBS i seguenti ingredienti: - Vino - Arancia speziata con chiodi di garofano - Cannella in polvere - Stecche di cannella - Anice stellato - Zucchero di canna - Cointreau","Preparare la cottura diretta: Porta il barbecue a calore diretto, 220–260 °C. Se usi carbone, accendi ½ ciminiera Weber® Rapidfire di bricchette. Puoi aggiungere chips di legno e spezie direttamente sulle braci – non serve la smoker box.","Se usi barbecue a gas o elettrico, aggiungi la Smoker Box: Posiziona la Weber Smoker Box direttamente sopra la fonte di calore. All’interno aggiungi una miscela di legno e spezie: • Una piccola manciata di chips di legno da frutto (es. melo, ciliegio) • Un mix di stecche di cannella, anice stellato, baccelli di cardamomo e chiodi di garofano • Aggiungi il vino solo quando la box inizia a fumare.","Far sobbollire il vino: Metti il Dutch Oven direttamente sulla griglia. Scalda delicatamente finché il vino sobbolle e sprigiona vapore — non farlo bollire. Lascialo sobbollire 8–10 minuti per infondere gli aromi.","Servire: Versa con cautela il vin brulé in bicchieri o tazze resistenti al calore. Guarnisci con una fettina d’arancia e una stecca di cannella.","Cin cin! Goditi l’aroma affumicato e speziato sotto le stelle."],"u":"https://www.weber.com/IT/it/ricette/ricette-barbecue/vin-brul%C3%A9-affumicato/weber-2453304.html"},{"n":"Cosce di pollo marinate nel latticello","c":"Pollame","s":"4-6","d":"","g":"160–180°C","m":"","i":"https://content-images.weber.com/emea-recipes/DSC6621.jpg","ig":[{"g":"Per la marinata","i":["500 ml di latticello","2 cucchiai di olio d&#039;oliva","1 cucchiaio di aceto di sidro o succo di limone","1 cucchiaino di paprika affumicata","½ cucchiaino di pepe di Cayenna (facoltativo)","½ cucchiaino di sale marino"]},{"g":"Per il rub","i":["1 cucchiaio di sale","1 cucchiaio di pepe nero","1 cucchiaio di aglio granulato"]},{"g":"Per il pollo","i":["8 cosce di pollo con osso e con la pelle (circa 1,2-1,4 kg in totale)"]}],"ins":["In una ciotola capiente o in un sacchetto richiudibile, unire il latticello, l'olio d'oliva, l'aceto o il succo di limone, la paprika affumicata, il pepe di Cayenna (se utilizzato) e il sale. Mescolare bene.","Aggiungere le cosce di pollo alla marinata, assicurandosi che siano completamente ricoperte. Coprire e conservare in frigorifero per almeno 8 ore o per tutta la notte per ottenere risultati ottimali.","Quando è il momento di cuocere, togli il pollo dalla marinata e asciugalo con carta assorbente. Getta la marinata.","In una ciotola piccola, mescola il condimento: sale kosher, pepe nero macinato grosso e aglio in granuli. Cospargi uniformemente il pollo su tutti i lati.","Lascia riposare il pollo a temperatura ambiente per 20-30 minuti prima di grigliarlo.","Preparare lo Smoque: Preriscaldare il Weber® Smoque a fuoco medio a 160-180 °C (320-355 °F). Preriscaldare con il coperchio chiuso per 15 minuti.","Cuocere il pollo: Disporre le cosce di pollo con la pelle rivolta verso l'alto sulla griglia di cottura. Chiudere il coperchio e affumicare il pollo per 45-60 minuti, o fino a quando la temperatura interna raggiunge i 75 °C (165 °F) nella parte più spessa della coscia. Se lo si desidera, terminare la cottura del pollo con 5 minuti di calore diretto ad alta temperatura, con la pelle rivolta verso il basso, per ottenere una finitura più croccante.","Togliere il pollo dalla griglia e lasciarlo riposare per 5-10 minuti prima di servire.","Abbinare con insalata di cavolo, mais grigliato o insalata di patate per un classico piatto da barbecue."],"u":"https://www.weber.com/IT/it/ricette/pollame/cosce-di-pollo-marinate-nel-latticello/weber-2445998.html"},{"n":"Spiedini di pollo con salsa alla senape e miele","c":"Pollame","s":"6","d":"","g":"180-200 °C","m":"Diretta","i":"https://content-images.weber.com/emea-recipes/Weber-Traveller11860-1.jpg","ig":[{"g":"Ingredienti","i":["6 petti di pollo tagliati a pezzi","3 cucchiaini di senape di Digione","2 spicchi d&#039;aglio tritati finemente","2 cucchiai di zucchero di canna","15 g di foglie di timo fresco","3 cucchiai di miele liquido","Succo e scorza di 1 limone","2 cucchiai di olio d&#039;oliva","1 zucchina piccola, tagliata a rondelle","1 cipolla rossa, tagliata a pezzi","1 peperone rosso, tagliato a quadrati","Sale e pepe, q.b.","Menta fresca, tritata finemente (per guarnire)"]}],"ins":["Preparare la marinata: in un mortaio, pestare l'aglio, le foglie di timo, lo zucchero di canna, il sale e il pepe fino a ottenere una pasta omogenea.","Aggiungere la senape, il succo di limone, la scorza, il miele e l'olio d'oliva e mescolare bene.","Mettere le strisce di pollo in un sacchetto per alimenti richiudibile, versarvi la marinata e assicurarsi che il pollo sia completamente ricoperto. Lasciare marinare per 30 minuti.","Infilare il pollo, le zucchine, la cipolla rossa e il peperone rosso sugli spiedini.","Preriscaldare il Weber Traveler a fuoco medio (180-220 °C) e lasciarlo riscaldare per 5 minuti con il coperchio chiuso.","Ungere leggermente la griglia, quindi posizionare gli spiedini direttamente sulla griglia.","Cuocere con il coperchio chiuso per 12-15 minuti, girando ogni 5 minuti, fino a quando il pollo è completamente cotto e leggermente caramellato.","Togliere dalla griglia e guarnire con menta fresca tritata prima di servire."],"u":"https://www.weber.com/IT/it/ricette/pollame/spiedini-di-pollo-con-salsa-alla-senape-e-miele/weber-2444511.html"},{"n":"Pesce intero alla griglia con salsa verde al curry","c":"Pesce & Frutti di Mare","s":"2","d":"Medio","g":"220-270 °C","m":"Grigliatura diretta / ad alta temperatura","i":"https://content-images.weber.com/emea-recipes/79-_DSC1237.jpg","ig":[{"g":"Per il pesce","i":["2 spigole o orate intere di media grandezza, squamate ed eviscerate","150 ml di condimento verde (vedi ricetta sotto)","10 g di zenzero fresco, grattugiato finemente","3 cucchiaini di curry in polvere","2 cucchiaini di garam masala","1 cucchiaino colmo di burro","Sale e pepe nero macinato fresco"]}],"ins":["Condimento verde: Frullare tutti gli ingredienti in un robot da cucina o in un frullatore fino a ottenere una pasta omogenea. Conservare in un contenitore ermetico in frigorifero per un massimo di 1 settimana.","Preparare il pesce: Sciacquate il pesce in acqua molto fredda, quindi asciugatelo accuratamente. Con un coltello affilato, incidete la pelle con tagli diagonali per consentire al condimento di penetrare. Mettete il pesce in una ciotola capiente.","Marinare il pesce: Versate la maggior parte del condimento verde sul pesce, tenendone da parte 1 cucchiaino per la salsa. Aggiungete i peperoncini tritati, lo zenzero grattugiato e la scorza di lime. Strofinare il curry caraibico e il garam masala su tutto il pesce, compresa la cavità interna.","Preriscaldare il barbecue a 220-270 °C per una cottura diretta a fuoco vivo.","Ungere leggermente il cestello per barbecue Weber con olio per evitare che il pesce si attacchi.","Mettere il pesce marinato nel cestello per grigliare, chiudendolo bene.","Posizionare il cestello sul fuoco diretto, chiudere il coperchio del barbecue e cuocere per circa 8 minuti per lato, girando una volta.","Togliere il pesce quando raggiunge una temperatura interna di 60 °C o quando la polpa è diventata bianca e soda e la pelle è gonfia e croccante.","Trasferire su un piatto da portata e condire con la salsa verde messa da parte prima di servire."],"u":"https://www.weber.com/IT/it/ricette/pesce-frutti-di-mare/pesce-intero-alla-griglia-con-salsa-verde-al-curry/weber-2441798.html"},{"n":"Spiedini Di Rana Pescatrice E Gamberi Alla Griglia","c":"Pesce & Frutti di Mare","s":"4","d":"Livello di difficoltà: 2","g":"200 °C","m":"Diretta","i":"https://content-images.weber.com/emea-recipes/59-_DSC1053.jpg","ig":[{"g":"Ingredienti","i":["400 g di rana pescatrice (o qualsiasi altro pesce bianco a carne soda, pulito e tagliato a cubetti)","250 g di gamberi grandi con guscio, sgusciati","1 cucchiaino di aglio granulato","1 cucchiaio di olio d&#039;oliva","Scorza di ½ limone","Succo di ½ limone","Sale e pepe nero macinato fresco"]}],"ins":["In una piccola ciotola, mescolare l'olio d'oliva, l'aglio granulato, la scorza di limone e il succo di limone. Condire con sale e pepe nero.","Pulire la rana pescatrice eliminando eventuali lische o membrane.","Ricoprire i cubetti di rana pescatrice e i gamberi con la marinata e lasciare riposare per 10 minuti.","Infilare i pezzi di rana pescatrice e i gamberi sul set di spiedini Weber, assicurandosi che siano distanziati in modo uniforme per una cottura omogenea.","Preparare il barbecue per la cottura diretta a 200 °C. Se si utilizza un barbecue a carbonella da 57 cm, accendere ½ accenditore a camino di bricchetti Weber.","Aggiungere la griglia Sear Grate GBS e preriscaldare per alcuni minuti fino a quando è ben calda.","Posizionare gli spiedini direttamente sulla griglia Sear Grate e cuocere per 4 minuti su un lato","Girare gli spiedini e grigliare per altri 4 minuti, assicurandosi che siano ben cotti.","Utilizzare un termometro a lettura istantanea per verificare che la rana pescatrice raggiunga i 60 °C.","Togliere dalla griglia e lasciare riposare per 2 minuti prima di servire.","Guarnire con scorza di limone extra o aneto fresco (facoltativo).","Servire con un'insalata fresca o una salsa aioli."],"u":"https://www.weber.com/IT/it/ricette/pesce-frutti-di-mare/spiedini-di-rana-pescatrice-e-gamberi-alla-griglia/weber-2441380.html"},{"n":"Bouillabaisse mediterranea con baguette grigliata e salsa rouille","c":"Pesce & Frutti di Mare","s":"6","d":"Difficile","g":"170-200 °C","m":"Indiretta e diretta","i":"https://content-images.weber.com/emea-recipes/Mediterranean-Bouillebaise-004.jpg","ig":[{"g":"BASE PER LA ZUPPA","i":["1,5 litri di soupe de poisson (zuppa di pesce) acquistata in negozio","un pizzico di zafferano in fili","10 g di timo fresco","1 foglia di alloro","sale e pepe nero q.b."]}],"ins":["Preparare il pesce. Tagliare il pesce a pezzi e condirlo con sale.","Arrostire il peperone rosso su un ACCENDIFUOCO A CAMINO acceso fino a quando la buccia non sarà annerita. Togliere dal fuoco e mettere in un contenitore con coperchio a raffreddare (in questo modo sarà più facile spellarlo). Una volta raffreddato, spellare il peperone e tritarne la polpa. Tritare finemente il timo fresco. Tagliare a dadini il finocchio. Pelare e tagliare le patate in quarti. Affettare sottilmente la baguette.","Preparare la salsa rouille. In un robot da cucina, frullare l'aglio, il peperone rosso arrosto, il pane e lo zafferano fino a ottenere una pasta. Aggiungere il tuorlo d'uovo, quindi incorporare gradualmente l'olio d'oliva fino a ottenere un composto omogeneo. Condire a piacere e mettere da parte.","Pre-immergere le Panetti da affumicatura per 30 minuti prima dell'uso.","Preparare la griglia per la cottura indiretta a 170-200 °C. Se si utilizza una griglia a carbone, accendere 1/2 accenditore a camino con bricchetti Weber.","Posizionare la Cocotte 2in1 sulla griglia di cottura a calore indiretto, chiudere il coperchio e preriscaldare per 10 minuti.","Aggiungere un filo d'olio d'oliva alla Cocotte e cuocere delicatamente il finocchio per 3-4 minuti fino a quando non sarà morbido. Aggiungere la soupe de poisson, seguita dalle patate, dai fili di zafferano, dalla foglia di alloro e dal timo. Coprire con il coperchio e cuocere a fuoco lento per 30 minuti. Una volta che le patate saranno tenere e cotte, rimuovere il forno olandese e sostituire la griglia di cottura.","Posizionare le tavole di cedro precedentemente immerse in acqua sulla griglia a fuoco diretto per circa 5 minuti fino a quando iniziano a fumare. Girare le tavole sul fuoco indiretto e aggiungere i pezzi di pesce. Affumicare delicatamente il pesce per 6-8 minuti, o fino a quando non è cotto e ha raggiunto una temperatura interna di 55 °C, quindi rimuovere il pesce e le tavole dal barbecue. Aggiungere con cura il pesce affumicato alla Cocotte, cercando di non rompere i pezzi.","Spennellare le fette di baguette con olio d'oliva, quindi disporle a fuoco diretto sulla griglia del barbecue. Tostare per 1-2 minuti per lato fino a doratura. Per servire, versare la bouillabaisse nelle ciotole e servire con le fette di baguette tostate, ciascuna spalmata con un cucchiaio di salsa rouille. Buon appetito!"],"u":"https://www.weber.com/IT/it/ricette/pesce-frutti-di-mare/bouillabaisse-mediterranea-con-baguette-grigliata-e-salsa-rouille/weber-2440892.html"},{"n":"Torta Pancake","c":"Dolci & Bevande","s":"6","d":"Facile","g":"Fiamma bassa","m":"Diretta","i":"https://content-images.weber.com/emea-recipes/American-Pancake-Cake-003.jpg","ig":[{"g":"Ingredienti","i":["600 g di farina","2 cucchiai di zucchero","2 cucchiai di lievito in polvere","1/2 cucchiaino di sale","3 uova","700 ml di latte intero","2 cucchiai di burro (fuso)","1 cucchiaino di estratto di vaniglia","burro (per ungere la piastra)","100 g di mini marshmallow","250 ml di panna montata","250 ml di salsa al cioccolato","2 cucchiai di zucchero a velo (per spolverare)"]}],"ins":["In una ciotola capiente, pesare la farina, lo zucchero, il lievito in polvere e il sale.","In un'altra ciotola, sbattere le uova e aggiungere il latte, il burro fuso e l'estratto di vaniglia. Versare gli ingredienti liquidi su quelli secchi e mescolare fino ad ottenere un composto omogeneo.","Preriscaldare la piastra per 10 minuti a fuoco basso.","Ungere leggermente la piastra con il burro.","Versare un mestolo abbondante di pastella sulla piastra per formare delle frittelle di circa 20 cm di diametro.","Cuocere per 2-3 minuti fino a quando si formano delle bollicine sulla superficie, quindi girare e cuocere per altri 1-2 minuti fino a doratura.","Ripetere con la pastella rimanente, tenendo al caldo i pancake cotti.","Impilare i pancake a forma di torre, spalmando uno strato abbondante di panna, marshmallow e salsa al cioccolato tra ogni pancake.","Spolverare la torta con zucchero a velo e servire."],"u":"https://www.weber.com/IT/it/ricette/ricette-barbecue/torta-pancake/weber-2431913.html"},{"n":"Shawarma Di Pollo","c":"Pollame","s":"6","d":"Facile","g":"180-200 °C","m":"Diretta","i":"https://content-images.weber.com/emea-recipes/Chicken-Shawarma-006.jpg","ig":[{"g":"Per Il Condimento","i":["1 cucchiaino di aglio granulato","1 cucchiaio di coriandolo macinato","2 cucchiaini di menta secc","1 cucchiaio di cumino macinat","20 g di origano fresco tritato","1 cucchiaino di sale","1 cucchiaino di pepe nero macinato"]},{"g":"Per la salsa allo yogurt","i":["200 g di yogurt greco;","1 spicchio d&#039;aglio tritato;","1 cucchiaino di cumino","succo di 1 limone"]}],"ins":["Unire gli ingredienti per il condimento in una ciotola capiente.","Aggiungere le cosce di pollo disossate e senza pelle e mescolare bene con il condimento. lasciare marinare per almeno 30 minuti o per tutta la notte per ottenere risultati ottimali.","In una ciotola a parte, unire gli ingredienti per la salsa allo yogurt e mescolare bene. Coprire e conservare in frigorifero fino al momento dell'uso.","Per assemblare lo shawarma, fissare una forchetta per girarrosto al centro dello spiedo.","Infilzare le cosce di pollo una alla volta sullo spiedo, assicurandosi che entrambe le punte della forchetta tengano ben saldo il pollo.","Ripetere l'operazione fino a quando tutte le cosce sono ben impilate.","Far scivolare la seconda forchetta lungo lo spiedo, fissando bene tutto il pollo.","Tagliare il pollo in eccesso che sporge dalla pila e premere bene il tutto per formare uno shawarma uniforme.","Preparare il barbecue per una cottura indiretta a circa 180-200 °C. Se si utilizza un barbecue a carbonella da 57 cm, sarà necessario ½ accenditore a camino di bricchetti Weber accesi.","Inserire lo spiedo nel motore e cuocere per 1 ora o fino a quando la temperatura interna raggiunge i 75 °C.","Togliere lo spiedo dalla griglia, coprire con un foglio di alluminio senza sigillare e lasciare riposare per 10 minuti prima di affettare."],"u":"https://www.weber.com/IT/it/ricette/pollame/shawarma-di-pollo/weber-2431334.html"},{"n":"Insalata Tiepida Di Sgombro All'arancia","c":"Pesce & Frutti di Mare","s":"6","d":"Medio","g":"180-200 °C","m":"indiretto / grigliatura su tavola di cedro","i":"https://content-images.weber.com/emea-recipes/UK/46-_DSC0711.jpg","ig":[{"g":"Ingredienti","i":["3 arance grandi","6 filetti di sgombro (con la pelle, senza lische)","Sale marino e pepe nero","1 cucchiaino di aceto di mele","1 cucchiaino di senape di Digione","1 cucchiaino di miele","3 cucchiai di olio d&#039;oliva","1 cespo di lattuga, lavata e tagliata a pezzi","12 cipolline sottaceto dalla buccia argentata, tagliate a metà"]}],"ins":["Con un coltello affilato, tagliare una fetta dalla parte superiore e inferiore di ogni arancia.","Eliminare la buccia e la parte bianca, quindi tagliare con cura spessi spicchi di polpa e metterli in una ciotola.","In una ciotola a parte, mescolare l'aceto di mele, la senape di Digione, il miele, il sale e il pepe nero.","Versare lentamente l'olio d'oliva, mescolando continuamente per formare un'emulsione.","Condire generosamente i filetti di sgombro con sale marino e pepe nero.","Immergere la tavola di cedro Weber in acqua per almeno 30 minuti prima di grigliare per evitare che si bruci.","Preriscaldare il barbecue per la cottura indiretta a 180-200 °C.","Posizionare la tavola di cedro imbevuta sulla griglia a calore indiretto e chiudere il coperchio per 3 minuti per riscaldarla.","Disporre i filetti di sgombro (con la pelle rivolta verso il basso) sulla tavola.","Se si utilizza un barbecue a carbonella, cospargere trucioli di legno precedentemente ammollati sui carboni ardenti. Se si utilizza un barbecue a gas, mettere i trucioli di legno in un affumicatore.","Chiudere il coperchio e grigliare per 10-12 minuti, o fino a quando il pesce è cotto e ha assorbito il fumo del cedro.","Condite la lattuga con la salsa alla senape e miele e dividetela in 6 piatti.","Disponete sopra gli spicchi d'arancia e le cipolle argentate.","Sfilettate delicatamente i filetti di sgombro caldi e disponeteli sull'insalata.","Servite immediatamente e gustate il gusto affumicato e agrumato."],"u":"https://www.weber.com/IT/it/ricette/pesce-frutti-di-mare/insalata-tiepida-di-sgombro-allarancia/weber-2430511.html"},{"n":"Porchetta","c":"Maiale","s":"6","d":"Difficile","g":"180-260 °C","m":"Indiretto","i":"https://content-images.weber.com/emea-recipes/Porchetta-009-2.jpg","ig":[{"g":"Ingredienti","i":["1 pancetta di maiale, 2 kg circa 30 cm per 25 cm, lombo rimosso","4 cucchiai di olio d&#039;oliva","2 cucchiai di sale","3 cucchiai di olio d&#039;oliva","20 foglie di salvia fresca","10 rametti di origano","5 spicchi d&#039;aglio","3 rametti di rosmarino","scorza di limone","1 cucchiaino di peperoncino in fiocchi","1 cucchiaino di sale"]}],"ins":["Mettere tutti gli ingredienti per il ripieno in un robot da cucina e frullare fino a formare una pasta densa.","Disporre la pancetta con la pelle rivolta verso l'alto. Rimuovere la pelle da un quarto della carne (sul lato sinistro) per evitare che la pelle si arrotoli all'interno della porchetta.","Incidi orizzontalmente la pelle rimanente, se non è già stato fatto. Capovolgi il maiale e incidi la carne per consentire alla farcia di penetrare. Distribuisci la farcia in modo uniforme sulla carne incisa.","Arrotola il maiale ben stretto, iniziando dal lato senza pelle. Fissa l'involtino con dello spago da cucina legato a intervalli regolari per mantenerne la forma durante la cottura.","Asciuga la pelle del maiale con carta assorbente, strofinala con olio d'oliva e cospargila generosamente di sale.","Fissare il motore dell'accessorio girrarosto alla griglia. L'operazione può variare a seconda del modello di griglia in uso. Fare sempre riferimento alle istruzioni.","Preriscaldare il barbecue a fuoco alto (230-260 °C) per una cottura indiretta. Rimuovere le griglie di cottura direttamente sotto il punto in cui ruoterà la carne di maiale e posizionare una vaschetta sotto per raccogliere il grasso.","Fissare la porchetta allo spiedo del girarrosto assicurandosi che sia centrata ed equilibrata. Stringere le forche per mantenere la carne saldamente in posizione.","Fissare lo spiedo al motore del girarrosto e controllare che la rotazione sia regolare e uniforme.","Cuocere la porchetta a fuoco vivo per 20-30 minuti con il coperchio chiuso. Questo passaggio è fondamentale per ottenere una crosta croccante. Evitare di aprire il coperchio durante questo processo per mantenere un calore costante.","Dopo la cottura iniziale, ridurre la temperatura a fuoco medio 180°C-220°C.","Continuare a cuocere la carne di maiale fino a quando la temperatura interna raggiunge i 68°C per una cottura media. Ci vorranno 1,5 - 2 ore, a seconda delle dimensioni della pancetta di maiale.","Togliere la carne di maiale dal girarrosto e lasciarla riposare per almeno 15 minuti prima di affettarla. Questo passaggio assicura che i succhi si ridistribuiscano, mantenendo la carne tenera."],"u":"https://www.weber.com/IT/it/ricette/maiale/porchetta/weber-2427603.html"},{"n":"Hamburger Smash","c":"Manzo","s":"4","d":"Medio","g":"200°C - 260°C","m":"Diretto","i":"https://content-images.weber.com/emea-recipes/Smash-Burger-2025.jpg","ig":[{"g":"Ingredienti","i":["560 g Di Carne Macinata Di Manzo","Sale E Pepe","8 Fette Di Formaggio Per Hamburger All&#039;americana","4 Panini Brioche","Olio Per Cucinare","1 Cipolla","2 Jalapeños Freschi (Tagliati A Fettine Sottil)","4 Cucchiai Di Salsa Barbecue"]}],"ins":["Dividere la carne in porzioni da 140 g.","Formare delle palline non troppo compatte e non condire in questa fase.","Affettare le cipolle il più finemente possibile e metterle da parte.","Affettare i panini e metterli da parte.","Preparare la griglia per il calore diretto 170-230 °C. Se si utilizza una griglia a carbone, è necessario ½ camino di bricchetti Weber accesi.","Posizionare la piastra sul calore diretto. Ungere leggermente la piastra con olio. Chiudere il coperchio e preriscaldare per 10 minuti.","Disporre le 6 palline di carne macinata direttamente sulla piastra e condire con sale e pepe.","Disporre sopra le palline delle fette sottili di cipolla.","Con una pressa per grigliare schiacciare con decisione le cipolle e la carne fino a formare un tortino piatto. Condire una seconda volta.","Lasciarle grigliare per 1-2 minuti, quindi girarle in modo che le cipolle siano rivolte verso il calore della piastra. Condire e aggiungere anche un paio di fette di formaggio su ogni hamburger e alcuni peperoncini jalapeño a fette.","Posizionare la campana per l'irrorazione sopra gli hamburger e lasciare che il formaggio si sciolga.","Posizionare i panini al burro con il lato tagliato rivolto verso il basso sulla piastra (per una tostatura leggera).","Assemblare ogni hamburger. Togliere l'intero mucchietto dalla piastra con una spatola e metterlo sulla base del panino.","Aggiungere la salsa barbecue e servire."],"u":"https://www.weber.com/IT/it/ricette/manzo/hamburger-smash/weber-2427097.html"},{"n":"Agnello Arrosto Al Cumino Con Patate Hasselback E Lattuga Romana Grigliata","c":"Agnello","s":"4","d":"Medio","g":"180-200 °C","m":"diretta/indiretta","i":"https://content-images.weber.com/emea-recipes/Easter-Lamb-Hasselback-Potatoes.jpg","ig":[{"g":"Per L'agnello","i":["1 mezza coscia di agnello"]},{"g":"Marinata","i":["4 cucchiaini di cumino macinato","1 cucchiaino di cannella in polvere","2 anice stellato macinato","2 cucchiaini di menta secca","2 cucchiai di zucchero di canna scuro","3 spicchi d&#039;aglio tritati","1 peperoncino rosso medio tritato finemente","3 cucchiai di olio d&#039;oliva","Sale e pepe"]},{"g":"Per Le Patate Hasselback","i":["8 patate di medie dimensioni","3 cucchiai di burro fuso","2 cucchiai di olio d&#039;oliva","2 spicchi d&#039;aglio tritati finemente","1 cucchiaino di sale marino","½ cucchiaino di pepe nero macinato","1 cucchiaio di rosmarino o timo fresco, tritato finemente"]}],"ins":["In una ciotola, mescolare cannella, anice stellato, cumino, menta secca, sale, pepe e zucchero.","Aggiungere l'aglio tritato, il peperoncino tritato e 3-4 cucchiai di olio d'oliva, mescolando fino a formare un impasto.","Strofinare il composto su tutto l'agnello e marinare per almeno 1 ora (preferibilmente 2 ore).","Mettere una patata tra due cucchiai di legno e tagliarla a fette sottili (⅔ della lunghezza), lasciando intatta la base.","In una ciotola, mescolare il burro fuso, l'olio d'oliva, l'aglio, il sale e il pepe.","Spennellare abbondantemente le patate con il composto, assicurandosi che goccioli nelle fette.","Preparare il barbecue per il calore indiretto a 180-200°C. Se si utilizza un barbecue a carbonella, accendere ⅔ di un Weber® Rapidfire® Chimney Starter con le bricchette.","Fissare l'agnello sul spiedo del girarrosto, assicurandolo con i rebbi della forchetta. (Opzionale: infilare sullo spiedo cipolle, peperoni o pomodori interi accanto alla carne).","Fissare lo spiedo del girarrosto al motore, posizionarlo sul barbecue e coprirlo con il coperchio.","Cuocere per 30-40 minuti o fino a quando l'agnello raggiunge una temperatura interna di 60°C.","Togliere dal fuoco e lasciare riposare per 10 minuti prima di affettare sottilmente.","Mettere le patate preparate in un vassoio di alluminio e posizionarlo su calore indiretto.","Cuocere per 40 minuti, bagnando con altra miscela di burro ogni 10 minuti.","Se lo si desidera, cospargere con rosmarino o timo fresco prima di servire.","Preriscaldare la griglia del barbecue o la griglia diretta a fuoco medio-alto.","Condire le mezze lattughe romane con olio d'oliva, sale e pepe.","Metterle sulla griglia con il lato tagliato verso il basso e cuocere per 2-3 minuti fino a quando saranno leggermente abbrustolite.","Toglietele dal fuoco, irroratele con succo di limone e cospargetele di parmigiano (se lo usate).","Disponete le fette di agnello su un piatto da portata.","Accanto mettete le patate Hasselback croccanti.","Terminate con la valeriana grigliata, aggiungendo un ultimo filo di succo di limone.","Servite immediatamente e godetevi il perfetto equilibrio tra agnello affumicato e speziato, patate croccanti e verdure fresche."],"u":"https://www.weber.com/IT/it/ricette/agnello/agnello-arrosto-al-cumino-con-patate-hasselback-e-lattuga-romana-grigliata/weber-2423817.html"},{"n":"Salmone scottato con asparagi grigliati e vinaigrette al limone","c":"Pesce & Frutti di Mare","s":"4","d":"","g":"180°C-230°C","m":"Diretta","i":"https://content-images.weber.com/emea-recipes/salmon-4.jpg","ig":[{"g":"Vinaigrette al limone","i":["4 cucchiai di olio extravergine di oliva","1 cucchiaino di scorza di limone grattugiata finemente","Succo di mezzo limone","5 g di aneto tritato finemente","1 cucchiaino di sale marino","1 cucchiaino di senape di Digione","½ cucchiaino di pepe nero macinato"]},{"g":"Asparagi","i":["28 gambi di asparagi spessi (circa 680 g)","Olio extravergine di oliva","Sale marino e pepe nero macinato","Scorza di limone grattugiata finemente"]}],"ins":["Preparare la vinaigrette: in una ciotola, sbattere insieme tutti gli ingredienti della vinaigrette. Mettere da parte.","Preparare gli asparagi: tagliare piegando ogni gambo fino a quando non si spezza nel punto di rottura naturale. Eliminare le estremità dure.","Condire il salmone: asciugare i filetti con carta da cucina. Strofinare con olio d'oliva, sale, pepe nero e paprika affumicata (se utilizzata).","Cuocere gli asparagi: prepara il barbecue per la cottura diretta a fuoco medio (180°C-230°C).","Versa 300 ml di acqua nel wok. Preriscalda il wok e la vaporiera sul barbecue finché l'acqua non bolle. Cuoci gli asparagi al vapore per 2-3 minuti finché non sono teneri.","Griglia gli asparagi per 30 secondi per lato per aggiungere un leggero colore.","Rosolare il salmone sulla piastra: preriscaldare la piastra del barbecue per 5 minuti a fuoco medio-alto. Ungere leggermente la superficie.","Disporre i filetti di salmone con la pelle rivolta verso il basso sulla piastra calda. Cuocere per 4-5 minuti senza muoverli fino a quando la pelle è croccante.","Girarli e cuocerli per altri 3-4 minuti fino a quando la temperatura interna raggiunge i 52°C-55°C (cottura media) o 60°C per una cottura ben cotta. Togliere dal fuoco e lasciar riposare per 1-2 minuti.","Assemblare e servire: disporre gli asparagi su un piatto caldo.","Sbattere la vinaigrette per amalgamarla, quindi versarla a filo sugli asparagi.","Disporre sopra i filetti di salmone scottati e guarnire con semi tostati e una spolverata di scorza di limone."],"u":"https://www.weber.com/IT/it/ricette/pesce-frutti-di-mare/salmone-scottato-con-asparagi-grigliati-e-vinaigrette-al-limone/weber-2421600.html"},{"n":"Chili Affumicato In Stile Messicano Con Carne Di Manzo Macinata","c":"Manzo","s":"6-8","d":"Medio","g":"160-180 °C","m":"Indiretta/lenta","i":"https://content-images.weber.com/emea-recipes/chilli-3.jpg","ig":[{"g":"Per la base del chili","i":["1 kg di carne di manzo tritata (miscela 80/20 per un sapore migliore)","2 cucchiai di olio d&#039;oliva","2 cipolle, tritate finemente","4 spicchi d&#039;aglio, tritati finemente","2 peperoncini rossi freschi, tritati","1 peperone rosso grande, tagliato a dadini","2 cucchiai di concentrato di pomodoro","2 scatole da 400 g di pomodori a pezzetti","500 ml di brodo di manzo","1 scatola (400 g) di fagioli neri, scolati","1 scatola (400 g) di fagioli rossi, scolati","1 cucchiaio di zucchero di canna scuro","1 cucchiaio di cacao in polvere (per un sapore più intenso)","Succo di 1 lime","Sale e pepe nero (a piacere)"]},{"g":"Per la miscela di spezie","i":["2 cucchiai di paprika affumicata","1 cucchiaio di cumino macinato","1 cucchiaio di origano essiccato","1 cucchiaino di coriandolo macinato","1 cucchiaino di cannella in polvere","½ cucchiaino di pepe di Cayenna (regolare in base al grado di piccantezza desiderato)"]}],"ins":["Tritare le cipolle, l'aglio, i peperoncini e il peperone.","In una piccola ciotola, mescolare tutti gli ingredienti della miscela di spezie.","Mettere a bagno i trucioli di legno in acqua per almeno 30 minuti.","Preriscaldare il Weber Dutch Oven Duo a fuoco medio sul barbecue.","Aggiungere l'olio d'oliva e rosolare le cipolle, l'aglio, i peperoncini e il peperone fino a quando non si saranno ammorbiditi.","Aggiungere il concentrato di pomodoro e il mix di spezie, cuocendo per 1-2 minuti fino a quando non saranno fragranti.","Aggiungere la carne macinata, spezzettandola con un cucchiaio, e cuocere fino a doratura.","Impostare il barbecue Weber per la cottura indiretta a 160-180 °C (320-350 °F).","Aggiungere i trucioli di legno inzuppati al carbone o alla scatola dell'affumicatore. Chiudere il coperchio e lasciare che si sviluppi il fumo.","Versare i pomodori a pezzetti e il brodo di manzo, mescolando bene.","Coprire la pentola olandese e posizionarla sulla griglia a calore indiretto.","Cuocere con il coperchio chiuso per un'ora e mezza, mescolando di tanto in tanto per evitare che si attacchi.","Dopo un'ora e mezza, aggiungere i fagioli neri, i fagioli rossi, lo zucchero di canna e il cacao in polvere. Mescolare bene.","Continuare la cottura per un'altra ora, lasciando che il chili si addensi e sviluppi sapori intensi.","Poco prima di servire, aggiungere il succo di lime e aggiustare di sale e pepe."],"u":"https://www.weber.com/IT/it/ricette/manzo/chili-affumicato-in-stile-messicano-con-carne-di-manzo-macinata/weber-2420162.html"},{"n":"Trecce Di Pollo Al Sesamo Con Salsa Al Cetriolo E Papaya","c":"Pollame","s":"4","d":"Media","g":"160 °C","m":"Cottura Diretta","i":"https://content-images.weber.com/emea-recipes/Chicken_Plaits_1.jpg","ig":[{"g":"Trecce","i":["600 g di petto di pollo (o petto di tacchino)","35 g di salsa teriyaki","1 arancia, scorza grattugiata e succo","1/2 cucchiaino di coriandolo macinato","1/2 cucchiaino di cardamomo macinato","50 g di semi di sesamo bianco","50 g di semi di sesamo nero"]}],"ins":["Immergere gli spiedini di bambù in acqua.","Tagliare i petti di pollo nel senso della lunghezza, in fette spesse 1,5 cm.","Mescolare la salsa teriyaki, la scorza d'arancia, il coriandolo e il cardamomo. Insaporire con peperoncino e sale.","Massaggiare la carne con la salsa e rotolarne metà nei semi di sesamo bianco e l'altra metà nel sesamo nero.","Alternare le strisce bianche e nere per creare una treccia, infilarle sugli spiedini e spennellarle con un po' di olio.","Pelare e tagliare a metà la papaya e il cetriolo, rimuovere i semi e tagliare la polpa a dadini.","Pelare e tritare o grattugiare lo zenzero.","Tagliare il peperoncino a dadini e mescolare con papaya, cetriolo, zenzero e un po' d'olio.","Preparare il barbecue per il calore diretto di circa 160 °C","Cuocere le trecce sul calore diretto per circa 4-5 minuti da ogni lato.","Spostare sul calore indiretto e lasciare riposare fino a quando non hanno raggiunto una temperatura interna di circa 73 °C.","Posizionare la piastra sul calore diretto, preriscaldare per alcuni minuti, quindi aggiungere il composto di papaya e cetriolo e cuocere per circa 10-15 minuti.","Dopo 5 minuti aggiungere il succo d'arancia, il miele, il peperoncino e il sale. Mescolare bene e servire con il pollo."],"u":"https://www.weber.com/IT/it/ricette/pollame/trecce-di-pollo-al-sesamo-con-salsa-al-cetriolo-e-papaya/weber-2418327.html"},{"n":"Spiedini Di Pollo Con Verdure E Coriandolo Fresco","c":"Pollame","s":"4","d":"","g":"","m":"Cottura Diretta","i":"https://content-images.weber.com/emea-recipes/Brochettes-de-poulet-à-la-coriandre-légumes.png","ig":[{"g":"Ingredienti","i":["4 petti di pollo","2 cipolle rosse","2 peperoni gialli","Coriandolo fresco","75 ml di olio vegetale","2 spicchi d&#039;aglio","10 g di zenzero","Sale e pepe"]}],"ins":["Tagliare il pollo a cubetti di 3 cm.","Sbucciare le cipolle rosse e tagliarle in quarti. Rimuovere la base con le radici e separare leggermente i quarti. Lavare i peperoni e tagliarli a metà. Eliminare i semi e tagliarli in cubetti di 3 cm.","Assemblare gli spiedini mettendo un pezzo di cipolla rossa sullo spiedino, poi il peperone e poi un pezzo di pollo. Continuare fino a quando su ogni spiedino non sono presenti 4-5 pezzi di pollo.","Lavare il coriandolo e tritarlo finemente. Metterlo da parte.","Preparare la marinata mescolando l'olio con lo zenzero e l'aglio.","Girare gli spiedini di pollo nella marinata e metterli in frigorifero a marinare per 1 ora.","Condire gli spiedini di pollo con sale e pepe.","Preparare il barbecue per la cottura a calore indiretto, circa 220 °C. Se si utilizza un barbecue a carbone, è necessaria meno di ½ ciminiera di accensione di bricchetti accesi.","Ungere la griglia con un po' d'olio. Posizionare gli spiedini di pollo sulla griglia e cuocere su calore diretto per circa 15 minuti. Girarli ogni 3 minuti. Cuocere fino a quando la temperatura interna del pollo non raggiunge i 75 °C.","Quando gli spiedini sono pronti, cospargerli con coriandolo tritato."],"u":"https://www.weber.com/IT/it/ricette/pollame/spiedini-di-pollo-con-verdure-e-coriandolo-fresco/weber-2418220.html"},{"n":"Spiedini Di Pollo Alla Cachaça Brasiliana","c":"Pollame","s":"8","d":"","g":"","m":"Cottura Diretta","i":"https://content-images.weber.com/emea-recipes/Cachaca-Kebabs_ShootThrough-346x318_250310_091254.jpg","ig":[{"g":"Ingredienti","i":["20 g di foglie di menta fresca","250 ml di succo di lime","scorza grattugiata di 1 lime","125 ml di cachaça brasiliana","60 ml di olio d&#039;oliva","1 cucchiaino di pepe di Caienna","2 peperoncini rossi lunghi, tritati finemente","1 cucchiaio colmo di zucchero di canna","1 kg di petto di pollo","Foglie di menta fresca extra per guarnire"]}],"ins":["Tritare finemente metà della menta e metterla in una ciotola grande. Aggiungere il succo di un lime, la sua scorza grattugiata, la cachaça, i peperoncini, lo zucchero, l'olio, il pepe di Caienna, sale e pepe e mescolare bene.","Versare 1⁄3 della marinata in una piccola padella e far consumare fino a ridurre della metà per ottenere uno sciroppo. Mettere da parte.","Nel frattempo, tagliare il pollo in pezzi di 3 cm e mescolare bene con la marinata rimanente.","Coprire con pellicola trasparente e conservare in frigorifero per tutta la notte per amalgamare i sapori.","Preparare il barbecue per la cottura (metodo diretto) e lasciarlo preriscaldare a calore medio.","Infilare i pezzi di pollo sugli spiedini, alternandoli alle foglie di menta e cuocere per 8 minuti, girandoli una volta dopo circa 4 minuti. Una volta cotti (75 °C), spennellare con la riduzione di sciroppo di cachaça.","Servire con un'insalata alle erbe aromatiche."],"u":"https://www.weber.com/IT/it/ricette/pollame/spiedini-di-pollo-alla-cacha%C3%A7a-brasiliana/weber-2418170.html"},{"n":"Pollo e Gamberetti Teriyaki Saltati in Padella","c":"Pollame","s":"6","d":"Medio","g":"170°C - 200°C","m":"Diretto","i":"https://content-images.weber.com/emea-recipes/Kathryn-Goddard-Photographhy-Weber-June-2024-465.jpg","ig":[{"g":"Ingredienti","i":["1kg di cosce di pollo disossate e senza pelle, tagliate a dadini","300g di gamberetti, privati di testa e guscio e privati della coda di paglia","4 spicchi d&#039;aglio tritati","Olio vegetale","1 peperone rosso, tagliato a fette","1 peperone giallo, a fette","1 cipolla a fette","12 oz. di funghi, affettati","1 1/2 c. di salsa teriyaki, divisa per due","Sale e pepe a piacere","Cipolle verdi (facoltativo)","Semi di sesamo (facoltativi)"]}],"ins":["Tagliare a cubetti le cosce di pollo e tritare l'aglio.","Mettere il pollo in un sacchetto con chiusura a zip con 1/2 tazza di salsa teriyaki. Lasciare marinare per almeno 1 ora.","Mettere i gamberi puliti in una ciotola a parte con 2 cucchiai di salsa teriyaki. Lasciare marinare per 15-30 minuti prima di cucinare.","Preriscaldare il Weber Slate impostando i bruciatori su medio-basso e attendere 10-15 minuti per un riscaldamento uniforme.","Mentre il Weber Slate si riscalda, affettare i peperoni, i funghi e la cipolla.","Oliate leggermente la superficie di cottura.","Aggiungere tutte le verdure affettate a un lato della Weber Slate.","Aggiungete il pollo marinato sull'altro lato e mescolate entrambi di tanto in tanto. Salare e pepare a piacere.","Quando il pollo è circa a metà cottura, spostatelo di lato e aggiungete i gamberi sul piano.","Mescolare spesso i gamberi e cuocerli per 2-3 minuti per lato, finché non diventano rosa e opachi.","Quando le verdure iniziano a diventare tenere, mescolare il tutto (pollo, gamberi e verdure) e completare con 1/2 tazza di salsa teriyaki.","Continuare la cottura finché il pollo non raggiunge una temperatura interna di 75°C e i gamberi non sono completamente cotti.","Togliere dal Weber Slate e guarnire con semi di sesamo, cipolle verdi e la restante salsa teriyaki, se si desidera."],"u":"https://www.weber.com/IT/it/ricette/pollame/pollo-e-gamberetti-teriyaki-saltati-in-padella/weber-2416213.html"},{"n":"Nachos al BBQ di fine primo tempo","c":"Manzo","s":"","d":"Facile","g":"200°C","m":"Indiretto","i":"https://content-images.weber.com/emea-recipes/IT/nachos-option-2.jpg","ig":[{"g":"Ingredienti","i":["200g di tortilla chips salate","100g di formaggio cheddar grattugiato","50g di jalapeños sottaceto","2 pomodori","4 cipollotti","5g di coriandolo fresco","succo di 1 lime","sale","pepe"]}],"ins":["Preparare il barbecue per la cottura indiretta a circa 200°C.","In una teglia da forno adatta al barbecue, disponete a strati le tortilla chips mescolate con i jalapenos e il formaggio. Terminare con uno strato di formaggio.","Per preparare la salsa, tagliare finemente i pomodori, i cipollotti e il coriandolo. in una ciotola, unire tutti gli ingredienti con il succo di lime e condire a piacere.","Cuocere indirettamente per 5 minuti, finché il formaggio non si sarà sciolto e le punte delle tortilla chips non inizieranno a dorarsi.","Servire caldo.","Suggerimento dello chef: per rendere i nachos ancora più speciali, prima di metterli sulla griglia, aggiungete la carne tritata avanzata e un po' di fagioli fritti."],"u":"https://www.weber.com/IT/it/ricette/manzo/nachos-al-bbq-di-fine-primo-tempo/weber-2413675.html"},{"n":"Alette di pollo Weber indimenticabili","c":"Manzo","s":"12","d":"Facile","g":"200°C","m":"Indiretto","i":"https://content-images.weber.com/emea-recipes/IT/Piri-Piri-wings002.jpg","ig":[{"g":"Ingredienti","i":["12 alette di pollo","50ml di salsa di pepe di cayenne","20g burro","5g di zucchero di canna","120g di formaggio erborinato sbriciolato","2 cucchiaio di panna acida","2 cucchiaio di maionese","1 cucchiaio di latte","6g di sale","12g pepe nero macinato","6g sale all’aglio"]}],"ins":["Preparare il barbecue per la cottura indiretta a circa 200°C.","Tagliare le alette di pollo in due e rimuovere la punta.","Mescolare accuratamente le spezie per il rub e poi cospargerlo sulle alette di pollo.","Preparare la salsa Buffalo in una casseruola facendo sciogliere il burro con la salsa piccante e lo zucchero.","Per la salsa, mettere in una ciotola il formaggio erborinato, la panna acida, la maionese e il latte. Mescolare fino a quando gli ingredienti sono completamente combinati. Condire a piacere.","Mettere le ali di pollo sulla griglia per circa 30 minuti, girandole ogni 5 minuti. Quando hanno raggiunto una temperatura interna di 75ºC, sono pronte.","Togliere dalla griglia e spennellare con la salsa Buffalo calda, quindi servire con la salsa al formaggio."],"u":"https://www.weber.com/IT/it/ricette/manzo/alette-di-pollo-weber-indimenticabili/weber-2413659.html"},{"n":"Smash Burger Weber Store Torino","c":"Manzo","s":"1","d":"Facile","g":"280°","m":"Diretto","i":"https://content-images.weber.com/emea-recipes/IT/SMASH-BURGER-TORINO.png","ig":[{"g":"Ingredienti","i":["1 panino","200 gr fassona macinata","100 gr toma piemontese","100 gr panna","1 porro","Olio di semi q.b","20 gr farina","250 ml olio di semi","Olio evo q.b","6 spicchi aglio nero","1 uovo intero","Mezzo succo di limone","Sale e pepe q.b","2 foglie di lattuga","Mezzo bicchiere di aceto bianco"]}],"ins":["Preparazione della salsa di Toma piemontese","Preparazione del porro fritto","Preparazione della mayo all’aglio nero","Preparazione e cottura del burger","Composizione dello smash burger","… e buon appetito!"],"u":"https://www.weber.com/IT/it/ricette/manzo/smash-burger-weber-store-torino/weber-2403852.html"},{"n":"Panino con costine","c":"Maiale","s":"","d":"Media","g":"110°","m":"Indiretto","i":"https://content-images.weber.com/emea-recipes/IT/IMG_3979.jpg","ig":[{"g":"Ingredienti","i":["Slab di pork ribs","Burro salato, 100 gr","Senape","Jack Daniel&#039;s","Rub di maiale","Salsa bbq"]}],"ins":["Per prima cosa, togliere la pleura dalle ribs con l’aiuto di un cucchiaio. Una volta ripulite, spalmare un filo di senape (che farà da collante) e poi versare a pioggia il rub, senza schiacciare con le mani.","Nel frattempo, mettere le chips a bagno.","Posizionare la carne sul lato nel dispositivo a 110°C e posizionare le slab sul fianco. Aggiungere le chips. Affumicare per circa 40 min.","Una volta raggiunti i 72°C al cuore, rimuovere dal dispositivo. Versare un velo di Jack Daniel’s e un po’ di burro, e poi mettere in foil facendo attenzione a chiuderlo bene.","Rimettere in cottura indiretta fino al raggiungimento dei 95-97°C.","Togliere dal foil e aggiungere la salsa bbq per la glassatura. Rimettere in cottura indiretta per altri 10-15 minuti.","Prepariamo la puccia con insalata e un velo di salsa bbq, poi posizionare le costine sfilando le ossa."],"u":"https://www.weber.com/IT/it/ricette/maiale/panino-con-costine/weber-2396629.html"},{"n":"Pork Belly Burnt Ends","c":"Maiale","s":"","d":"Facile","g":"75-96° interni","m":"Indiretto","i":"https://content-images.weber.com/emea-recipes/IT/IMG_3998-copia-1.jpg","ig":[{"g":"Ingredienti","i":["Pancetta","Burro salato","Jack Daniel&#039;s","Sciroppo d&#039;acero","Rub per affumicatura","Salsa barbecue","Zucchero di canna"]}],"ins":["Iniziare togliendo la cotenna (se non riuscite, chiedete al macellaio), poi tagliare i cubetti da 3/4 cm.","Una volta tagliata a cubetti, aggiungere una spolverata d rub di maiale e massaggiare il tutto.","Passare al barbecue per l’affumicatura a cottura indiretta a 110°. Lasciar cuocere la carne fino a quando la carne raggiungerà i 75/76° gradi al cuore. Quando la carne avrà formato il bark, togliere dal dispositivo e mettere tutto in una teglia o una vaschetta di alluminio, poi versare zucchero moscovado, sciroppo d’acero, Jack Daniel's, e burro. Chiudere la vaschetta con dell’alluminio e rimettere nel barbecue per qualche minuto fino al raggiungimento di 96° al cuore.","Togliere dal bbq, aggiungere la salsa bbq per glassare e rimettere ne dispositivo per qualche minuto.","Impiattare e gustare."],"u":"https://www.weber.com/IT/it/ricette/maiale/pork-belly-burnt-ends/weber-2394154.html"},{"n":"Salmone al pepe rosa e aneto","c":"Altre","s":"","d":"Facile","g":"","m":"","i":"https://content-images.weber.com/emea-recipes/IT/Salmone-al-pepe-rosa-e-aneto.jpeg","ig":[{"g":"Ingredienti","i":["1 filetto di salmone","1 mazzetto di aneto fresco","1 cucchiaio di pepe rosa in grani","1 lime","300 g di broccoletti","Olio extra vergine di oliva (EVO)","Sale q.b."]}],"ins":["Per l'emulsione","Per il contorno","Per il salmone"],"u":"https://www.weber.com/IT/it/ricette/salmone-al-pepe-rosa-e-aneto/weber-2389896.html"},{"n":"Spinacino di manzo affumicato","c":"Manzo","s":"","d":"Facile","g":"160°","m":"Indiretto","i":"https://content-images.weber.com/emea-recipes/IT/Spinacino-di-manzo-affumicato.JPG","ig":[{"g":"Per l'injection (100ml)","i":["50 ml brodo di carne","20 ml succo di mela","20 ml rum scuro","10 ml aceto di mele","qualche goccia di salsa Worchester"]}],"ins":["Iniziare eliminando leggermente il grasso dallo spinacino di manzo.","Procedere eseguendo le injection stando attenti a coprire tutta la superficie della carne, poi lasciare riposare.","Asciugare leggermente lo spinacino e utilizzare l’umidità in eccesso come collante per il rub, da spolverare su tutta la superficie del taglio di manzo.","Settare il bbq per una cottura indiretta a 160° e posizionare lo spinacino sul calore indiretto affumicando a piacere fino al raggiungimento dei 45°/48° interni.","Spostare la carne sul calore diretto per creare una crosticina saporita da ambo i lati, fino al raggiungimento dei 52° gradi interni.","Importante: tagliare la carne contro fibra per renderla più tenera al morso."],"u":"https://www.weber.com/IT/it/ricette/manzo/spinacino-di-manzo-affumicato/weber-2388197.html"},{"n":"Patate ripiene con manzo sfilacciato","c":"Manzo","s":"6","d":"","g":"80°-130°","m":"Indiretto","i":"https://content-images.weber.com/emea-recipes/IT/24.04.04-–-Patate-Ripiene-con-Manzo-Sfilacciato.jpg","ig":[{"g":"Ingredienti","i":["2kg cappello del prete extra marezzato di bovino","20gr rub per manzo","100ml brodo di carne","50ml birra","10ml aceto di mele","10ml salsa di soia","50gr burro","6 patate","100gr salsa bbq","1L olio di semi arachide","100ml panna","200gr taleggio","Erba cipollina"]}],"ins":["Durante la fase di rest della carne procedi con la preparazione delle patate e della salsa di taleggio.","Per la preparazione delle patate:","Per la preparazione della salsa far sciogliere il taleggio in un pentolino e mescolare con la panna.","Per comporre questa meraviglia:","Buon appetito!"],"u":"https://www.weber.com/IT/it/ricette/manzo/patate-ripiene-con-manzo-sfilacciato/weber-2384653.html"},{"n":"Baltimora Pit Beef con salsa Tiger","c":"Manzo","s":"4","d":"Facile","g":"","m":"Indiretto, poi diretto","i":"https://content-images.weber.com/emea-recipes/IT/Baltimora-Pit-Beef.jpeg","ig":[{"g":"Carne","i":["1kg di girello o noce di manzo","senape"]},{"g":"Rub","i":["2 cucchiai di sale fino","2 cucchiaini di paprika dolce","2 cucchiaini di pepe nero","2 cucchiaini di aglio in polvere","2 cucchiai di origano in polvere","¼ di cucchiaino di peperoncino in polvere"]}],"ins":[],"u":"https://www.weber.com/IT/it/ricette/manzo/baltimora-pit-beef-con-salsa-tiger/weber-2384551.html"},{"n":"Tacos smash burger","c":"Manzo","s":"4","d":"Facile","g":"240°","m":"","i":"https://content-images.weber.com/emea-recipes/IT/Taco-smash-burger.png","ig":[{"g":"Ingredienti","i":["720 gr di macinato di manzo","8 fette di bacon","4 fette di cheddar","4 tortillas medie","2 cipolle","Rub pe
