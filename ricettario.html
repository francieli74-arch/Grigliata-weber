r burger","Sale","Pepe","Olio EVO","Salsa burger"]}],"ins":["Versare il macinato di manzo in un recipiente, condire con rub, sale e pepe e mescolare il tutto. Formare 4 polpette rotonde da circa 180 gr ciascuna.","Affettare finemente le cipolle.","Posizionare la piastra all’interno del bbq e preriscaldare a 240°.","Stufare le fette di bacon sulla piastra e mettere da parte.","Scaldare le tortilla e mettere da parte.","Posizionare le polpette di macinato sulla piastra, schiacciare leggermente con le mani per appiattirle e posizionare un po’ di cipolle sopra.","Aggiungere un altro po’ di rub.","Premere forte il macinato sulla piastra utilizzando l’apposita pressa.","Una volta cotto da un lato, girare lo smash burger con la spatola.","Attendere qualche minuto e posizionare una fetta di cheddar su ogni burger.","Utilizzare la cloche apposita per far sciogliere il formaggio.","A questo punto posizionare le tortilla sulla carne in modo che aderiscano al formaggio sciolto.","Prendere il tacos dalla griglia, piegarlo a metà, versare un po’ di salsa burger e gustare."],"u":"https://www.weber.com/IT/it/ricette/manzo/tacos-smash-burger/weber-2384041.html"},{"n":"Smash Burger","c":"Manzo","s":"","d":"Facile","g":"280°","m":"","i":"https://content-images.weber.com/emea-recipes/IT/24.03.12-–-Smash-Burger-Miss-BBQ.png","ig":[{"g":"PATTY","i":["300 gr. reale di manzo macinato","150 gr. di mortadella Bologna DOP macinata","Sale","Pepe","Aglio in polvere / rub di manzo"]},{"g":"PARMIGIANO, AGLIO MAYO","i":["Aglio bianco","Maionese","Parmigiano Reggiano DOP","Burro"]},{"g":"FRICO SOTTILETTA CROCCANTE","i":["200 gr. tosone","1 patata media grattugiata"]},{"g":"SCALOGNO AL BALSAMICO","i":["Aceto balsamico di Modena","6 scalogni di Romagna."]}],"ins":["Lo Smash Burger del Weber Store Emilia Ovest con il tocco friulano di Miss BBQ!","Un panino ricco e deciso che esalta i sapori del territorio!","IN CUCINA","IN PIASTRA","COMPOSIZIONE"],"u":"https://www.weber.com/IT/it/ricette/manzo/smash-burger/weber-2383986.html"},{"n":"Sandwich con tacchino, peperoni e feta","c":"Altre","s":"4","d":"Facile","g":"240°","m":"Diretto","i":"https://content-images.weber.com/emea-recipes/IT/1055096.JPG","ig":[{"g":"Ingredienti","i":["400gr di petto di tacchino","200gr di feta greca","100gr di formaggio spalmabile","2 peperoni","1 limone","100gr di maionese","12 fette di pane da toast","Rub pollo","Sale","Pepe","Olio EVO"]}],"ins":[],"u":"https://www.weber.com/IT/it/ricette/sandwich-con-tacchino-peperoni-e-feta/weber-2382042.html"},{"n":"Chicken bacon bomb","c":"Pollame","s":"","d":"Facile","g":"150°C","m":"Indiretto","i":"https://content-images.weber.com/emea-recipes/IT/Chicken-bacon-bomb.jpeg","ig":[{"g":"Ingredienti","i":["4 sovracosce di pollo disossate e spellate","12 fette di bacon","4 jalapeno o friggitelli","100gr di formaggio spalmabile","100gr di cheddar grattugiato","Chicken rub","Salsa bbq","Olio EVO","Sale","Pepe"]}],"ins":["Mescolare il formaggio spalmabile con il cheddar e un po' di chicken rub fino ad ottenere un composto omogeneo. Aprire i jalapeño e pulirli. Inserire all’interno il composto di formaggio e richiuderli.","Stendere le sovracosce, passare un po' di olio EVO e speziarle da ambo i lati con u po' di rub. Inserire nel mezzo un peperone farcito e richiudere creando un involtino. Bardare il tutto con 3 fette di bacon ed aggiungere un altro po' di rub sull’esterno.","Settare il dispositivo per un cottura indiretta a 150° e affumicare le chicken bomb a piacimento. Quando avranno raggiunto la temperatura interna di 75° interni, spennellarle con un po di salsa bbq e attendere altri 5 minuti prima di togliere e servirle."],"u":"https://www.weber.com/IT/it/ricette/pollame/chicken-bacon-bomb/weber-2380862.html"},{"n":"Alette di pollo Korean style","c":"Pollame","s":"","d":"Media","g":"160°, 200/220°","m":"Indiretto","i":"https://content-images.weber.com/emea-recipes/IT/Alette-di-pollo-Korean-style.JPG","ig":[{"g":"Ingredienti","i":["1,5 kg di alette di pollo","Rub per pollo","3 spicchi d’aglio","2 CT di Kimchi","1 CT di gochujang","3 CT di Ketchup","2 CT di salsa di soya","2 CT di zucchero di canna","1 CT di miele","1 CT di aceto di riso","Olio EVO","Semi di sesamo","Erba cipollina"]}],"ins":["Ungere le alette con un velo di olio EVO e speziarle utilizzando il rub.","Settare il bbq per una cottura indiretta a 160° e cuocere le alette affumicando a piacere. Terminare la cottura sul calore diretto per ottenere una crosticina saporita fino al raggiungimento dei 75/80° interni. Mettere le alette da parte senza che si raffreddino troppo.","Settare il dispositivo intorno a 200/220° con calore indiretto e inserire la wok in ghisa per preriscaldarla. Preparare la salsa con 3 CT di olio e fare soffriggere leggermente l’aglio. Una volta che questo sarà lievemente imbrunito, aggiungere il Kimchi, il gochujang, il ketchup, la salsa di soia, lo zucchero di canna, il miele, l’aceto di riso e cuocere fino al raggiungimento di una salsa densa.","Appena pronta, togliere la wok dal dispositivo, inserire le aletta nella salsa e girare.","Servire le alette cosparse di erba cipollina tritata e semi di sesamo."],"u":"https://www.weber.com/IT/it/ricette/pollame/alette-di-pollo-korean-style/weber-2379699.html"},{"n":"Sandwich salsiccia, porro e salsa yogurt","c":"Pane & Pizza","s":"4","d":"Facile","g":"75° al cuore","m":"Indiretto","i":"https://content-images.weber.com/emea-recipes/IT/1051010.JPG","ig":[{"g":"Panino","i":["4 salsicce di maiale di media dimensione","1 porro","4 panini"]}],"ins":["Per il panino","Accendere una dozzina circa di bricchetti dentro la ciminiera di accensione. Quando i bricchetti sono accesi, posizionarli dentro il Weber Go Anywhere a carbone solo su un lato per creare il set di una cottura indiretta.","Aprire parzialmente le vent-out e le vent-it solo da un lato del WGA. Posizionare le salsicce dal lato opposto alla brace per la cottura indiretta.","Tagliare il porro a listarelle di circa 5 cm e mettere anche il porro in cottura indiretta.","Per la salsa","Durante la cottura delle salsicce preparare la salsa (può essere preparata anche il giorno prima).","Tagliare finemente l’erba cipollina. Versare 2 parti di yogurt e 1 parte di senape, versare 2 cucchiaini di salsa Worcestershire, versare l’erba cipollina e SPG, amalgamare il tutto e lasciare riposare.","Composizione","Una volta che le salsicce hanno raggiunto i 75° al cuore sono pronte. Quindi toglierle dal BBQ e aprirle in due sul lato lungo.","Disporre in ordine sul panino: salsa, salsiccia e porro... e buon appetito!"],"u":"https://www.weber.com/IT/it/ricette/pane-pizza/sandwich-salsiccia-porro-e-salsa-yogurt/weber-2377154.html"},{"n":"Croissant salati con insalata di pollo grigliato","c":"Altre","s":"4","d":"Facile","g":"250°C","m":"Diretto","i":"https://content-images.weber.com/emea-recipes/IT/Croissant-salati-con-insalata-di-pollo-2.jpeg","ig":[{"g":"Ingredienti","i":["4 croissant salati","Petto di pollo, 500 gr","Mandorle pelate, 60 gr","8 cetriolini agrodolce","20 pomodorini ciliegini","4 cipollotti","Germogli di soia","2 avocado","Insalata misticanza","Maionese","Senepe artigianale in grani","Salsa chili piccante","Rub pollo","Rub SPG","Olio EVO","Sale","Pepe"]}],"ins":["Ungere leggermente il petto di pollo e cospargere prima il rub pollo e poi del rub spg. Pulire i cipollotti e ungerli con un po’ di olio.","Settare il dispositivo per una cottura diretta a 250° e cuocere il pollo e i cipollotti.","Levarli quando cotti e in particolare il pollo quando raggiungere i 75° di temperatura interna.","Tagliare il pollo a striscioline, i cipollotti, i cetriolini, i pomodorini a pezzettini. Tritare grossolanamente le mandorle.","Mettere il tutto in un recipiente e comporre l’insalata aggiungendo una manciata di germogli di soia, 4 cucchiai di maionese, 1 cucchiaio di senape, e un po’ di salsa chili. regolare di sale e pepe. Mescolare e amalgamare il tutto.","Tagliare i croissant a metà e grigliarli velocemente.","Pelare gli avocado e tagliarli a fettine.","Comporre i sandwich con qualche fettina di avocado, un po’ di insalata e l’insalata di pollo."],"u":"https://www.weber.com/IT/it/ricette/croissant-salati-con-insalata-di-pollo-grigliato/weber-2375218.html"},{"n":"Onion bacon smash burger","c":"Manzo","s":"","d":"Facile","g":"250°","m":"Diretto","i":"https://content-images.weber.com/emea-recipes/IT/onion-bacon-smash-burger.jpeg","ig":[{"g":"Ingredienti","i":["720 gr di macinato di manzo","4 hamburger buns","8 cetriolini agrodolce","8 fette di Emmenthal","8 fette di bacon","Burro","Salsa per hamburger","Rub per hamburger","Sale","Pepe"]}],"ins":["Utilizzando una mandolina, affettare le cipolle finemente.","Affettare i cetriolini.","Mettere il macinato di manzo in un recipiente, salare e pepare a piacimento e comporre 8 palline di circa 90gr ciascuna.","Posizionare la piastra all’interno del dispositivo e settarlo per la cottura diretta a circa 250°.","Stufare le fette di bacon sulla piastra e metterle da parte.","Posizionare le palline di macinato sulla piastra, versarci sopra un po' di cipolla e un po' dell'hamburger rub. Schiacciare le palline con le cipolle utilizzando l’apposita pressa.","Cuocere da un lato e poi girarle. Quando saranno tostate aggiungere sopra una fetta di bacon. Aggiungere poi il formaggio e lasciarlo fondere utilizzando una cloche per piastra.","Dare una piastrata a i bun.","Comporre il panino utilizzando la salsa burger, 2 smash burgers, e qualche cetriolino."],"u":"https://www.weber.com/IT/it/ricette/manzo/onion-bacon-smash-burger/weber-2368773.html"},{"n":"Tomahawk ribeye steak con patate al cartoccio e coleslaw","c":"Manzo","s":"2","d":"Facile","g":"","m":"","i":"https://content-images.weber.com/emea-recipes/IT/23.09.01-–-Ribeye-steak-tomahawk.png","ig":[{"g":"Ingredienti","i":["Tomahawk Ribeye Steak; da 800g","Patate; 4-5","Cavolo Cappuccio; 1/2","Mela; 1","Cipolla di Tropea; 1","Yogurt bianco naturale; 125g","Paprica affumicata; qb","Sale; qb","Zucchero integrale; 1 cucchiaio","Aglio in polvere; qb","Pepe; qb","Rosmarino; 3 ramoscelli","Olio; qb","Aceto di mela; 2 cucchiai"]}],"ins":["Tomahawk ribeye steak con un rub leggero affumicato. Per il rub mischiare 1 cucchiaio di sale, 1 cucchiaino di zucchero integrale di canna, paprica affumicata qb, aglio in polvere qb, pepe qb.","Contorno fatto da patate alla griglia. Tagliare a metà le patate, spennellarle con un condimento di sale, olio e rosmarino tritato. avvolgere nella cartastagnola e cuocere per 25 min a fuoco medio.","Coleslaw di accompagnamento composta da: 1/4 di cavolo cappuccio, 1 mela, 1 cipolla di Tropea, 1 vasetto di yogurt bianco naturale, 2 cucchiai di aceto di mela, sale qb., pepe qb. (Cavolo cappuccio, mela e cipolla tagliate a julienne)","Procedimento:","Come prima cosa preparare il rub per la carne mischiando sale, zucchero integrale, paprica affumicata, aglio in polvere e pepe macinato fresco.","In seguito tagliare le patate a metà e spennellare con il condimento composto da olio, sale e rosmarino tritato. Una volta pronte le patate avvolgetele in un foglio di carta stagnola e posizionatele sulla griglia del BBQ impostando a temperatura Media. Mentre cuociono le patate, prepariamo la coleslaw.","Tagliare il cavolo cappuccio, la mela e la cipolla a julienne e mettere il tutto in una ciotola capiente. Incorporare lo yogurt, l'aceto, olio, sale e pepe. Mischiare e lasciare a macerare.","Massaggiare ora il rub sulla carne in entrambi i lati, alzare la temperatura del BBQ Weber Traveller e mettere a cuocere la carne per 5 minuti su entrambi i lati. Prima di togliere la tomahawk girarla dalla parte dell'osso e cuocere per altri 3 minuti.","Togliere la carne dal fuoco, farla riposare per qualche minuto prima di tagliarla e impiattare con le patate e la coleslaw."],"u":"https://www.weber.com/IT/it/ricette/manzo/tomahawk-ribeye-steak-con-patate-al-cartoccio-e-coleslaw/weber-2368314.html"},{"n":"Alette di pollo al barbecue","c":"Pollame","s":"4","d":"Facile","g":"200°","m":"Indiretta, lenta","i":"https://content-images.weber.com/emea-recipes/IT/23.07.03-–-Alette-di-Pollo.png","ig":[{"g":"Ingredienti","i":["Alette di pollo (30 pezzi)","Limone","Lime","Coriandolo fresco","Cipollotto","Peperoncino","Zenzero","Aglio di Sulmona","Sale di Trapani"]}],"ins":["Prendere le alette di pollo, pulirle dalle piume e mettetele da parte. Prima di cuocerle andranno marinate: per la marinatura unire in una ciotola il succo di 1 limone e 1 lime, il coriandolo fresco, il cipollotto e il peperoncino tagliati a pezzettini, infine lo zenzero tagliatato a striscioline e uno spicchio di aglio di Sulmona schiacciato.","Se volete, aggiungere un mix di spezie orientali a base di zenzero, cardamomo e pepe bianco. Un pizzico di sale vero e mescolare tutto. Coprire con una pellicola e lasciate riposare la marinatura anche per 12 ore.","Intanto accendere il vostro BBQ Weber MasterTouch, mettere il carbone della griglia ai lati, in questo modo la cottura sarà indiretta e permetterà di cuocere le alette di pollo in modo uniforme, senza bruciarle ma facendo sì che l’interno non risulti crudo.","Portare la temperatura del bbq fino a 200°, lasciare cuocere le alette per circa 10 minuti. Per renderle belle dorate, riposizionare il carbone al centro della griglia e farle arrostire per altri 5-10 minuti.","Una volta pronte, servirle calde."],"u":"https://www.weber.com/IT/it/ricette/pollame/alette-di-pollo-al-barbecue/weber-2365504.html"},{"n":"Tagliata di arista con zucchine al vapore","c":"Maiale","s":"","d":"Facile","g":"","m":"Diretto","i":"https://content-images.weber.com/emea-recipes/IT/Tagliata-arista.JPG","ig":[{"g":"Ingredienti","i":["500 gr di arista di maiale","2 zucchine","Rub provenzale","Rub SPG (sale, pepe, aglio)","Sale","Pepe","Olio EVO"]}],"ins":["Tagliare le zucchine a rondelle e l’arista a fettine di circa 1.5 cm di spessore.","Predisporre il Lumin per la cottura a vapore usando l’accessorio predisposto che andrà a sostituire la mezza griglia di cottura. Inserire un po’ d’acqua all’interno e mettere le zucchine in cottura al vapore. Quando saranno a metà cottura, inserire le fette di arista, precedentemente unte con un po' d’olio e insaporite con il rub SPG (sale, pepe, aglio), in cottura diretta sulla griglia e cuocere fino al raggiungimento dei 75° interni.","Servire insieme alle zucchine condite con un po' di olio, rub provenzale e regolate di sale e pepe."],"u":"https://www.weber.com/IT/it/ricette/maiale/tagliata-di-arista-con-zucchine-al-vapore/weber-2340033.html"},{"n":"Straccetti di vitello con verdure croccanti","c":"Manzo","s":"","d":"","g":"","m":"Indiretto","i":"https://content-images.weber.com/emea-recipes/IT/Screenshot-2023-07-10-alle-17.59.42.png","ig":[{"g":"Ingredienti","i":["500 gr di fettine di vitello","2 carote","2 zucchine","3 cipollotti","1 peperone","100 gr di fagiolini","1 spicchio d’aglio","1 pezzo di zenzero","50 gr di mandorle pelate","1 peperoncino","6 cucchiai di salsa di soia","1 cucchiaio di salsa d’ostrica","Rub per manzo"]}],"ins":["Dalle fettine di vitello ricavare degli straccetti di circa 1cm. Tritare aglio, zenzero e peperoncino. Tagliare a striscioline sottile le zucchine, il peperone, i fagiolini e a rondelle i cipollotti.","Posizionare il wok sul calore indiretto e preriscaldare. Aggiungere un filo d’olio, aggiungere un po' di rub per manzo e cuocere gli straccetti insieme alle mandorle per circa 8 min. Togliere e mettere da parte.","Aggiungere un altro filo d’olio e far soffriggere il peperoncino con l’aglio e lo zenzero. Poi versare tutte le verdure e cuocere per circa 10 minuti. Aggiungere il vitello e le mandorle, bagnare con salsa di soia e di ostriche. Fare saltare per qualche minuto."],"u":"https://www.weber.com/IT/it/ricette/manzo/straccetti-di-vitello-con-verdure-croccanti/weber-2336646.html"},{"n":"Chicken Lollipop","c":"Pollame","s":"","d":"Facile","g":"110°, poi 200-220°","m":"Indiretto, poi diretto","i":"https://content-images.weber.com/emea-recipes/IT/23.06.22-–-Lollipop.png","ig":[{"g":"Ingredienti","i":["8 fusi di pollo","125g yogurt","Paprika affumicata q.b.","Curry q.b.","Cannella q.b.","Noce moscata q.b.","8 fette di bacon","400g patate piccole","100g salsa barbecue","Olio EVO q.b.","2 rametti di rosmarino","Sale"]}],"ins":["Incidere con un coltello i fusi ottenendo i “lollipop”, spennellarli con yogurt e tutte le spezie; avvolgerli con una fetta di bacon e posizionare a calore indiretto sul barbecue tenendo in camera 110 gradi (1 bruciatore al minimo).","Posizionare l’affumicatore sul bruciatore acceso con le chips al whisky lasciate in ammollo in acqua per 30 minuti.","Nel frattempo condire le patate crude e ben lavate con olio, salsa bbq e sale. Posizionare anch’esse sulla griglia, calore indiretto, due rametti di rosmarino e lasciar affumicare finché al cuore del pollo non si arriva a 60 gradi.","Aprire lo sportello del barbecue, glassare i fusi con la rimanente salsa bbq, accendere il secondo bruciatore e portare 200-220 gradi in camera. Sonda inserita e arrivare a 78 gradi (mi raccomando con il pollo almeno 75 gradi al cuore).","Nel frattempo togliere le patate, tagliarle a metà e quando i Lollipop saranno rossi, con il bacon croccante, spostarli direttamente nel piatto di portata. Sostituire la griglia con la plancia, accendere tutti i bruciatori al massimo e piastrare le patate.","Servire subito, abbinate a una maionese alla paprika."],"u":"https://www.weber.com/IT/it/ricette/pollame/chicken-lollipop/weber-2322458.html"},{"n":"Polpettine di pollo su foglie di limone","c":"Altre","s":"","d":"Facile","g":"180°","m":"Indiretto","i":"https://content-images.weber.com/emea-recipes/IT/Polpettine-di-pollo-su-foglie-di-limone.jpeg","ig":[{"g":"Ingredienti","i":["500gr di macinato di pollo","1 uovo","1 fetta di pancarrè","Mezzo bicchiere di latte intero","50gr di parmigiano grattugiato","Rub per pollo","Sale","Pepe","Olio EVO","10 foglie di limone non trattate"]}],"ins":["Ammollare il pancarrè con il latte. Una volta bagnato, strizzare la fetta di pane.","Versare il macinato di pollo in una scodella, aggiungere l’uovo, la fetta di pancarrè strizzata, il parmigiano, il rub per il pollo e regolare di sale e pepe. Impastare a mano e poi creare delle piccole polpette di forma ovale di circa 5 cm.","Posizionare ciascuna polpetta su una foglia di limone non trattata ma precedentemente lavata.","Inserire il cestello di cottura nel barbecue e preriscardarlo a 180° sul calore indiretto. Posizionare le polpette all’interno e cuocerle fino al raggiungimento di 75° interni."],"u":"https://www.weber.com/IT/it/ricette/polpettine-di-pollo-su-foglie-di-limone/weber-2322313.html"},{"n":"Bistecca alla fiorentina","c":"Manzo","s":"","d":"Facile","g":"250°","m":"","i":"https://content-images.weber.com/emea-recipes/Tuscan-TBone300.jpg","ig":[{"g":"Ingredienti","i":["Bistecca fiorentina (almeno 1.3 kg)","Olio EVO"]}],"ins":["La prima regola per cucinare uno dei pezzi più iconici della cucina toscana è sicuramente quello di lasciare la carne a temperatura ambiente almeno 2/3 ore fuori dal frigorifero.","Il taglio deve essere almeno sopra 1.3 kg: come si dice in Toscana, sotto le tre dita è carpaccio! Con taglio alla fiorentina si intende la bistecca dove abbiamo sia il filetto che il controfiletto mentre la costata di manzo ovvero il taglio dove si trova solamente controfiletto non si può chiamare Fiorentina. In sostanza il classico taglio T-bone.","La vera cottura della bistecca alla Fiorentina e sicuramente quello che risulta migliore è la brace quindi per questa ricetta è consigliabile utilizzare il Weber MasterTouch.","Riempire la ciminiera di carbone. Dopodiché, quando è arrivato a temperatura, rovesciare la carne nel braciere chiudendo il tappo e facendo arrivare la temperatura al massimo. La prima cottura della bistecca è dalla parte dell’osso per circa 3/4 minuti così che il calore inizia a penetrare all’interno. Dopodiché, girare su tutti i lati per circa 3/4 minuti per lato. Infine, rimetterla sul lato dell'osso per altri due minuti.","La cottura totale è di 14 minuti, stando attenti a non farla bruciare.","Finito il tempo di cottura arriva il momento di riposo. In cosa consiste il riposo? Il riposo consiste nel far ridistribuire tutti i succhi all’interno delle fibre per evitare che quando viene tagliata escano liquidi e sangue. La cottura interna deve essere all’incirca 50 52° a cuore per poter dire che la bistecca è al sangue.","Finito il tempo di riposo la taglia a fette e la gusto con un filo di olio e niente di più."],"u":"https://www.weber.com/IT/it/ricette/manzo/bistecca-alla-fiorentina/weber-2310175.html"},{"n":"Avocado toast al salmone","c":"Altre","s":"2","d":"Facile","g":"","m":"Indiretto","i":"https://content-images.weber.com/emea-recipes/IT/Avocado-toast-al-salmone.jpeg","ig":[{"g":"Ingredienti","i":["2 avocado maturi","1 lime","300 gr di salmone fresco","1 cipolla (possibilmente di Tropea)","4 fette di pane in cassetta","Sale qb","Pepe","Rub per pesce","Olio EVO","Burro"]}],"ins":["Sbucciare l’avocado, rimuovere il nocciolo e mettere la polpa in una ciotola. Schiacciare la polpa con una forchetta, poi il succo del lime, un po' di sale, pepe e olio EVO. Continuare a schiacciare fino a ottenere una pasta densa.","Ungere le fette di salmone con un po’ di olio e passare sopra la superficie del rub per pesce. Affettare la cipolla a rondelle e imburrare le fette di pane da ambo i lati.","Posizionare la piastra sul calore diretto, preriscardarla e poi ungerla con un po' d’olio. Cuocere prima le cipolle aggiungendo un po' del rub per pesce, fino a quando saranno ben stufate. Poi cucinare il salmone fino al raggiungimento dei 63° interni e infine tostare le fette di pane.","Preparare il toast spalmando un po' di salsa d’avocado sul pane, aggiungere le cipolle e finire con il salmone."],"u":"https://www.weber.com/IT/it/ricette/avocado-toast-al-salmone/weber-2308206.html"},{"n":"Pizza al barbecue con crema di melanzane e salsiccia","c":"Pane & Pizza","s":"1","d":"Facile","g":"","m":"","i":"https://content-images.weber.com/emea-recipes/IT/23.04.20-–-Pizza-Creama-di-Melanzane-e-Salsiccia.png","ig":[{"g":"Ingredienti","i":["Farina","Lievito di birra","Olio di oliva","Melanzane","Pomodori datterini","Salsiccia di maialino nero di Caserta","Fiordilatte d’Agerola"]}],"ins":["Prepariamo la crema di melanzane: tagliamo in 4 parti la melanzana e la poniamo su un foglio di carta stagnola. Insieme, mettiamo anche i pomodorini datterini precedentemente lavati, tagliati e conditi con sale e olio d’oliva. Accartocciamo il tutto nella stagnola e mettiamo a cuocere sotto la brace per 3 minuti.","Tagliamo a metà la salsiccia e la mettiamo a cuocere nel barbecue sulla griglia con coperchio chiuso.","Togliamo le melanzane cotte e le inseriamo in un contenitore, aggiungiamo ancora un po' di olio d’oliva e frulliamo fino a ottentere una crema.","Appena pronti tutti gli ingredienti stendiamo il nostro disco di pasta di pizza napoletana, preparata con farina medio-forte (idratazione dell’impasto 70%, pochissimo lievito per una lenta lievitazione).","Spargiamo un po' di olio sulla pizza stesa e mettiamo nel barbecue a coperchio chiuso nel quale abbiamo inserito la Pietra di Cottura già calda.","Facciamo cuocere per qualche minuto. Appena si è dorata, togliamo la pizza dal barbecue e andiamo a condirla. Alla base della pizza mettiamo la crema di melanzane spalmata sul disco di pasta, poi mettiamo la salsiccia che abbiamo tagliato a pezzetti, il fiordilatte tagliato a listarelle, un filo d’olio d’oliva. Mettiamo nuovamente nel barbecue per terminare la cottura."],"u":"https://www.weber.com/IT/it/ricette/pane-pizza/pizza-al-barbecue-con-crema-di-melanzane-e-salsiccia/weber-2306299.html"},{"n":"Rib Eye & Flat Iron Steak","c":"Manzo","s":"","d":"Facile","g":"315°","m":"Diretto","i":"https://content-images.weber.com/emea-recipes/IT/Rib-eye-Flat-iron-steak.jpg","ig":[{"g":"Ingredienti","i":["Rib Eye di danese rossa","Flat ngredienti","i":["4 guance di manzo (~ 1 Kg)","60 gr sale kosher o fino","40 gr di pepe nero tritato","20 gr di aglio in polvere","Tacos, burrito oppure piadine","Guacamole (2 avocado, qualche pomodorino o concentrato di pomodoro, sale e pepe q.b.)"]}],"ins":["Il barbecue nasce come una tipologia di cottura per valorizzare tagli di carne poveri, che cucinati in modo tradizionale risultano asciutti e stoppacciosi. Alcuni esempi calzanti sono proprio la punta di petto(brisket), le costolette(ribs) e anche le guance di manzo.","Le guance risultano essere uno dei tagli più ricco di fibre connettive, e sono quindi ideali per cotture in umido o, come nel nostro caso, cucinate al barbecue a bassa temperatura.","TEMPO DI PREPARAZIONE","PROCEDIMENTO"],"u":"https://www.weber.com/IT/it/ricette/manzo/guance-di-manzo-al-barbecue/weber-2279887.html"},{"n":"Caesar Salad con pollo affumicato","c":"Pollame","s":"","d":"Facile","g":"150°","m":"Diretta / Indiretta","i":"https://content-images.weber.com/emea-recipes/IT/DJI_0042.jpeg","ig":[{"g":"Ingredienti","i":["4 petti di pollo","200g di crostini","1 cespo di lattuga lavata e asciugata","100gr di parmigiano a scaglie","Rub per pollo","1 spicchio d&#039;aglio","100gr di maionese","2 cucchiai di succo di limone","2 cucchiaini di senape di Digione","1 cucchiaio di salsa Worchester","4 cucchiai di parmigiano grattugiato","1 cucchiaio di aceto di mele","sale qb","pepe qb"]}],"ins":[],"u":"https://www.weber.com/IT/it/ricette/pollame/caesar-salad-con-pollo-affumicato/weber-2279716.html"},{"n":"Peperoni ripieni","c":"Manzo","s":"","d":"Facile","g":"180°","m":"Indiretta","i":"https://content-images.weber.com/emea-recipes/IT/DJI_0047.jpeg","ig":[{"g":"Ingredienti","i":["4 peperoni","330gr di macinato di manzo","2 salsicce","2 fette di pane in cassetta","200gr di provola affumicata","2 cucchiai di parmigiano grattato","Mezzo bicchiere di latte","1 uovo","1 mazzo di prezzemolo","Pepe nero","Sale"]}],"ins":[],"u":"https://www.weber.com/IT/it/ricette/manzo/peperoni-ripieni/weber-2279518.html"},{"n":"Crispy chicken burger","c":"Altre","s":"4","d":"Facile","g":"180/200°","m":"","i":"https://content-images.weber.com/emea-recipes/IT/Chicken-burger.jpeg","ig":[{"g":"POLLO","i":["4 fette di petto di pollo","200 g di nachos chips","1 uovo","Tex Mex rub","3 cucchiai di olio di semi di arachidi","Maionese","4 hamburger bun a piacere"]}],"ins":["PER IL CONDIMENTO","PER LA CARNE","PER IL GRILL:"],"u":"https://www.weber.com/IT/it/ricette/crispy-chicken-burger/weber-2277747.html"},{"n":"Parmigiana di Melanzane","c":"Verdure & Contorni","s":"","d":"Facile","g":"180°","m":"","i":"https://content-images.weber.com/emea-recipes/IT/Parmigiana-di-melanzane.jpeg","ig":[{"g":"Ingredienti","i":["1 melanzana","150 g di salsa di pomodoro classica al basilico","250 g di mozzarella fior di latte","100 g di parmigiano","pepe nero","2 cucchiai olio d&#039;oliva"]}],"ins":["GRILLED:"],"u":"https://www.weber.com/IT/it/ricette/verdure-e-contorni/parmigiana-di-melanzane/weber-2277738.html"},{"n":"Coda di gambero con maionese al lime","c":"Altre","s":"10","d":"Facile","g":"","m":"Diretto","i":"https://content-images.weber.com/emea-recipes/IT/Fingerfood-Gamberetti.jpeg","ig":[{"g":"Ingredienti","i":["10 code di gambero di piccola pezzatura","3 cucchiai di maionese","1 pizzico di sale","Pepe","Aglio in polvere","qualche goccia di salsa Worcester"]}],"ins":[],"u":"https://www.weber.com/IT/it/ricette/coda-di-gambero-con-maionese-al-lime/weber-2267503.html"},{"n":"Asado de tira","c":"Manzo","s":"","d":"Facile","g":"250° / 160-180°","m":"Diretta - indiretta","i":"https://content-images.weber.com/emea-recipes/IT/Asado-de-tira-new.jpeg","ig":[{"g":"Ingredienti","i":["1kg di asado de tira","Sale q.b.","Pepe q.b.","Aglio in polvere q.b.","Olio EVO","Aceto di mele","Butcher paper"]}],"ins":[],"u":"https://www.weber.com/IT/it/ricette/manzo/asado-de-tira/weber-2259392.html"},{"n":"Fegatelli al girarrosto","c":"Maiale","s":"","d":"Facile","g":"180°","m":"Indiretto","i":"https://content-images.weber.com/emea-recipes/IT/Fegatelli.jpeg","ig":[{"g":"Ingredienti","i":["Fegato","Pancetta a fette","Rete di maiale","Pangrattato","Semi di finocchio","Sale","Pepe","Pane a fette"]}],"ins":["Mettete la rete a bagno in acqua fredda per alcuni minuti, poi scolatela e tenetela da parte.","Tagliate il fegato in pezzi, non devono essere troppo grandi altrimenti cuoceranno male. Dovrete ottenere dei quadrati (approssimativi) dal lato di circa 5×5 cm.","Tagliate la pancetta in cubetti di circa 3–4 cm.","In una ciotola versate il pangrattato, i semi di finocchio, regolate di sale e di pepe. Mescolate il tutto.","Adesso che avete tutto pronto potete preparate i fegatelli.","Prendete un pezzo di fegato e passatelo nel pangrattato condito, dovete rotolarlo e ottenere una sorta di panatura, poi avvolgetelo bene con la rete. Tagliate quella in eccesso. Chiudete bene il fegato con la rete ed infilatelo nello spiedo del girarrosto.","Preparate tutti i pezzi di fegato in questo modo infilzandoli nello spiedo (ve ne serviranno due) intervallandoli con dei pezzi di pancetta fresca e di pane.","Se vi dovesse avanzare della rete avvolgetela intorno ai fegatelli dopo che li avete messi nello spiedo.","Accendete intanto il fuoco nel vostro braciere per ottenere la brace necessaria per la cottura. Posizionate il girarrosto sul braciere, lo spiedo non va messo direttamente sulle braci che dovranno avere una temperatura medio alta, ma ad una distanza di circa 30 – 40 cm da esse.","Una volta che lo spiedo inizierà a girare i fegatelli inizieranno a prendere calore ed il grasso della rete si scioglierà colando e irrorando tutta la sua superficie. Girando continuamente lo spiedo in maniera lenta parte del grasso rimarrà sullo spiedo stesso invece di cadere sulle braci, in questo modo il fegato, il pane e la pancetta si insaporiranno e diventeranno più teneri rimanendo più umidi.La cottura dovrà avere un tempo di circa 1 ora e mezzo. Non prevede grandi difficoltà.","A fine cottura lo spiedo di fegatelli sarà diventato di colore scuro e la rete sarà stata assorbita quasi completamente. Saranno croccanti fuori e morbidi dentro.","Il fegato dovrà essere completamente cotto per evitare che rilasci sangue una volta aperti.","Togliete i fegatelli dallo spiedo e portateli in tavola ancora caldi."],"u":"https://www.weber.com/IT/it/ricette/maiale/fegatelli-al-girarrosto/weber-2258684.html"},{"n":"Spatchcock Chicken","c":"Pollame","s":"","d":"Facile","g":"160°","m":"Indiretto","i":"https://content-images.weber.com/emea-recipes/IT/spatchcock-chicken.jpeg","ig":[{"g":"Ingredienti","i":["1 pollo","Rub per pollo","50 gr burro","Olio EVO"]}],"ins":[],"u":"https://www.weber.com/IT/it/ricette/pollame/spatchcock-chicken/weber-2257606.html"},{"n":"Juicy Lucy Hamburger","c":"Manzo","s":"","d":"Facile","g":"180°","m":"Indiretto - Diretto","i":"https://content-images.weber.com/emea-recipes/IT/hamburger.jpeg","ig":[{"g":"Ingredienti","i":["800 gr circa di macinato di manzo","4 buns","4 fette di formaggio Cheddar","Insalata","1 pomodoro grande","4 cetriolini in agrodolce","Salsa bbq","Senape","Rub per burger","Sale","Pepe"]}],"ins":[],"u":"https://www.weber.com/IT/it/ricette/manzo/juicy-lucy-hamburger/weber-2245609.html"},{"n":"Cosciotto d'agnello al profumo di timo","c":"Agnello","s":"4","d":"Media","g":"200°","m":"Indiretta","i":"https://content-images.weber.com/emea-recipes/Leg-of-Lamb-Boneless-Rolled.jpg","ig":[{"g":"Ingredienti","i":["1 cosciotto di agnello (circa 2 kg)","Sale","Pepe","3 spicchi d’aglio","6 rametti di timo (in alternativa, 6 cucchiaini di timo essiccato)","1 scorza di limone","3 cucchiai di senape","150 ml di olio EVO","Sale","Pepe"]}],"ins":["IN CUCINA","AL BARBECUE"],"u":"https://www.weber.com/IT/it/ricette/agnello/cosciotto-dagnello-al-profumo-di-timo/weber-2239611.html"},{"n":"Faraona allo spiedo","c":"Pollame","s":"","d":"Bassa","g":"180°","m":"Indiretta","i":"https://content-images.weber.com/emea-recipes/IT/Fara -images.weber.com/content/recipes-babykartoffeln.jpg","ig":[{"g":"Ingredienti","i":["800 g di patate","4 rametti di timo","2 rametti di rosmarino","Olio","Pepe"]}],"ins":["1. Lavare e pulire le patate, quindi tagliarle a metà.","2. Lavare il timo e il rosmarino. Rimuovere le foglie dai gambi e tritarle finemente.","1. Preparare il barbecue per la cottura a calore indiretto. Per raggiungere 200°C, sarà necessario l’equivalente di due misurini di bricchetti Weber.","2. Posizionare la piastra nella griglia di cottura, mettere il coperchio sul barbecue e lasciare riscaldare la piastra.","3. Aggiungere l’olio e lasciare che si scaldi. Mettete le patate sulla piastra, con il lato affettato rivolto verso il basso. Friggere fino a dorare. Questo richiede all’incirca 5 minuti. Girare le patate fino a quando non diventano tenere.","4. Condire le patate con sale e pepe e cospargerle con le erbe tritate prima di servire."],"u":"https://www.weber.com/IT/it/ricette/patatine-fritte-con-timo-e-rosmarino/weber-1984754.html"},{"n":"Pommes Anna","c":"Altre","s":"","d":"Medio","g":"Circa 200°C","m":"Indiretto","i":"https://content-images.weber.com/content/recipes-5-kinds-of-potatoes.png","ig":[{"g":"Ingredienti","i":["8 patate grandi","2 cipolle","100 g di burro","Sale","Pepe"]}],"ins":["1. Sbucciare e lavare le patate, quindi affettarle sottilmente. Pelare la cipolla e tritarla finemente. Sciogliere il burro. Girare le fette di patate nel burro fuso insieme alla cipolla. Condire con sale e pepe.","2. Montare la “tazza” sul supporto per pollame, quindi applicare carta da forno sulla base e i lati. Disporre le fette di patate nel supporto per pollame, a strati. Condire accuratamente con dell’altro sale e pepe tra gli strati.","1. Preparare il barbecue per la cottura a calore indiretto. Per raggiungere 200°C, sarà necessario l’equivalente di un misurino e mezzo di bricchetti Weber.","2. Posizionare il supporto per pollame GBS nella griglia e mettere il coperchio sul barbecue. Cuocere le patate per 40-45 minuti, fino a quando non saranno tenere."],"u":"https://www.weber.com/IT/it/ricette/pommes-anna/weber-1984747.html"},{"n":"Carrè di manzo arrosto","c":"Manzo","s":"8","d":"Media","g":"180°","m":"Indiretto","i":"https://content-images.weber.com/content/WSItaly/CARRè-DI-MANZO-ARROSTO_NATALE-19.jpg","ig":[{"g":"Ingredienti","i":["3 kg di carrè di manzo con osso","5 rametti di timo freschi","5 rametti di rosmarino fresco","2 spicchi d’aglio","2 scalogni","80 ml di olio EVO","sale e pepe"]}],"ins":["IN CUCINA","AL BARBECUE"],"u":"https://www.weber.com/IT/it/ricette/manzo/carr%C3%A8-di-manzo-arrosto/weber-1896017.html"},{"n":"Costine championship","c":"Manzo","s":"","d":"","g":"110–120°C","m":"Indirect (5-8 hours)","i":"https://content-images.weber.com/content/blog/Grill-On/It’s-all-about-the-lid/spareribs-bbq.jpg","ig":[{"g":"Speziatura","i":["2 cucchiai di sale da cucina","2 cucchiai di peperoncino piccante ancho","2 cucchiai di zucchero di canna chiaro, compattati","2 cucchiai di aglio granulare","1 cucchiaio di cumino in polvere","2 cucchiaini di pepe nero macinato"]}],"ins":["Preparare l’affumicatoio per la cottura indiretta a temperatura molto bassa (110–120° C).","In una ciotola di dimensioni medie, mescolare gli ingredienti per la speziatura. Disporre le costine di maiale, con il lato della carne rivolto verso l’alto, su un tagliere. Seguendo la linea di grasso che separa le costine carnose dalle punte molto più dure alla base di ciascun carré, rimuovere le punte. Capovolgere ciascun carré. Tagliare e rimuovere il lembo di carne al centro di ciascun carré. Tagliare e rimuovere anche il lembo di carne al di sotto dell’estremità più corta delle costine. Usando un coltello da cucina non affilato, passare la punta sotto la membrana sul retro di ogni carré. Sollevare e allentare la membrana fino a romperla, quindi rimuoverla usando un tovagliolo di carta. Condire le costine con la speziatura, applicandone di più sulle parti più carnose.","In un piccolo contenitore spray, mescolare 175 ml di succo di mela e 60 ml di aceto di sidro.","Pulire le griglie di cottura con una spazzola. Aggiungere due pezzi di legno per affumicatura al carbone. Mettere le costine sull’affumicatoio, con il lato delle ossa rivolto verso il basso e affumicarle a calore indiretto, molto basso, con il coperchio chiuso, finché la carne non si è ritirata dalle ossa per almeno 1 cm, cioè per circa 4–5 ore. Dopo ogni ora circa, aggiungere più bricchetti accesi per mantenere il calore e un altro pezzo di legno per affumicatura (dopo che i bricchetti e la legna si sono completamente bruciati) e spruzzare le costine su entrambi i lati con la miscela di succo di mela. Preparare la salsa.","In un pentolino di media grandezza combinare gli ingredienti per la salsa e portare a ebollizione a calore medio. Ridurre il calore da medio a basso e cuocere per 15–20 minuti, mescolando di tanto in tanto.","Quando le costine sono cotte, rimuoverle dall’affumicatoio. Spennellare i carré su entrambi i lati con la salsa e avvolgere ogni carré in carta da forno umida. Avvolgerli quindi in foglio di alluminio resistente. Rimettere i carré nell’affumicatoio, posizionandoli sulla griglia. Continuare a cuocere a calore indiretto, molto basso, con il coperchio chiuso, fino a quando la carne non diventa tenera e può essere sfilacciata con le dita, cioè da 45 minuti a 1 ora. Rimuovere le costine dall’affumicatoio e spennellare leggermente i carré su entrambi i lati con la salsa. Rimettere i carré marinati sulla griglia per altri 15 minuti (110° C). Dividere i carré in singole costine. Servire calde con la salsa rimanente come contorno."],"u":"https://www.weber.com/IT/it/ricette/manzo/costine-championship/weber-190759.html"},{"n":"Pizza Napoletana","c":"Pane & Pizza","s":"","d":"","g":"280–290° C","m":"Indirect","i":"https://content-images.weber.com/content/blog/Grill-On/How-to-barbeque-a-pizza/recipe1900x941-medium2-overlay.jpg","ig":[{"g":"Ingredienti","i":["360ml di acqua","18–20g di sale","2g di lievito","620–650g di farina","250–320g di salsa di pomodoro:","4 cucchiai di olio extra vergine di oliva","320–400 g di mozzarella o fior di latte","1 cucchiaio di origano","20 foglie di basilico fresco","Sale, a piacere"]}],"ins":["Lavorare a una temperatura ambiente di 20– 25° C. Versare l’acqua in un mixer, sciogliere il sale, aggiungere il 10% della farina e quindi il lievito. Avviare il mixer, quindi aggiungere gra- dualmente il resto della farina fino a ottenere un composto omogeneo.","Lavorare l’impasto a bassa velocità per 20 minuti, fino a ottenere una palla. Per ottenere una consistenza ottimale, controllare la quan- tità di acqua. L’impasto deve essere appiccico- so, morbido ed elastico al tatto.","Rimuovere l’impasto dal mixer e metterlo a riposare su una superficie per 2 ore, a una tem- peratura ambiente di 28°C. Tagliare quindi l’im- pasto in palline o “panetti”, da circa 170–230g ciascuno.","Mettere i panetti in una scatola o su un vasso- io per la seconda fase della lievitazione, 4–6 ore.","Quando il barbecue è pronto, mettere la pie- tra per pizza sul barbecue e lasciarla riscalda- re a temperatura elevata su calore indiretto, per 30–40 minuti. Preparare un cesto pieno di bricchetti o carbone.","Condire la salsa di pomodoro con origano e sale. Affettare la mozzarella. Stendere i panet- ti formando dei dischi – al centro, lo spessore non deve essere superiore a 4 mm. Aggiungere un cesto di bricchetti o di carbone al barbecue e chiudere il coperchio. Distribuire un quarto della salsa di pomodoro al centro di ogni base, quindi, con un movimento a spirale, ricoprire tutta la base con la salsa (lasciando 1 cm libero lungo il bordo esterno). Distribuire uniforme- mente la mozzarella su tutte le pizze e quindi aggiungere alcune foglie di basilico e un filo d’olio extravergine d’oliva.","Cospargere la pala per pizza con farina per rendere la superficie scivolosa. Utilizzando la pala per pizza, posizionare la pizza sulla pietra per pizza e chiudere immediatamente il coper- chio del barbecue. Cuocere a calore indiretto."],"u":"https://www.weber.com/IT/it/ricette/pane-pizza/pizza-napoletana/weber-178507.html"},{"n":"Polpo alla piastra","c":"Pesce & Frutti di Mare","s":"","d":"","g":"240° C","m":"Direct","i":"https://content-images.weber.com/content/blog/Grill-On/Just-getting-started/recipe1900x941-medium1-overlay.jpg","ig":[{"g":"Ingredienti","i":["360 g di polpo già sbollentato per 30 min e raffreddato","1 pomodoro grande","3 avocado, tagliati a metà","2 barbabietole crude (di cui una barbabietola di Chioggia)","2 pesche tabacchiere","1 cavolfiore intero colorato (giallo o viola)","100 g di aceto balsamico, preferibilmente bianco","1 mazzetto di crescione","Sale, pepe"]}],"ins":["In cucina:","Al barbecue:"],"u":"https://www.weber.com/IT/it/ricette/pesce-frutti-di-mare/polpo-alla-piastra/weber-178343.html"},{"n":"Pancake Classici","c":"Dolci & Bevande","s":"","d":"","g":"200°C","m":"Direct","i":"https://content-images.weber.com/content/blog/Grill-On/Desserts-on-a-grill/recipe1900x941-medium1-overlay.jpg","ig":[{"g":"Pancake","i":["200 g di farina","30 g di zucchero","1 stecca di vaniglia","1 pizzico di sale","½ cucchiaino di cardamomo","Scorza di ½ limone","3 uova","300 ml di latte intero","50 ml di birra","Burro chiarificato q.b."]}],"ins":["In cucina:","Al barbecue:"],"u":"https://www.weber.com/IT/it/ricette/dolci-bevande/pancake-classici/weber-178063.html"},{"n":"Punta di petto del principiante","c":"Manzo","s":"","d":"","g":"90 °C","m":"indirect","i":"https://content-images.weber.com/content/blog/Grill-On/Know-your-cuts-essential-to-tasty-results/runder-beef-brisket-bbq.jpg","ig":[{"g":"Ingredienti","i":["1 punta di petto intera, con il grasso, dotata sia della sezione a punta sia di quella piatta, 4,5–5,5 kg","70 g di sale da cucina","25 g di pepe nero appena macinato","475 ml della propria salsa barbecue preferita","10 panini per hamburger, tagliati a metà"]}],"ins":["Utilizzando un coltello molto affilato, rimuovere il grasso sul lato più grasso della punta di petto, ottenendo uno spessore massimo di circa 5 mm. Sul lato più carnoso, rimuovere la membrana esponendo la marezzatura grossolana della carne sottostante. Assicurarsi anche di rimuovere eventuali concentrazioni di grasso duro su entrambi i lati della punta di petto.","Mescolare il sale e pepe, quindi massaggiare la punta di petto in modo uniforme su entrambi i lati con il condimento. Mettere la carne in frigo fino a quando non deve essere cotta.","Preparare l’affumicatoio per la cottura indiretta a temperatura molto bassa (110° C).","Spruzzare la punta di petto su entrambi i lati con acqua per bagnare la superficie. Aggiungere la metà dei pezzi di legno per affumicatura al carbone. Non appena il fumo comincia a sprigionarsi, posizionare la punta di petto, con il lato grasso rivolto verso il basso, sulla griglia di cottura superiore, chiudere il coperchio e cuocere sul calore indiretto, molto basso, finché non si forma sulla superficie una bella crosta scura, cioè dopo circa 4 ore. Dopo la prima ora, aggiungere al carbone i pezzi di legno rimanenti. Il colore della carne indica che una buona crosta si è ora formata e che quindi non assorbirà più molto fumo; è giunto il momento di avvolgerla nella carta da forno. Mentre il colore è l’indicazione principale, consigliamo anche di controllare la temperatura interna della carne. Nelle parti più spesse, deve essere tra i 65° C e i 70° C.","Rimuovere la punta di petto dall’affumicatoio e spruzzare entrambi i lati con acqua. Avvolgere la carne in carta da forno umida e quindi avvolgerla nuovamente in foglio di alluminio resistente.","Posizionare la punta di petto avvolta nell’alluminio, con il lato del grasso rivolto verso il basso, sulla griglia superiore dell’affumicatoio e continuare a cuocere a calore molto basso indiretto con il coperchio chiuso, finché la carne non è sufficientemente tenera. Per controllare, premerla con un dito e verificare che la temperatura interna sia di è 90–95° C. Questo equivale a un tempo di cottura di 2–4 ore o più (la tenerezza è un indicatore della cottura più importante della temperatura). La quantità di tempo necessario dipenderà dalla razza del bovino e da altre caratteristiche della carne.","Trasferire la punta di petto, ancora avvolta nell’alluminio, in una borsa frigo asciutta e dotata di isolamento. Chiudere la borsa e lasciare riposare la carne per 2–4 ore.","Rimuovere la carta da forno e l’alluminio e posizionare la carne su un tagliere, facendo attenzione a conservare i succhi della carne nella stagnola.","Riscaldare la salsa barbecue a calore medio su un fornello per circa 5 minuti. Tagliare la punta di petto trasversalmente, in fettine sottili, e servire con la salsa. Se lo si desidera, aggiungere i sughi della carne alla salsa. Se la carne della parte piatta è un po’ asciutta, affettarla grossolanamente e aggiungere abbondante salsa. Servire calda su panini."],"u":"https://www.weber.com/IT/it/ricette/manzo/punta-di-petto-del-principiante/weber-175674.html"},{"n":"Fesa di manzo affumicata alle spezie","c":"Manzo","s":"","d":"","g":"57° C","m":"indirect","i":"https://content-images.weber.com/content/blog/Grill-On/Smoke-makes-the-difference/recipe1-steak-1900x941-medium1_190211_081704.jpg","ig":[{"g":"Ingredienti","i":["Scamone di 2,5 kg","20 g di pepe in grani, colorati, interi","5 g di pimento, intero","10 g di aglio","10 g di zenzero","2 g di fiocchi di peperoncino, a piacere","30 g di sale marino, grosso","10 g di zucchero di canna","80 g di burro","60 ml di vino madera"]}],"ins":["Immergere le chips di legno in acqua per almeno 30 minuti.","Pelare lo zenzero e l’aglio e tritare grossolanamente, quindi ridurre in composto pastoso usando un mortaio e un pestello.","Arrostire i grani di pepe colorato e il pimento in una padella a fuoco basso fino a quando non diventano fragranti, quindi aggiungerli al composto di aglio e zenzero e amalgamare fino a ottenere una consistenza da media a fine. Mescolare con i fiocchi di peperoncino, il sale marino e lo zucchero.","Sciogliere il burro in una padella, aggiungerlo al composto e quindi mescolare accuratamente.","Strofinare la miscela di spezie sulla bistecca di controfiletto.","Preparare il barbecue per la cottura a calore indiretto, 140– 160° C. Scolare le chips di legno e metterle nella smoker box. Mettere la smoker box sulle barre Flavorizer (vedere il manuale delle istruzioni).","Mettere il controfiletto sul calore indiretto.","Inserire una sonda per la carne al centro della bistecca, chiudere il coperchio del barbecue e cuocere fino a raggiungere una temperatura interna di 57° C.","Per un aroma più intenso, è possibile aggiungere nuovamente le chips ammorbidite. Spennellare periodicamente la bistecca con il madera per mantenerla umida."],"u":"https://www.weber.com/IT/it/ricette/manzo/fesa-di-manzo-affumicata-alle-spezie/weber-168198.html"},{"n":"LONZA DI MAIALE CROCCANTE","c":"Maiale","s":"","d":"Facile","g":"","m":"Indiretta","i":"https://content-images.weber.com/emea-recipes/Flaeskesteg02-2_ISO39_750x750.jpg","ig":[{"g":"Ingredienti","i":["2 Kg lonza di maiale con cotenna","sale","6 foglie di alloro"]}],"ins":["IN CUCINA","AL BARBECUE"],"u":"https://www.weber.com/IT/it/ricette/maiale/lonza-di-maiale-croccante/weber-71172.html"},{"n":"Spiedini di macinato di manzo glassati","c":"Manzo","s":"","d":"Facile","g":"","m":"Indiretta","i":"https://content-images.weber.com/emea-recipes/germany-backyard_skewers-1_750x750.jpg","ig":[{"g":"Ingredienti","i":["1.2 kg di carne macinata di manzo, preferibilmente punta di petto","24 fette di pancetta","200 ml di salsa barbecue","Aceto di mele (opzionale)","RUB","2 cucchiai di sale","2 cucchiaini di zucchero di canna","2 cucchiaini di paprika dolce","2 cucchiaini di paprika affumicata","1 cucchiaino di timo macinato","1 cucchiaino di aglio in polvere","½ cucchiaino di pepe"]}],"ins":["In cucina","Al barbecue"],"u":"https://www.weber.com/IT ","s":"","d":"Facilissimo","g":"","m":"Indiretta","i":"https://content-images.weber.com/emea-recipes/classic-pulled-pork-burger_750x750.jpg","ig":[{"g":"Ingredienti","i":["2 carote","½ peperoncino rosso fresco","1 cipolla","3 spicchi d&#039;aglio","100 ml di olio vegetale per friggere","1 cucchiaino di cumino","1 cucchiaio di coriandolo in polvere","5 cucchiai di miele","300 ml di aceto","2 foglie di alloro","1 cucchiaio di paprika","8 cucchiai di concentrato di pomodoro","500 ml di pomodori pelati","Sale"]}],"ins":["In cucina","Pelare le carote, la cipolla e l'aglio e lavare il peperoncino. Tritarli grossolanamente.","Griglia","Preparare la griglia per la cottura a calore indiretto, ca. 185 °C.","Posizionare un wok sulla griglia di cottura e riscaldare.","Aggiungere l'olio, il cumino e il coriandolo. Riscaldare per 2 minuti.","Aggiungere la carota, la cipolla, l'aglio e il peperoncino. Riscaldare per altri 3-4 minuti, poi aggiungere il miele. Lasciare bollire, quindi aggiungere l'aceto. Bollire fino a ridurre il volume della metà.","Aggiungere il resto degli ingredienti e lasciare bollire il tutto a fuoco indiretto per 25-30 minuti.","Frullare per ottenere un composto omogeneo e poi refrigerare il ketchup.","Una volta freddo, aggiustare di sale.","Consiglio","Se si sterilizza il contenitore con acqua bollente, il ketchup rimarrà fresco a lungo in frigorifero"],"u":"https://www.weber.com/IT/it/ricette/ketchup/weber-71058.html"},{"n":"Tonno alla piastra e salmoriglio","c":"Pesce & Frutti di Mare","s":"","d":"Facile","g":"","m":"Diretta","i":"https://content-images.weber.com/emea-recipes/Sicily_tuna_750x750.jpg","ig":[{"g":"Ingredienti","i":["4 bistecche di tonno di altezza 3 cm di spessore","6 cucchiai d’olio extra vergine d’oliva","SALSA SALMORIGLIO","1 spicchio d’aglio","12 cucchiai d’olio extra vergine d’oliva","6 cucchiai di succo di limone","3 cucchiai di origano secco","3 cucchiai di prezzemolo tritato fresco","Sale e pepe"]}],"ins":["IN CUCINA:","AL BARBECUE:"  trucioli di hickory immersi in acqua per almeno 30 minuti","CONDIMENTO","2 cucchiaini di paprika","2 cucchiaini di sale grosso","1/2 cucchiaino d&#039;aglio liofilizzato","1/2 cucchiaino di pepe","SALSA BARBECUE","200 gr di ketchup","1 cucchiaio di aceto di mele","1 cucchiaio colmo di zucchero di canna","1 cucchiaio di senape di Digione","2 cucchiaini di salsa al peperoncino forte"]}],"ins":["Mescolate gli ingredienti del condimento in una ciotola. Cospargete il condimento sulle sovracosce e le cosce.","Preparate il barbecue per una cottura a fuoco medio diretto e indiretto (180-230 °C).","Preparate la salsa barbecue. Mescolate gli ingredienti in un pentolino. Fate scaldare per 6-8 minuti a fuoco medio, fino a quando la salsa si addensa, mescolando ogni tanto.","Spazzolate la griglia di cottura. Mettete le cosce di pollo a cuocere con la pelle rivolta verso la griglia per 6-10 minuti a fuoco medio diretto, lasciando per quanto possibile il coperchio chiuso e girandole regolarmente. Spostatele a fuoco medio indiretto","Mettete i trucioli di hickory sgocciolati nell'affumicatoio integrato del barbecue o in un affumicatoio universale, seguendo le istruzioni del manuale e chiudete il coperchio. Chiudete anche il coperchio del barbecue e fate cuocere per 35 minuti inumidendo le cosce di pollo con la salsa barbecue e girandole regolarmente durante gli ultimi 20 minuti.","Quando sprigionano un succo chiaro e la carne non è più rosata, anche lungo l'osso, togliete le cosce di pollo dal barbecue e lasciatele riposare per 3-5 minuti. Servitele calde o a temperatura ambiente, con il resto della salsa barbecue.","CONSIGLIO DELLO CHEF: Avviate la cottura del pollo con la pelle rivolta verso il basso, in modo che il grasso si sciolga bene: in questo modo, la pelle rimarrà croccante anche dopo essere stata imbevuta di salsa. Ricetta tratta da \"Gli uomini preferiscono il barbecue\" di Jamie Purviance"],"u":"https://www.weber.com/IT/it/ricette/pollame/cosce-di-pollo-affumicate-e-salsa-barbecue/weber-70073.html"},{"n":"Focaccia con timo, olive e pomodori secchi","c":"Pane & Pizza","s":"","d":"Facile","g":"","m":"Indiretta","i":"https://content-images.weber.com/emea-recipes/provence-rustic-wedding_fougasse_750x750.jpg","ig":[{"g":"Ingredienti","i":["200 g farina","7 g di sale","5 g lievito fresco","135 ml acqua tiepida","150 g di pomodori secchi sott’olio","4 cucchiai di olive nere snocciolote","4 ramoscelli di timo","Olio d’oliva"]}],"ins":["IN CUCINA","AL BARBECUE"],"u":"https://www.weber.com/IT/it/ricette/pane-pizza/focaccia-con-timo-olive-e-pomodori-secchi/weber-70585.html"},{"n":"Linguine all'astice","c":"Altre","s":"","d":"Difficile","g":"","m":"Diretta","i":"https://content-images.weber.com/emea-recipes/Sicily_linguine-all-astice_750x750.jpg","ig":[{"g":"Ingredienti","i":["1 kg di astice","4 cucchiai di prezzemolo","2 spicchi d&#039;aglio","Peperoncino rosso fresco, a piacere","2 l di brodo di pesce","6 cucchiai di olio extra vergine di oliva","225 ml di vino bianco secco","225 ml di salsa di pomodoro","Sale marino","400 g di linguine all’uovo fresche","Altro prezzemolo per guarnire"]}],"ins":["In cucina:","Al barbecue:"],"u":"https://www.weber.com/IT/it/ricette/linguine-allastice/weber-71100.html"},{"n":"Tortino al cioccolato con cuore fondente e frutti di bosco","c":"Dolci & Bevande","s":"","d":"Facile","g":"","m":"Indiretta","i":"https://content-images.weber.com/emea-recipes/296_Schokokuchlein_750x750.jpg","ig":[{"g":"Ingredienti","i":["375 gr di burro, più un po’ per ungere i pirottini","250 gr di cioccolato fondente, tritato","4 uova grandi","125 gr di zucchero","2 cucchiai di farina","Panna montata per servire (facoltativa)","250 gr di lamponi, per servire"]}],"ins":["Adoriamo le tortine monoporzione...se poi sono al cioccolato con un cuore caldo e cremoso, è impossibile resistervi! è facile da fare e con pochi ingredienti. L’importante è assicurarsi che ciascun pirottino contenga circa 125 ml di impasto. Concludete la vostra cena o di tagliare il pollo lungo entrambi i lati della spina dorsale con un paio di cesoie per pollame e rimuoverla. Capovolgere il pollo e appiattire.","In cucina","Al Barbecue"],"u":"https://www.weber.com/IT/it/ricette/pollame/pollo-alla-diavola-con-glassa-alla-senape/weber-71622.html"},{"n":"Alette di pollo piccanti","c":"Pollame","s":"","d":"Facile","g":"","m":"Indiretta","i":"https://content-images.weber.com/emea-recipes/04_fastfood_hotwings_750x750.jpg","ig":[{"g":"Ingredienti","i":["Per 16 alette","16 alette di pollo (1 kg)","Marinata","3 cucchiaini di peperoncini Chipotle in salsa Adobo, tritati","2 cucchiaini di sale","2 cucchiaini di paprika","2 spicchi d&#039;aglio grattugiati","½ cipolla, grattugiata","1 cucchiaino di pepe nero macinato","Salsa piccante","6 cucchiai di olio di oliva extra vergine","2 spicchi d&#039;aglio, tritati","2 peperoncini rossi freschi, tritati","2 cucchiaini di aceto","2 cucchiaini di salsa Tabasco®","Sale","Pepe"]}],"ins":["In cucina","Separare le alette di pollo in corrispondenza dell'articolazione.","Mescolare tutti gli ingredienti per la marinata e intingere le alette nella salsa.","Metterle in frigo per almeno un'ora perché assorbano il sapore.","Preparare ora la salsa piccante.","Scaldare l'olio a fuoco medio in un pentolino. Aggiungere l'aglio e il peperoncino e rosolare per circa 1 minuto. Non consentire che si riscaldi troppo e non friggere troppo a lungo, in quanto l'aglio diventerà amaro.","Aggiungere l'aceto e la salsa Tabasco® e lasciar sobbollire per 2-3 minuti.","Condire con sale e pepe.","Griglia","Preparare la griglia per la cottura a calore indiretto, ca. 230 °C.","Cucinare le alette a fuoco indiretto per 10 minuti con il coperchio. Poi spennellare la salsa piccante sulle alette ogni 10 minuti. Capovolgerle ogni volta che si spennellano. Continuare spennellando le alette per un totale di quattro volte.","Quando la carne è cotta in corrispondenza dell'osso e la pelle è croccante, sono pronte per essere servite."],"u"   });
  var g = $('#griglia');
  if(filtrate.length === 0){
    g.innerHTML = '<div class="empty-state"><p>Nessuna ricetta trovata</p></div>';
    return;
  }
  g.innerHTML = filtrate.map(function(r, i){
    return '<div class="card" style="animation-delay:' + ((i%12)*40) + 'ms" onclick="apri(' + R.indexOf(r) + ')">' +
      '<div class="card-img" style="background-image:url(' + esc(r.i) + ')">' +
        '<span class="ctag">' + esc(r.c) + '</span>' +
      '</div>' +
      '<div class="card-body">' +
        '<h3>' + esc(r.n) + '</h3>' +
        '<div class="card-meta">' +
          (r.s ? '<span>👥 ' + esc(r.s) + '</span>' : '') +
          (r.d ? '<span class="diff">' + esc(r.d) + '</span>' : '') +
          (r.g ? '<span>🌡️ ' + esc(r.g) + '</span>' : '') +
        '</div>' +
      '</div>' +
    '</div>';
  }).join('');
}

function esc(s){
  return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;').replace(/'/g,'&#39;');
}

function apri(idx){
  var r = R[idx]; if(!r) return;
  var info = '';
  if(r.s||r.d||r.g||r.m){
    info = '<div class="modal-info">' +
      (r.s ? '<div class="ii"><div class="il">Porzioni</div><div class="iv">' + esc(r.s) + '</div></div>' : '') +
      (r.d ? '<div class="ii"><div class="il">Difficoltà</div><div class="iv">' + esc(r.d) + '</div></div>' : '') +
      (r.g ? '<div class="ii"><div class="il">Grill</div><div class="iv">' + esc(r.g) + '</div></div>' : '') +
      (r.m ? '<div class="ii"><div class="il">Metodo</div><div class="iv">' + esc(r.m) + '</div></div>' : '') +
    '</div>';
  }
  var ing = '';
  if(r.ig && r.ig.length){
    ing = '<h3>Ingredienti</h3>' + r.ig.map(function(g){
      return '<div class="ing-group">' +
        (g.g !== 'Ingredienti' ? '<h4>' + esc(g.g) + '</h4>' : '') +
        '<ul>' + g.i.map(function(it){ return '<li>' + esc(it) + '</li>'; }).join('') + '</ul>' +
      '</div>';
    }).join('');
  }
  var ins = '';
  if(r.ins && r.ins.length){
    ins = '<h3>Preparazione</h3><ol class="inst-list">' + r.ins.map(function(s){ return '<li>' + s + '</li>'; }).join('') + '</ol>';
  }
  if(!ing && !ins) ins = '<p style="color:#6b5a4e;font-style:italic;padding:6px 0">Dettagli disponibili su Weber.com</p>';

  $('#modalContent').innerHTML =
    '<div class="modal-hero" style="background-image:url(' + esc(r.i) + ')">' +
      '<button class="close" onclick="chiudiModal()">✕</button>' +
      '<span class="cat-badge">' + esc(r.c) + '</span>' +
    '</div>' +
    '<div class="modal-body">' +
      '<h2>' + esc(r.n) + '</h2>' +
      info + ing + ins +
    '</div>';
  $('#modal').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function chiudiModal(){
  $('#modal').classList.remove('open');
  document.body.style.overflow = '';
}

function setCategoria(c){
  catCorrente = c;
  $$('.cat-btn').forEach(function(b){
    b.classList.toggle('active', b.getAttribute('data-cat') === c);
  });
  filtra();
}

// Init categorie
var buf = '<button class="cat-btn active" data-cat="">Tutte <span class="ct">' + R.length + '</span></button>';
C.forEach(function(c){
  buf += '<button class="cat-btn" data-cat="' + c.n + '">' + c.n + ' <span class="ct">' + c.c + '</span></button>';
});
$('#filtri').innerHTML = buf;
$$('.cat-btn').forEach(function(b){
  b.onclick = function(){ setCategoria(this.getAttribute('data-cat')); };
});

filtra();

document.addEventListener('keydown', function(e){ if(e.key === 'Escape') chiudiModal(); });
</script>
</body>
</html>
